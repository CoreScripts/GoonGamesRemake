<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>GOONGAMES</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap');
        :root {
            --primary-rgb: 100, 200, 180;
            --primary-color: rgb(var(--primary-rgb));
            --base-opacity: 0.65;
            --bg-dark: #0d0d0d;
            --bg-panel: #111827e0;
            --border-light: rgba(255,255,255,0.3);
            --border-dark: rgba(255,255,255,0.08);
            --handle-size: 48px;
        }
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins',sans-serif; transition:all 0.15s ease-out; }
        body { background:var(--bg-dark); overflow:hidden; touch-action:none; }
        #game { position:fixed; width:100%; height:100%; border:none; }
        .controls { position:fixed; inset:0; pointer-events:none; z-index:999999; }
        .btn {
            position:absolute; pointer-events:auto;
            background:rgba(255,255,255,0.12); border:1px solid var(--border-light);
            color:#fff; display:flex; align-items:center; justify-content:center;
            user-select:none; cursor:pointer; font-size:13px; font-weight:500;
            border-radius:50%; opacity:var(--base-opacity);
            transition:transform 0.1s, opacity 0.3s, background 0.1s, border-color 0.1s;
        }
        .btn.active { background:rgba(var(--primary-rgb),0.35); border-color:rgba(var(--primary-rgb),0.6); }
        .btn.drag-mode { border:2px dashed rgba(var(--primary-rgb),0.7); cursor:move; }
        .joy, .camera {
            bottom:30px; width:120px; height:120px;
            background:rgba(255,255,255,0.1); border:1px solid var(--border-light);
            opacity:var(--base-opacity); border-radius:50%;
        }
        .joy { left:30px; }
        .camera { right:180px; }
        .joy-stick, .camera-stick {
            position:absolute; width:var(--handle-size); height:var(--handle-size);
            background:rgba(var(--primary-rgb),0.4); border:1px solid rgba(255,255,255,0.4);
            border-radius:50%; top:50%; left:50%; transform:translate(-50%,-50%); transition:none;
        }
        .joy.active .joy-stick, .camera.active .camera-stick { background:rgba(var(--primary-rgb),0.6); }
        .a { bottom:50px; right:70px; width:60px; height:60px; }
        .b { bottom:120px; right:30px; width:60px; height:60px; }
        .lclick { bottom:190px; right:80px; width:50px; height:50px; font-size:11px; }
        .rclick { bottom:190px; right:25px; width:50px; height:50px; font-size:11px; }
        .esc { top:30px; left:30px; width:55px; height:55px; font-size:12px; }
        .settings-icon {
            position:fixed; top:15px; right:15px; width:48px; height:48px;
            background:rgba(255,255,255,0.12); border:1px solid var(--border-light);
            border-radius:50%; color:white; font-size:20px;
            display:flex; align-items:center; justify-content:center;
            cursor:pointer; z-index:1000002;
        }
        .settings-icon:hover { background:rgba(var(--primary-rgb),0.2); }
        .panel {
            position:fixed; top:0; right:-360px; width:360px; height:100%;
            background:var(--bg-panel); color:#fff; padding:0; overflow-y:auto;
            transition:right 0.3s ease; z-index:1000001;
            border-left:1px solid rgba(var(--primary-rgb),0.2);
            scrollbar-width:thin; scrollbar-color:rgba(var(--primary-rgb),0.3) transparent;
        }
        .panel::-webkit-scrollbar { width:6px; }
        .panel::-webkit-scrollbar-thumb { background:rgba(var(--primary-rgb),0.3); border-radius:3px; }
        .panel.open { right:0; }
        .panel-head {
            padding:24px 20px; background:rgba(255,255,255,0.03);
            border-bottom:1px solid var(--border-dark); font-size:18px; font-weight:600;
            display:flex; justify-content:space-between; align-items:center;
        }
        .close-btn { font-size:24px; cursor:pointer; line-height:1; color:rgba(255,255,255,0.6); }
        .close-btn:hover { color:white; }
        .section { padding:20px; border-bottom:1px solid rgba(255,255,255,0.05); }
        .section-title { font-size:11px; color:rgba(var(--primary-rgb),0.8); text-transform:uppercase; letter-spacing:1px; margin-bottom:14px; font-weight:600; }
        .slider-wrap { margin-bottom:16px; }
        .slider-label { display:flex; justify-content:space-between; margin-bottom:8px; font-size:13px; }
        input[type="range"] { width:100%; height:4px; background:rgba(255,255,255,0.1); border-radius:2px; outline:none; appearance:none; }
        input[type="range"]::-webkit-slider-thumb { appearance:none; width:14px; height:14px; background:rgba(var(--primary-rgb),0.8); border-radius:50%; cursor:pointer; }
        input[type="text"], select {
            width:100%; padding:10px 12px; background:rgba(255,255,255,0.05);
            border:1px solid rgba(255,255,255,0.15); border-radius:6px; color:#fff;
            font-size:13px; margin-bottom:10px;
        }
        input[type="text"]:focus, select:focus { outline:none; border-color:rgba(var(--primary-rgb),0.5); }
        select option { background:var(--bg-panel); }
        .btn-action {
            width:100%; padding:10px; background:rgba(255,255,255,0.08);
            border:1px solid rgba(255,255,255,0.15); border-radius:6px; color:#fff;
            cursor:pointer; font-size:13px; font-weight:500; margin-bottom:8px;
        }
        .btn-action:hover { background:rgba(var(--primary-rgb),0.15); border-color:rgba(var(--primary-rgb),0.3); }
        .btn-action.primary { background:rgba(var(--primary-rgb),0.15); border-color:rgba(var(--primary-rgb),0.3); }
        .btn-action.danger { background:rgba(255,100,100,0.1); border-color:rgba(255,100,100,0.3); }
        .btn-action.danger:hover { background:rgba(255,100,100,0.2); }
        .toggle-wrap { display:flex; gap:8px; margin-top:10px; }
        .toggle-btn {
            flex:1; padding:9px; background:rgba(255,255,255,0.05);
            border:1px solid rgba(255,255,255,0.15); border-radius:6px;
            color:rgba(255,255,255,0.8); cursor:pointer; font-size:12px; text-align:center;
        }
        .toggle-btn.active { background:rgba(var(--primary-rgb),0.2); border-color:rgba(var(--primary-rgb),0.4); color:#fff; }
        .toggle-btn:hover { background:rgba(var(--primary-rgb),0.1); }
        .custom-list { max-height:200px; overflow-y:auto; scrollbar-width:thin; }
        .custom-item { background:rgba(255,255,255,0.05); padding:12px; margin-bottom:6px; border-radius:6px; display:flex; justify-content:space-between; align-items:center; }
        .custom-info { font-size:13px; }
        .del-btn { width:28px; height:28px; background:rgba(255,255,255,0.08); border:none; border-radius:4px; color:rgba(255,255,255,0.6); cursor:pointer; font-size:16px; }
        .del-btn:hover { background:rgba(255,100,100,0.3); color:#fff; }
        @media (max-width:768px) { .panel { width:100%; right:-100%; } }
    </style>
</head>
<body>
    <iframe id="game" allow="autoplay; fullscreen; gamepad"></iframe>
    <div class="settings-icon" onclick="togglePanel()">⚙</div>
    <div class="panel" id="panel">
        <div class="panel-head">
            <span style="font-size:15px;font-weight:700">🎮 Controls</span>
            <span class="close-btn" onclick="togglePanel()">✕</span>
        </div>
        <div class="section">
            <div class="section-title">scale and style</div>
            <div class="slider-wrap">
                <div class="slider-label"><span>size</span><span id="sizeVal">100%</span></div>
                <input type="range" id="sizeSlider" min="60" max="140" value="100" oninput="updateSize(this.value)">
            </div>
            <div class="slider-wrap">
                <div class="slider-label"><span>opacity</span><span id="opacityVal">65%</span></div>
                <input type="range" id="opacitySlider" min="30" max="95" value="65" oninput="updateOpacity(this.value)">
            </div>
        </div>
        <div class="section">
            <div class="section-title">joystick controls</div>
            <div class="toggle-wrap">
                <div class="toggle-btn" id="wasdBtn" onclick="setJoystickMode('wasd')">WASD</div>
                <div class="toggle-btn" id="arrowBtn" onclick="setJoystickMode('arrow')">Arrow Keys</div>
            </div>
        </div>
        <div class="section">
            <div class="section-title">camera sensitivity</div>
            <div class="slider-wrap">
                <div class="slider-label"><span>sensitivity</span><span id="sensVal">4.0</span></div>
                <input type="range" id="sensSlider" min="1" max="10" step="0.5" value="4" oninput="updateSensitivity(this.value)">
            </div>
        </div>
        <div class="section">
            <div class="section-title">positioning</div>
            <button class="btn-action primary" onclick="toggleDragMode()" id="dragBtn">move</button>
            <div class="toggle-wrap">
                <div class="toggle-btn" onclick="resetPositions()">reset</div>
                <div class="toggle-btn" onclick="savePositions()">save</div>
            </div>
        </div>
        <div class="section">
            <input type="text" id="customLabel" placeholder="name of button:">
            <select id="customKey">
                <option value="Space">space</option><option value="Enter">enter</option>
                <option value="Shift">shift</option><option value="Control">ctrl</option>
                <option value="Tab">tab</option><option value="e">e</option>
                <option value="r">r</option><option value="f">f</option>
                <option value="q">q</option><option value="c">c</option>
                <option value="v">v</option><option value="1">1</option>
                <option value="2">2</option><option value="3">3</option>
            </select>
            <button class="btn-action primary" onclick="addCustom()">add button</button>
            <div class="custom-list" id="customList"></div>
        </div>
        <div class="section">
            <div class="section-title">config</div>
            <button class="btn-action" onclick="saveAll()">save config</button>
            <button class="btn-action" onclick="loadAll()">load config</button>
            <button class="btn-action danger" onclick="resetAll()">reset settings</button>
        </div>
    </div>
    <div class="controls" id="controls">
        <div class="btn esc" data-key="Escape">ESC</div>
        <div class="btn joy"><div class="joy-stick"></div></div>
        <div class="btn camera"><div class="camera-stick"></div></div>
        <div class="btn a" data-key="z">A</div>
        <div class="btn b" data-key="x">B</div>
        <div class="btn lclick" data-click="left">L</div>
        <div class="btn rclick" data-click="right">R</div>
    </div>
    <script>
        var url = new URLSearchParams(location.search).get('url');
        var gameFrame = document.getElementById('game');
        if (url) gameFrame.src = url;

        var customButtons = [];
        var dragMode = false;
        var dragElement = null;
        var dragOffset = { x: 0, y: 0 };
        var baseSize = 1;
        var baseOpacity = 0.65;
        var joystickMode = 'wasd';
        var cameraSensitivity = 4.0;
        var activeKeys = new Set();
        var activeClicks = new Set();
        var joyTouchId = null;
        var cameraTouchId = null;
        var buttonTouchMap = new Map();
        var cameraVector = { x: 0, y: 0 };
        var cameraLoopRunning = false;
        var joyEl = document.querySelector('.joy');
        var joyStick = document.querySelector('.joy-stick');
        var cameraEl = document.querySelector('.camera');
        var cameraStickEl = document.querySelector('.camera-stick');

        // Direct access - assumes same-origin game only (no cross-origin fallback)
        function getGameDocument() {
            return gameFrame.contentWindow.document;
        }

        function getGameWindow() {
            return gameFrame.contentWindow;
        }

        function sendKey(type, k) {
            var normalizedKey = k, code = k;
            if(k === 'Space') { normalizedKey = ' '; code = 'Space'; }
            else if(k.length === 1) { normalizedKey = k.toLowerCase(); code = 'Key' + k.toUpperCase(); }
            var keyCodeMap = {
                'w':87,'s':83,'a':65,'d':68,'ArrowUp':38,'ArrowDown':40,'ArrowLeft':37,'ArrowRight':39,
                'z':90,'x':88,'Escape':27,'Space':32,'Enter':13,'Shift':16,'Control':17,'Tab':9,
                'e':69,'r':82,'f':70,'q':81,'c':67,'v':86,'1':49,'2':50,'3':51
            };
            var evt = new KeyboardEvent(type, {
                key: normalizedKey, code: code, keyCode: keyCodeMap[normalizedKey] || 0,
                which: keyCodeMap[normalizedKey] || 0, bubbles: true, cancelable: true, composed: true
            });
            var targetDoc = getGameDocument();
            var targetWin = getGameWindow();
            targetWin.dispatchEvent(evt);
            targetDoc.dispatchEvent(evt);
            if(targetDoc.body) targetDoc.body.dispatchEvent(evt);
            if(targetDoc.activeElement && targetDoc.activeElement !== targetDoc.body) {
                targetDoc.activeElement.dispatchEvent(evt);
            }
        }

        function sendClick(button, type) {
            var buttonCode = button === 'left' ? 0 : 2;
            var buttonsState = button === 'left' ? 1 : 2;
            var evt = new MouseEvent(type, { button: buttonCode, buttons: buttonsState, bubbles: true, cancelable: true });
            var targetDoc = getGameDocument();
            var canvas = targetDoc.querySelector('canvas');
            if(canvas) canvas.dispatchEvent(evt);
            else targetDoc.dispatchEvent(evt);
            if(type === 'mouseup' && button === 'left') {
                var clickEvt = new MouseEvent('click', { button: 0, bubbles: true });
                if(canvas) canvas.dispatchEvent(clickEvt);
                else targetDoc.dispatchEvent(clickEvt);
            }
        }

        function pressKey(k, btn) { if(activeKeys.has(k)) return; activeKeys.add(k); if(btn) btn.classList.add('active'); sendKey('keydown', k); }
        function releaseKey(k, btn) { if(!activeKeys.has(k)) return; activeKeys.delete(k); if(btn) btn.classList.remove('active'); sendKey('keyup', k); }
        function pressClick(type, btn) { if(activeClicks.has(type)) return; activeClicks.add(type); if(btn) btn.classList.add('active'); sendClick(type, 'mousedown'); }
        function releaseClick(type, btn) { if(!activeClicks.has(type)) return; activeClicks.delete(type); if(btn) btn.classList.remove('active'); sendClick(type, 'mouseup'); }

        function attachButtonEvents(b) {
            var k = b.dataset.key, clickType = b.dataset.click;
            b.addEventListener('touchstart', function(e) {
                if(dragMode) return; e.preventDefault(); e.stopPropagation();
                for(var i = 0; i < e.changedTouches.length; i++) {
                    buttonTouchMap.set(e.changedTouches[i].identifier, { btn: b, key: k, click: clickType });
                    if(k) pressKey(k, b); else if(clickType) pressClick(clickType, b);
                }
            }, { passive: false });
            b.addEventListener('touchend', function(e) {
                e.preventDefault(); e.stopPropagation();
                for(var i = 0; i < e.changedTouches.length; i++) {
                    var info = buttonTouchMap.get(e.changedTouches[i].identifier);
                    if(info) { if(info.key) releaseKey(info.key, info.btn); else if(info.click) releaseClick(info.click, info.btn); buttonTouchMap.delete(e.changedTouches[i].identifier); }
                }
            }, { passive: false });
            b.addEventListener('touchcancel', function(e) {
                for(var i = 0; i < e.changedTouches.length; i++) {
                    var info = buttonTouchMap.get(e.changedTouches[i].identifier);
                    if(info) { if(info.key) releaseKey(info.key, info.btn); else if(info.click) releaseClick(info.click, info.btn); buttonTouchMap.delete(e.changedTouches[i].identifier); }
                }
            });
            b.addEventListener('mousedown', function(e) { if(dragMode || e.button === 2) return; e.preventDefault(); if(k) pressKey(k, b); else if(clickType) pressClick(clickType, b); });
            b.addEventListener('mouseup', function(e) { if(k) releaseKey(k, b); else if(clickType) releaseClick(clickType, b); });
            b.addEventListener('mouseleave', function(e) { if(k) releaseKey(k, b); else if(clickType) releaseClick(clickType, b); });
        }

        document.querySelectorAll('.btn[data-key]').forEach(attachButtonEvents);
        document.querySelectorAll('.btn[data-click]').forEach(attachButtonEvents);

        function getJoystickKeys() { return joystickMode === 'wasd' ? { up: 'w', down: 's', left: 'a', right: 'd' } : { up: 'ArrowUp', down: 'ArrowDown', left: 'ArrowLeft', right: 'ArrowRight' }; }

        function processJoystick(touch) {
            var r = joyEl.getBoundingClientRect(), cx = r.left + r.width/2, cy = r.top + r.height/2;
            var dx = touch.clientX - cx, dy = touch.clientY - cy, dist = Math.sqrt(dx*dx + dy*dy);
            var stickSize = parseFloat(getComputedStyle(joyStick).width), maxDist = (r.width/2) - (stickSize/2);
            if(dist > maxDist) { dx = (dx/dist) * maxDist; dy = (dy/dist) * maxDist; }
            joyStick.style.transform = 'translate(calc(-50% + ' + dx + 'px), calc(-50% + ' + dy + 'px))';
            joyEl.classList.add('active');
            var threshold = 16 * baseSize, keys = getJoystickKeys();
            [{ k: keys.up, on: dy < -threshold }, { k: keys.down, on: dy > threshold }, { k: keys.left, on: dx < -threshold }, { k: keys.right, on: dx > threshold }].forEach(function(c) {
                if(c.on && !activeKeys.has(c.k)) { activeKeys.add(c.k); sendKey('keydown', c.k); }
                else if(!c.on && activeKeys.has(c.k)) { activeKeys.delete(c.k); sendKey('keyup', c.k); }
            });
        }

        function processCamera(touch) {
            var r = cameraEl.getBoundingClientRect(), cx = r.left + r.width/2, cy = r.top + r.height/2;
            var dx = touch.clientX - cx, dy = touch.clientY - cy, dist = Math.sqrt(dx*dx + dy*dy);
            var stickSize = parseFloat(getComputedStyle(cameraStickEl).width), maxDist = (r.width/2) - (stickSize/2);
            if(dist > maxDist) { dx = (dx/dist) * maxDist; dy = (dy/dist) * maxDist; }
            cameraStickEl.style.transform = 'translate(calc(-50% + ' + dx + 'px), calc(-50% + ' + dy + 'px))';
            cameraEl.classList.add('active');
            cameraVector.x = (dx/maxDist) * cameraSensitivity;
            cameraVector.y = (dy/maxDist) * cameraSensitivity;
            if(!cameraLoopRunning) { cameraLoopRunning = true; runCameraLoop(); }
        }

        function runCameraLoop() {
            if(cameraTouchId === null) { cameraLoopRunning = false; return; }
            if(Math.abs(cameraVector.x) > 0.01 || Math.abs(cameraVector.y) > 0.01) {
                var evt = new MouseEvent('mousemove', { movementX: cameraVector.x, movementY: cameraVector.y, bubbles: true, cancelable: true });
                var targetDoc = getGameDocument();
                var canvas = targetDoc.querySelector('canvas');
                if(canvas) canvas.dispatchEvent(evt);
                else targetDoc.dispatchEvent(evt);
            }
            requestAnimationFrame(runCameraLoop);
        }

        function releaseJoystick() {
            joyStick.style.transform = 'translate(-50%, -50%)'; joyEl.classList.remove('active');
            var allKeys = joystickMode === 'wasd' ? ['w','s','a','d'] : ['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'];
            allKeys.forEach(function(k) { if(activeKeys.has(k)) { activeKeys.delete(k); sendKey('keyup', k); } });
            joyTouchId = null;
        }
        function releaseCamera() { cameraStickEl.style.transform = 'translate(-50%, -50%)'; cameraEl.classList.remove('active'); cameraVector.x = 0; cameraVector.y = 0; cameraTouchId = null; }

        joyEl.addEventListener('touchstart', function(e) { if(dragMode) return; e.preventDefault(); e.stopPropagation(); for(var i=0; i<e.changedTouches.length; i++) { if(joyTouchId === null) { joyTouchId = e.changedTouches[i].identifier; processJoystick(e.changedTouches[i]); break; } } }, { passive: false });
        cameraEl.addEventListener('touchstart', function(e) { if(dragMode) return; e.preventDefault(); e.stopPropagation(); for(var i=0; i<e.changedTouches.length; i++) { if(cameraTouchId === null) { cameraTouchId = e.changedTouches[i].identifier; processCamera(e.changedTouches[i]); break; } } }, { passive: false });

        document.addEventListener('touchmove', function(e) {
            if(dragMode) return; var dominated = false;
            for(var i=0; i<e.changedTouches.length; i++) { var t = e.changedTouches[i]; if(t.identifier === joyTouchId) { processJoystick(t); dominated = true; } if(t.identifier === cameraTouchId) { processCamera(t); dominated = true; } }
            if(dominated) e.preventDefault();
        }, { passive: false });
        document.addEventListener('touchend', function(e) { for(var i=0; i<e.changedTouches.length; i++) { var id = e.changedTouches[i].identifier; if(id === joyTouchId) releaseJoystick(); if(id === cameraTouchId) releaseCamera(); } });
        document.addEventListener('touchcancel', function(e) { for(var i=0; i<e.changedTouches.length; i++) { var id = e.changedTouches[i].identifier; if(id === joyTouchId) releaseJoystick(); if(id === cameraTouchId) releaseCamera(); } });
        joyEl.addEventListener('mousedown', function(e) { if(dragMode) return; e.preventDefault(); joyTouchId = 'mouse'; });
        cameraEl.addEventListener('mousedown', function(e) { if(dragMode) return; e.preventDefault(); cameraTouchId = 'mouse'; });
        document.addEventListener('mousemove', function(e) { if(dragMode) return; if(joyTouchId === 'mouse') processJoystick(e); if(cameraTouchId === 'mouse') processCamera(e); });
        document.addEventListener('mouseup', function(e) { if(joyTouchId === 'mouse') releaseJoystick(); if(cameraTouchId === 'mouse') releaseCamera(); });

        function togglePanel() { document.getElementById('panel').classList.toggle('open'); }
        function applyStyles() { document.documentElement.style.setProperty('--base-opacity', baseOpacity); }
        function updateSize(v) { baseSize = v/100; document.getElementById('sizeVal').textContent = v+'%'; applyScale(); saveAll(); }
        function updateOpacity(v) { baseOpacity = v/100; document.getElementById('opacityVal').textContent = v+'%'; applyStyles(); saveAll(); }
        function setJoystickMode(mode) { joystickMode = mode; document.getElementById('wasdBtn').classList.toggle('active', mode==='wasd'); document.getElementById('arrowBtn').classList.toggle('active', mode==='arrow'); saveAll(); }
        function updateSensitivity(v) { cameraSensitivity = parseFloat(v); document.getElementById('sensVal').textContent = v; saveAll(); }

        function applyScale() {
            document.querySelectorAll('.btn').forEach(function(btn) {
                if(!btn.dataset.baseWidth) {
                    btn.dataset.baseWidth = parseFloat(getComputedStyle(btn).width);
                    btn.dataset.baseHeight = parseFloat(getComputedStyle(btn).height);
                }
                btn.style.width = (parseFloat(btn.dataset.baseWidth) * baseSize) + 'px';
                btn.style.height = (parseFloat(btn.dataset.baseHeight) * baseSize) + 'px';
                var bfs = parseFloat(btn.dataset.baseFontSize || getComputedStyle(btn).fontSize);
                btn.style.fontSize = (bfs * baseSize) + 'px';
                btn.dataset.baseFontSize = bfs;
                if(btn.classList.contains('joy') || btn.classList.contains('camera')) {
                    var s = btn.querySelector('.joy-stick,.camera-stick');
                    if(s) { var sb = parseFloat(s.dataset.baseWidth || 48); s.style.width = (sb * baseSize) + 'px'; s.style.height = (sb * baseSize) + 'px'; s.dataset.baseWidth = sb; }
                }
            });
        }

        function toggleDragMode() {
            dragMode = !dragMode;
            var btn = document.getElementById('dragBtn');
            document.querySelectorAll('.btn').forEach(function(b) { b.classList.toggle('drag-mode', dragMode); });
            if(dragMode) { btn.textContent = 'stop moving'; btn.classList.add('active'); }
            else { btn.textContent = 'move'; btn.classList.remove('active'); savePositions(); }
        }

        function savePositions() {
            var positions = {};
            document.querySelectorAll('.btn').forEach(function(btn) {
                var id = btn.dataset.customId || btn.className.split(' ').find(function(c) { return ['joy','camera','a','b','lclick','rclick','esc'].indexOf(c) !== -1; });
                if(id) positions[id] = { top: btn.style.top, left: btn.style.left, right: btn.style.right, bottom: btn.style.bottom };
            });
            localStorage.setItem('btnPositions', JSON.stringify(positions));
        }

        function resetPositions() { localStorage.removeItem('btnPositions'); location.reload(); }
        function loadPositions() { var saved = localStorage.getItem('btnPositions'); if(!saved) return; var positions = JSON.parse(saved); Object.keys(positions).forEach(function(id) { var btn = document.querySelector('[data-custom-id="'+id+'"]') || document.querySelector('.'+id); if(btn) { btn.style.top = positions[id].top; btn.style.left = positions[id].left; btn.style.right = positions[id].right; btn.style.bottom = positions[id].bottom; } }); }

        function createButtonElement(buttonData) {
            var btn = document.createElement('div'); btn.className = 'btn custom-btn'; btn.textContent = buttonData.label;
            btn.dataset.key = buttonData.key; btn.dataset.customId = buttonData.id;
            btn.style.width = (60 * baseSize) + 'px'; btn.style.height = (60 * baseSize) + 'px'; btn.style.fontSize = (13 * baseSize) + 'px';
            btn.style.top = '100px'; btn.style.left = '50%';
            document.getElementById('controls').appendChild(btn); attachButtonEvents(btn); return btn;
        }
        function addCustom() { var label = document.getElementById('customLabel').value.trim(); var k = document.getElementById('customKey').value; if(!label) return; var id = Date.now(); var bd = { id: id, label: label, key: k }; customButtons.push(bd); createButtonElement(bd); updateCustomList(); saveAll(); document.getElementById('customLabel').value = ''; }
        function deleteCustom(id) { customButtons = customButtons.filter(function(b) { return b.id !== id; }); var btn = document.querySelector('[data-custom-id="'+id+'"]'); if(btn) btn.remove(); updateCustomList(); saveAll(); }
        function updateCustomList() { var list = document.getElementById('customList'); list.innerHTML = ''; customButtons.forEach(function(b) { var item = document.createElement('div'); item.className = 'custom-item'; item.innerHTML = '<div class="custom-info"><strong>'+b.label+'</strong> ('+b.key+')</div><button class="del-btn" onclick="deleteCustom('+b.id+')">×</button>'; list.appendChild(item); }); }
        function saveAll() { savePositions(); localStorage.setItem('controllerConfig', JSON.stringify({ size: baseSize, opacity: baseOpacity, customButtons: customButtons, joystickMode: joystickMode, cameraSensitivity: cameraSensitivity })); }
        function loadAll() {
            var saved = localStorage.getItem('controllerConfig');
            document.querySelectorAll('.custom-btn').forEach(function(el) { el.remove(); });
            if(saved) { var config = JSON.parse(saved); baseSize = config.size || 1; baseOpacity = config.opacity || 0.65; joystickMode = config.joystickMode || 'wasd'; cameraSensitivity = config.cameraSensitivity || 4.0; document.getElementById('sizeSlider').value = Math.round(baseSize * 100); document.getElementById('opacitySlider').value = Math.round(baseOpacity * 100); document.getElementById('sizeVal').textContent = Math.round(baseSize * 100) + '%'; document.getElementById('opacityVal').textContent = Math.round(baseOpacity * 100) + '%'; document.getElementById('sensSlider').value = cameraSensitivity; document.getElementById('sensVal').textContent = cameraSensitivity; setJoystickMode(joystickMode); customButtons = config.customButtons || []; customButtons.forEach(createButtonElement); updateCustomList(); loadPositions(); applyScale(); applyStyles(); }
            else { setJoystickMode('wasd'); }
        }
        function resetAll() { localStorage.clear(); location.reload(); }
        loadAll();
    </script>
</body>
</html>
