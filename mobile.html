<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>GOONGAMES</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap');
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #0d0d0d;
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
        }
        #game {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            z-index: 1;
        }
        .controls {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10000;
        }
        .btn {
            position: absolute;
            pointer-events: auto;
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Poppins', sans-serif;
            font-weight: 500;
            border-radius: 50%;
            cursor: pointer;
            transition: 0.05s linear;
            touch-action: none;
        }
        .btn:active {
            transform: scale(0.92);
            background: rgba(100,200,180,0.4);
            border-color: rgba(100,200,180,0.8);
        }
        .joy, .camera {
            width: 120px;
            height: 120px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 50%;
        }
        .joy { bottom: 30px; left: 30px; }
        .camera { bottom: 30px; right: 30px; }
        .joy-stick, .camera-stick {
            position: absolute;
            width: 50px;
            height: 50px;
            background: rgba(100,200,180,0.5);
            border: 1px solid rgba(255,255,255,0.5);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }
        .a { bottom: 80px; right: 100px; width: 60px; height: 60px; }
        .b { bottom: 140px; right: 40px; width: 60px; height: 60px; }
        .lclick { bottom: 200px; right: 100px; width: 50px; height: 50px; font-size: 12px; }
        .rclick { bottom: 200px; right: 40px; width: 50px; height: 50px; font-size: 12px; }
        .esc { top: 30px; left: 30px; width: 55px; height: 55px; font-size: 12px; }
        .settings-icon {
            position: fixed;
            top: 15px;
            right: 15px;
            width: 48px;
            height: 48px;
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            color: white;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 10002;
            pointer-events: auto;
        }
        .panel {
            position: fixed;
            top: 0;
            right: -360px;
            width: 360px;
            height: 100%;
            background: rgba(17,24,39,0.95);
            backdrop-filter: blur(10px);
            color: white;
            transition: right 0.3s ease;
            z-index: 10001;
            padding: 20px;
            overflow-y: auto;
            pointer-events: auto;
        }
        .panel.open { right: 0; }
        .panel h3 { margin-bottom: 20px; font-size: 20px; }
        .close-btn {
            float: right;
            font-size: 28px;
            cursor: pointer;
        }
        .slider-label {
            display: flex;
            justify-content: space-between;
            margin: 15px 0 5px;
        }
        input[type="range"] {
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.2);
            border-radius: 2px;
            -webkit-appearance: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            background: rgb(100,200,180);
            border-radius: 50%;
            cursor: pointer;
        }
        button {
            width: 100%;
            padding: 10px;
            margin: 5px 0;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            color: white;
            cursor: pointer;
            font-size: 14px;
        }
        button:active { background: rgba(100,200,180,0.3); }
        @media (max-width: 768px) {
            .panel { width: 100%; right: -100%; }
        }
    </style>
</head>
<body>
    <iframe id="game" src="about:blank" allow="autoplay; fullscreen"></iframe>
    <div class="settings-icon" onclick="togglePanel()">⚙</div>
    <div class="panel" id="panel">
        <div class="close-btn" onclick="togglePanel()">×</div>
        <h3>Controller Settings</h3>
        <div class="slider-label"><span>Button Size</span><span id="sizeVal">100%</span></div>
        <input type="range" id="sizeSlider" min="60" max="140" value="100">
        <div class="slider-label"><span>Opacity</span><span id="opacityVal">65%</span></div>
        <input type="range" id="opacitySlider" min="30" max="95" value="65">
        <button onclick="resetPositions()">Reset Button Positions</button>
        <button onclick="saveConfig()">Save Config</button>
        <button onclick="loadConfig()">Load Config</button>
    </div>
    
    <div class="controls" id="controls">
        <div class="btn esc" data-key="Escape">ESC</div>
        <div class="joy"><div class="joy-stick"></div></div>
        <div class="camera"><div class="camera-stick"></div></div>
        <div class="btn a" data-key="KeyZ">A</div>
        <div class="btn b" data-key="KeyX">B</div>
        <div class="btn lclick" data-mouse="left">L</div>
        <div class="btn rclick" data-mouse="right">R</div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const gameUrl = urlParams.get('url');
        const gameFrame = document.getElementById('game');
        const controlsDiv = document.getElementById('controls');
        
        let activeKeys = new Set();
        let joyActive = false;
        let joyTouchId = null;
        let joyCurrentKeys = { up: false, down: false, left: false, right: false };
        let cameraActive = false;
        let cameraTouchId = null;
        let cameraSensitivity = 4;
        let dragMode = false;
        let draggedBtn = null;
        let dragStartX = 0, dragStartY = 0;
        let buttonSize = 1;
        let buttonOpacity = 0.65;
        
        // Check if game is same origin - if not, HIDE controller completely
        function checkAndHideIfCrossOrigin() {
            if (!gameUrl) {
                controlsDiv.style.display = 'none';
                return false;
            }
            
            try {
                // Test if we can access the iframe
                gameFrame.contentWindow.document;
                // Same origin - show controller
                controlsDiv.style.display = 'block';
                return true;
            } catch (e) {
                // Cross origin - hide controller completely
                controlsDiv.style.display = 'none';
                return false;
            }
        }
        
        function getGameWin() {
            try {
                return gameFrame.contentWindow;
            } catch(e) { return null; }
        }
        
        function getGameDoc() {
            try {
                return gameFrame.contentWindow.document;
            } catch(e) { return null; }
        }
        
        function sendKeyEvent(type, code) {
            try {
                const win = getGameWin();
                const doc = getGameDoc();
                if (!win || !doc) return;
                
                let event = new KeyboardEvent(type, {
                    code: code,
                    key: code.replace('Key', '').toLowerCase(),
                    bubbles: true,
                    cancelable: true
                });
                win.dispatchEvent(event);
                doc.dispatchEvent(event);
            } catch(e) {}
        }
        
        function sendMouseEvent(type, button, x, y) {
            try {
                const doc = getGameDoc();
                if (!doc) return;
                
                let event = new MouseEvent(type, {
                    button: button === 'left' ? 0 : 2,
                    buttons: button === 'left' ? 1 : 2,
                    clientX: x || 0,
                    clientY: y || 0,
                    bubbles: true,
                    cancelable: true
                });
                let canvas = doc.querySelector('canvas');
                if (canvas) canvas.dispatchEvent(event);
                doc.dispatchEvent(event);
            } catch(e) {}
        }
        
        function handleButtonStart(btn, key, mouseBtn) {
            if (key) {
                if (!activeKeys.has(key)) {
                    activeKeys.add(key);
                    sendKeyEvent('keydown', key);
                }
            } else if (mouseBtn) {
                sendMouseEvent('mousedown', mouseBtn);
            }
            btn.classList.add('active');
        }
        
        function handleButtonEnd(btn, key, mouseBtn) {
            if (key) {
                if (activeKeys.has(key)) {
                    activeKeys.delete(key);
                    sendKeyEvent('keyup', key);
                }
            } else if (mouseBtn) {
                sendMouseEvent('mouseup', mouseBtn);
            }
            btn.classList.remove('active');
        }
        
        function setupButton(btn) {
            const key = btn.dataset.key;
            const mouseBtn = btn.dataset.mouse;
            
            btn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                e.stopPropagation();
                handleButtonStart(btn, key, mouseBtn);
            });
            
            btn.addEventListener('touchend', (e) => {
                e.preventDefault();
                e.stopPropagation();
                handleButtonEnd(btn, key, mouseBtn);
            });
            
            btn.addEventListener('mousedown', (e) => {
                e.preventDefault();
                handleButtonStart(btn, key, mouseBtn);
            });
            
            btn.addEventListener('mouseup', (e) => {
                e.preventDefault();
                handleButtonEnd(btn, key, mouseBtn);
            });
            
            btn.addEventListener('mouseleave', () => {
                handleButtonEnd(btn, key, mouseBtn);
            });
        }
        
        // Joystick
        const joyEl = document.querySelector('.joy');
        const joyStick = document.querySelector('.joy-stick');
        
        function updateJoystick(touchX, touchY) {
            const rect = joyEl.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            let dx = touchX - centerX;
            let dy = touchY - centerY;
            const maxDist = rect.width / 2 - 25;
            const dist = Math.min(Math.hypot(dx, dy), maxDist);
            if (dist > 0 && Math.hypot(dx, dy) > 0) {
                dx = dx / Math.hypot(dx, dy) * dist;
                dy = dy / Math.hypot(dx, dy) * dist;
            }
            joyStick.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
            
            const threshold = 15;
            const newState = {
                up: dy < -threshold,
                down: dy > threshold,
                left: dx < -threshold,
                right: dx > threshold
            };
            
            const keyMap = { up: 'KeyW', down: 'KeyS', left: 'KeyA', right: 'KeyD' };
            
            for (let dir of ['up', 'down', 'left', 'right']) {
                if (newState[dir] && !joyCurrentKeys[dir]) {
                    joyCurrentKeys[dir] = true;
                    sendKeyEvent('keydown', keyMap[dir]);
                } else if (!newState[dir] && joyCurrentKeys[dir]) {
                    joyCurrentKeys[dir] = false;
                    sendKeyEvent('keyup', keyMap[dir]);
                }
            }
        }
        
        function releaseJoystick() {
            joyStick.style.transform = 'translate(-50%, -50%)';
            const keyMap = { up: 'KeyW', down: 'KeyS', left: 'KeyA', right: 'KeyD' };
            for (let dir of ['up', 'down', 'left', 'right']) {
                if (joyCurrentKeys[dir]) {
                    joyCurrentKeys[dir] = false;
                    sendKeyEvent('keyup', keyMap[dir]);
                }
            }
            joyActive = false;
            joyTouchId = null;
        }
        
        joyEl.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (!joyActive) {
                joyActive = true;
                joyTouchId = e.changedTouches[0].identifier;
                updateJoystick(e.changedTouches[0].clientX, e.changedTouches[0].clientY);
            }
        });
        
        joyEl.addEventListener('mousedown', (e) => {
            e.preventDefault();
            joyActive = true;
            updateJoystick(e.clientX, e.clientY);
        });
        
        // Camera
        const cameraEl = document.querySelector('.camera');
        const cameraStick = document.querySelector('.camera-stick');
        
        function updateCamera(touchX, touchY) {
            const rect = cameraEl.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            let dx = touchX - centerX;
            let dy = touchY - centerY;
            const maxDist = rect.width / 2 - 25;
            const dist = Math.min(Math.hypot(dx, dy), maxDist);
            if (dist > 0 && Math.hypot(dx, dy) > 0) {
                dx = dx / Math.hypot(dx, dy) * dist;
                dy = dy / Math.hypot(dx, dy) * dist;
            }
            cameraStick.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
            
            const moveX = (dx / maxDist) * cameraSensitivity;
            const moveY = (dy / maxDist) * cameraSensitivity;
            
            if ((Math.abs(moveX) > 0.01 || Math.abs(moveY) > 0.01)) {
                try {
                    const doc = getGameDoc();
                    if (doc) {
                        let moveEvent = new MouseEvent('mousemove', {
                            movementX: moveX,
                            movementY: moveY,
                            bubbles: true
                        });
                        let canvas = doc.querySelector('canvas');
                        if (canvas) canvas.dispatchEvent(moveEvent);
                    }
                } catch(e) {}
            }
        }
        
        function releaseCamera() {
            cameraStick.style.transform = 'translate(-50%, -50%)';
            cameraActive = false;
            cameraTouchId = null;
        }
        
        cameraEl.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (!cameraActive) {
                cameraActive = true;
                cameraTouchId = e.changedTouches[0].identifier;
                updateCamera(e.changedTouches[0].clientX, e.changedTouches[0].clientY);
            }
        });
        
        cameraEl.addEventListener('mousedown', (e) => {
            e.preventDefault();
            cameraActive = true;
            updateCamera(e.clientX, e.clientY);
        });
        
        // Global touch handlers
        document.addEventListener('touchmove', (e) => {
            for (let touch of e.changedTouches) {
                if (joyActive && touch.identifier === joyTouchId) {
                    e.preventDefault();
                    updateJoystick(touch.clientX, touch.clientY);
                }
                if (cameraActive && touch.identifier === cameraTouchId) {
                    e.preventDefault();
                    updateCamera(touch.clientX, touch.clientY);
                }
            }
        });
        
        document.addEventListener('touchend', (e) => {
            for (let touch of e.changedTouches) {
                if (joyActive && touch.identifier === joyTouchId) releaseJoystick();
                if (cameraActive && touch.identifier === cameraTouchId) releaseCamera();
            }
        });
        
        document.addEventListener('mousemove', (e) => {
            if (joyActive) updateJoystick(e.clientX, e.clientY);
            if (cameraActive) updateCamera(e.clientX, e.clientY);
        });
        
        document.addEventListener('mouseup', () => {
            if (joyActive) releaseJoystick();
            if (cameraActive) releaseCamera();
        });
        
        // Drag to reposition
        function startDrag(e, btn) {
            if (!dragMode) return;
            e.preventDefault();
            draggedBtn = btn;
            const rect = btn.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            dragStartX = clientX - rect.left;
            dragStartY = clientY - rect.top;
            btn.style.left = rect.left + 'px';
            btn.style.top = rect.top + 'px';
            btn.style.right = 'auto';
            btn.style.bottom = 'auto';
        }
        
        function onDrag(e) {
            if (!draggedBtn) return;
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            draggedBtn.style.left = (clientX - dragStartX) + 'px';
            draggedBtn.style.top = (clientY - dragStartY) + 'px';
        }
        
        function endDrag() { draggedBtn = null; }
        
        document.querySelectorAll('.btn').forEach(btn => {
            btn.addEventListener('touchstart', (e) => startDrag(e, btn));
            btn.addEventListener('mousedown', (e) => startDrag(e, btn));
        });
        document.addEventListener('touchmove', onDrag);
        document.addEventListener('mousemove', onDrag);
        document.addEventListener('touchend', endDrag);
        document.addEventListener('mouseup', endDrag);
        
        // UI Functions
        window.toggleDragMode = function() {
            dragMode = !dragMode;
            document.querySelectorAll('.btn').forEach(btn => {
                if (dragMode) btn.style.border = '2px dashed rgb(100,200,180)';
                else btn.style.border = '';
            });
        };
        
        window.togglePanel = () => document.getElementById('panel').classList.toggle('open');
        
        function applyScale() {
            document.querySelectorAll('.btn').forEach(btn => {
                if (!btn.dataset.origW) {
                    btn.dataset.origW = btn.offsetWidth;
                    btn.dataset.origH = btn.offsetHeight;
                }
                btn.style.width = (parseFloat(btn.dataset.origW) * buttonSize) + 'px';
                btn.style.height = (parseFloat(btn.dataset.origH) * buttonSize) + 'px';
                btn.style.fontSize = (13 * buttonSize) + 'px';
            });
            const sticks = document.querySelectorAll('.joy-stick, .camera-stick');
            sticks.forEach(stick => {
                if (!stick.dataset.origSize) stick.dataset.origSize = 50;
                stick.style.width = (parseFloat(stick.dataset.origSize) * buttonSize) + 'px';
                stick.style.height = (parseFloat(stick.dataset.origSize) * buttonSize) + 'px';
            });
        }
        
        function applyOpacity() {
            document.querySelectorAll('.btn').forEach(btn => {
                btn.style.opacity = buttonOpacity;
            });
        }
        
        function updateSize() {
            const val = document.getElementById('sizeSlider').value;
            buttonSize = val / 100;
            document.getElementById('sizeVal').innerText = val + '%';
            applyScale();
            saveConfig();
        }
        
        function updateOpacity() {
            const val = document.getElementById('opacitySlider').value;
            buttonOpacity = val / 100;
            document.getElementById('opacityVal').innerText = val + '%';
            applyOpacity();
            saveConfig();
        }
        
        window.resetPositions = () => {
            localStorage.removeItem('btnPositions');
            location.reload();
        };
        
        window.saveConfig = () => {
            const positions = {};
            document.querySelectorAll('.btn').forEach((btn, i) => {
                positions[i] = {
                    left: btn.style.left,
                    top: btn.style.top,
                    right: btn.style.right,
                    bottom: btn.style.bottom
                };
            });
            localStorage.setItem('btnPositions', JSON.stringify(positions));
            localStorage.setItem('controllerSize', buttonSize);
            localStorage.setItem('controllerOpacity', buttonOpacity);
        };
        
        window.loadConfig = () => {
            const positions = localStorage.getItem('btnPositions');
            if (positions) {
                const pos = JSON.parse(positions);
                document.querySelectorAll('.btn').forEach((btn, i) => {
                    if (pos[i]) {
                        btn.style.left = pos[i].left;
                        btn.style.top = pos[i].top;
                        btn.style.right = pos[i].right;
                        btn.style.bottom = pos[i].bottom;
                    }
                });
            }
            const savedSize = localStorage.getItem('controllerSize');
            if (savedSize) {
                buttonSize = parseFloat(savedSize);
                document.getElementById('sizeSlider').value = buttonSize * 100;
                applyScale();
                document.getElementById('sizeVal').innerText = Math.round(buttonSize * 100) + '%';
            }
            const savedOpacity = localStorage.getItem('controllerOpacity');
            if (savedOpacity) {
                buttonOpacity = parseFloat(savedOpacity);
                document.getElementById('opacitySlider').value = buttonOpacity * 100;
                applyOpacity();
                document.getElementById('opacityVal').innerText = Math.round(buttonOpacity * 100) + '%';
            }
        };
        
        // Initialize
        document.querySelectorAll('.btn').forEach(setupButton);
        document.querySelectorAll('.btn').forEach(btn => {
            btn.dataset.origW = btn.offsetWidth;
            btn.dataset.origH = btn.offsetHeight;
        });
        document.querySelectorAll('.joy-stick, .camera-stick').forEach(stick => {
            stick.dataset.origSize = 50;
        });
        
        document.getElementById('sizeSlider').addEventListener('input', updateSize);
        document.getElementById('opacitySlider').addEventListener('input', updateOpacity);
        
        loadConfig();
        
        // Set iframe and check origin (silently hide if cross-origin)
        if (gameUrl) {
            gameFrame.onload = () => {
                setTimeout(checkAndHideIfCrossOrigin, 100);
            };
            gameFrame.src = gameUrl;
        } else {
            controlsDiv.style.display = 'none';
        }
    </script>
</body>
</html>
