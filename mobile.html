<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>GOONGAMES</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');
    :root {
      --pri: 59, 130, 246;       /* blue-500 */
      --pri2: 99, 179, 237;      /* lighter blue */
      --op: 0.72;
      --handle: 46px;
      --bg-panel: rgba(10,15,30,0.96);
      --border: rgba(255,255,255,0.18);
    }
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins',sans-serif; }
    body { background:#000; overflow:hidden; }
    #game { position:fixed; inset:0; width:100%; height:100%; border:none; }

    /* ── NOTIFICATION ── */
    #gm-notif {
      display:none; position:fixed; top:20px; left:50%; transform:translateX(-50%);
      background:rgba(239,68,68,0.92); color:#fff; padding:10px 22px;
      border-radius:20px; font-size:13px; font-weight:600; z-index:99999;
      backdrop-filter:blur(8px); white-space:nowrap;
      box-shadow:0 4px 20px rgba(0,0,0,0.4);
    }

    /* ── CONTROLS LAYER ── */
    #gm-controls {
      display:none;
      position:fixed; inset:0; z-index:9999;
      pointer-events:none; /* children opt in */
    }
    #gm-controls.on { display:block; }

    /* ── JOYSTICK BASE ── */
    .gm-stick {
      position:absolute;
      border-radius:50%;
      pointer-events:all;
      touch-action:none;
      width:120px; height:120px;
      background:rgba(255,255,255,0.08);
      border:1.5px solid rgba(var(--pri2),0.4);
      box-shadow:0 4px 24px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.08);
      backdrop-filter:blur(8px);
      opacity:var(--op);
    }
    .gm-stick.active { border-color:rgba(var(--pri),0.7); }
    .gm-knob {
      position:absolute; top:50%; left:50%;
      transform:translate(-50%,-50%);
      width:var(--handle); height:var(--handle);
      border-radius:50%; pointer-events:none;
      background:radial-gradient(circle at 35% 30%, rgba(var(--pri2),0.9), rgba(var(--pri),0.6));
      box-shadow:0 2px 10px rgba(var(--pri),0.5), 0 0 0 2px rgba(255,255,255,0.15);
    }
    .gm-stick.active .gm-knob {
      background:radial-gradient(circle at 35% 30%, #93c5fd, #2563eb);
      box-shadow:0 2px 16px rgba(37,99,235,0.8), 0 0 0 2px rgba(147,197,253,0.5);
    }
    /* direction ticks */
    .gm-tick { position:absolute; width:4px; height:4px; border-radius:50%; background:rgba(255,255,255,0.15); transform:translate(-50%,-50%); }

    #gm-ls { bottom:28px; left:20px; }
    #gm-rs { bottom:28px; right:20px; }

    /* ── BUTTONS ── */
    .gm-btn {
      position:absolute;
      pointer-events:all; touch-action:none;
      display:flex; align-items:center; justify-content:center;
      flex-direction:column; gap:1px;
      font-weight:800; font-size:11px; letter-spacing:.04em;
      color:rgba(255,255,255,0.92);
      border-radius:12px;
      border:1.5px solid rgba(255,255,255,0.18);
      backdrop-filter:blur(10px);
      box-shadow:0 4px 16px rgba(0,0,0,0.45), inset 0 1px 0 rgba(255,255,255,0.12);
      opacity:var(--op);
      user-select:none;
      transition:transform .07s, filter .07s;
    }
    .gm-btn.pressed { transform:scale(0.87)!important; filter:brightness(1.4); }
    .gm-btn.drag-mode { outline:2px solid rgba(var(--pri),0.8); }
    .gm-stick.drag-mode { outline:2px solid rgba(var(--pri),0.8); }

    /* default positions & colors */
    #gm-lmb   { background:rgba(29,78,216,0.6);   width:58px; height:36px; right:152px; bottom:168px; border-radius:10px; }
    #gm-rmb   { background:rgba(109,40,217,0.6);  width:58px; height:36px; right:152px; bottom:122px; border-radius:10px; }
    #gm-space { background:rgba(4,120,87,0.6);     width:86px; height:34px; border-radius:18px;
                left:50%; bottom:20px; transform:translateX(-50%); }
    #gm-esc   { background:rgba(185,28,28,0.6);   width:48px; height:28px; border-radius:8px;
                font-size:10px; left:16px; top:16px; }
    #gm-gear  { background:rgba(15,20,40,0.8);    width:40px; height:40px; border-radius:50%;
                font-size:18px; right:16px; top:16px; }

    /* ── SWIPE CAMERA ZONE ── */
    #gm-swipe {
      display:none;
      position:absolute; inset:0;
      pointer-events:all; touch-action:none;
      z-index:-1; /* behind buttons but in controls layer */
    }
    #gm-swipe.on { display:block; }

    /* ── SETTINGS PANEL ── */
    #gm-panel {
      position:fixed; bottom:0; left:0; right:0; z-index:10001;
      background:var(--bg-panel);
      border-top:1px solid rgba(var(--pri),0.2);
      border-radius:22px 22px 0 0;
      transform:translateY(100%);
      transition:transform .32s cubic-bezier(.32,1.1,.56,.98);
      max-height:82vh; overflow-y:auto;
      padding-bottom:env(safe-area-inset-bottom,0);
      pointer-events:all;
    }
    #gm-panel.open { transform:translateY(0); }
    #gm-bd {
      display:none; position:fixed; inset:0; z-index:10000;
      background:rgba(0,0,0,0.6); backdrop-filter:blur(3px);
      pointer-events:all;
    }
    #gm-bd.open { display:block; }
    .gp-hd { padding:16px 20px 0; display:flex; justify-content:space-between; align-items:center; }
    .gp-div { height:1px; background:rgba(255,255,255,0.07); margin:12px 0 0; }
    .gp-row { display:flex; justify-content:space-between; align-items:center; padding:13px 20px; border-bottom:1px solid rgba(255,255,255,0.05); }
    .gp-row:last-child { border:none; }
    .gp-row.col { flex-direction:column; align-items:flex-start; }
    .gp-lbl { font-size:13px; font-weight:600; color:#e2e8f0; }
    .gp-sub { font-size:10px; color:rgba(255,255,255,0.3); margin-top:2px; }
    .gp-sel { background:#0f172a; border:1px solid rgba(255,255,255,0.12); color:#e2e8f0; border-radius:8px; padding:6px 10px; font-size:12px; outline:none; }
    .gp-tog { width:44px; height:24px; border-radius:12px; background:#1e293b; border:1px solid rgba(255,255,255,0.1); position:relative; cursor:pointer; flex-shrink:0; transition:background .2s; }
    .gp-tog.on { background:rgb(var(--pri)); }
    .gp-tog::after { content:''; position:absolute; top:3px; left:3px; width:16px; height:16px; border-radius:50%; background:#fff; transition:transform .2s; box-shadow:0 1px 3px rgba(0,0,0,.3); }
    .gp-tog.on::after { transform:translateX(20px); }
    .gp-slider { width:100%; accent-color:rgb(var(--pri)); margin-top:8px; cursor:pointer; }
    .gp-chip { padding:5px 12px; border-radius:8px; border:1.5px solid rgba(255,255,255,0.15); background:rgba(255,255,255,0.06); color:#e2e8f0; font-size:11px; font-weight:700; cursor:pointer; transition:background .15s; }
    .gp-chip.on { background:rgb(var(--pri)); border-color:rgb(var(--pri)); }
    .gp-input { width:100%; padding:9px 12px; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.12); border-radius:8px; color:#e2e8f0; font-size:12px; margin-top:8px; outline:none; }
    .gp-input:focus { border-color:rgba(var(--pri),0.6); }
    select.gp-input option { background:#0f172a; }
    .gp-done-btn { background:#0f172a; border:none; color:#e2e8f0; border-radius:8px; padding:7px 16px; font-size:12px; font-weight:700; cursor:pointer; }
    .gp-add-btn { margin-top:8px; width:100%; padding:9px; background:rgba(var(--pri),0.15); border:1px solid rgba(var(--pri),0.3); border-radius:8px; color:#e2e8f0; font-size:12px; font-weight:600; cursor:pointer; }
    .gp-key-item { display:flex; justify-content:space-between; align-items:center; padding:8px 10px; background:rgba(255,255,255,0.04); border-radius:6px; margin-top:6px; font-size:12px; color:#e2e8f0; }
    .gp-del { background:none; border:none; color:rgba(255,255,255,0.4); font-size:16px; cursor:pointer; padding:0 4px; }
    .gp-del:hover { color:#ef4444; }
  </style>
</head>
<body>
  <iframe id="game" allow="autoplay; fullscreen; gamepad"></iframe>
  <div id="gm-notif"></div>

  <!-- ═══ GAMEPAD OVERLAY ══════════════════════════════════ -->
  <div id="gm-controls">
    <!-- Swipe camera zone (behind everything) -->
    <div id="gm-swipe"></div>

    <!-- Left stick (movement) -->
    <div id="gm-ls" class="gm-stick">
      <div class="gm-tick" style="top:10%;left:50%"></div>
      <div class="gm-tick" style="top:90%;left:50%"></div>
      <div class="gm-tick" style="top:50%;left:10%"></div>
      <div class="gm-tick" style="top:50%;left:90%"></div>
      <div class="gm-knob" id="gm-lk"></div>
    </div>

    <!-- Right stick (camera/mouse) -->
    <div id="gm-rs" class="gm-stick">
      <div class="gm-tick" style="top:10%;left:50%"></div>
      <div class="gm-tick" style="top:90%;left:50%"></div>
      <div class="gm-tick" style="top:50%;left:10%"></div>
      <div class="gm-tick" style="top:50%;left:90%"></div>
      <div class="gm-knob" id="gm-rk"></div>
    </div>

    <!-- Action buttons -->
    <div id="gm-lmb"   class="gm-btn">LMB</div>
    <div id="gm-rmb"   class="gm-btn">RMB</div>
    <div id="gm-space" class="gm-btn">SPACE</div>
    <div id="gm-esc"   class="gm-btn">ESC</div>
    <div id="gm-gear"  class="gm-btn">⚙️</div>
  </div>

  <!-- ═══ SETTINGS PANEL ═══════════════════════════════════ -->
  <div id="gm-bd"></div>
  <div id="gm-panel">
    <div class="gp-hd">
      <span style="font-size:15px;font-weight:800;color:#e2e8f0">🎮 Gamepad</span>
      <button class="gp-done-btn" id="gm-done">Done</button>
    </div>
    <div class="gp-div"></div>

    <!-- Left stick mode -->
    <div class="gp-row">
      <div><div class="gp-lbl">Left stick</div><div class="gp-sub">Movement keys</div></div>
      <div style="display:flex;gap:6px">
        <button class="gp-chip" id="ch-wasd"  onclick="GM.setLmode('wasd')">WASD</button>
        <button class="gp-chip" id="ch-arrow" onclick="GM.setLmode('arrow')">Arrows</button>
        <button class="gp-chip" id="ch-both"  onclick="GM.setLmode('both')">Both</button>
      </div>
    </div>

    <!-- Right stick mode -->
    <div class="gp-row">
      <div><div class="gp-lbl">Right stick</div><div class="gp-sub">Camera / mouse</div></div>
      <div style="display:flex;gap:6px">
        <button class="gp-chip" id="ch-stick"  onclick="GM.setRmode('stick')">Stick</button>
        <button class="gp-chip" id="ch-swipe"  onclick="GM.setRmode('swipe')">Swipe</button>
      </div>
    </div>

    <!-- Camera sensitivity -->
    <div class="gp-row col">
      <div class="gp-lbl">Camera sensitivity &nbsp;<span id="gm-sv" style="opacity:.4;font-weight:400"></span></div>
      <input type="range" class="gp-slider" id="gm-ss" min="1" max="14" step="0.5">
    </div>

    <!-- Optimize click -->
    <div class="gp-row">
      <div><div class="gp-lbl">Optimize click</div><div class="gp-sub">Touch → mouse click on game</div></div>
      <div class="gp-tog" id="tog-optclick" onclick="GM.toggle('optclick')"></div>
    </div>

    <!-- Size -->
    <div class="gp-row col">
      <div class="gp-lbl">UI Size &nbsp;<span id="gm-szv" style="opacity:.4;font-weight:400"></span></div>
      <input type="range" class="gp-slider" id="gm-szs" min="60" max="150" step="5">
    </div>

    <!-- Opacity -->
    <div class="gp-row col">
      <div class="gp-lbl">Opacity &nbsp;<span id="gm-opv" style="opacity:.4;font-weight:400"></span></div>
      <input type="range" class="gp-slider" id="gm-ops" min="15" max="100" step="5">
    </div>

    <!-- Hide UI -->
    <div class="gp-row">
      <div><div class="gp-lbl">Hide UI</div><div class="gp-sub">Active but invisible</div></div>
      <div class="gp-tog" id="tog-hide" onclick="GM.toggle('hide')"></div>
    </div>

    <!-- Move controls -->
    <div class="gp-row">
      <div><div class="gp-lbl">Move controls</div><div class="gp-sub">Drag to reposition</div></div>
      <button class="gp-chip" id="ch-drag" onclick="GM.toggleDrag()">Move</button>
    </div>

    <!-- Reset -->
    <div class="gp-row">
      <div><div class="gp-lbl">Reset positions</div></div>
      <button class="gp-chip" onclick="GM.resetPos()">Reset</button>
    </div>

    <!-- Extra keys -->
    <div class="gp-row col">
      <div class="gp-lbl">Add extra button</div>
      <input type="text" class="gp-input" id="gm-klabel" placeholder="Label (e.g. Reload)">
      <select class="gp-input" id="gm-kkey">
        <option value="r">R</option><option value="e">E</option><option value="f">F</option>
        <option value="q">Q</option><option value="c">C</option><option value="v">V</option>
        <option value="g">G</option><option value="h">H</option><option value="t">T</option>
        <option value="z">Z</option><option value="x">X</option>
        <option value="1">1</option><option value="2">2</option><option value="3">3</option>
        <option value="4">4</option><option value="5">5</option>
        <option value="Enter">Enter</option><option value="Shift">Shift</option>
        <option value="Control">Ctrl</option><option value="Tab">Tab</option>
      </select>
      <button class="gp-add-btn" onclick="GM.addKey()">+ Add Button</button>
      <div id="gm-keylist"></div>
    </div>

    <div style="height:24px"></div>
  </div>

  <script>
  var GM = (function(){
    var cfg = {
      lmode:'both', rmode:'stick', sens:4, size:100, opacity:72,
      hide:false, drag:false, optclick:false,
      extraKeys:[]
    };
    var PK='gm_pos', CK='gm_cfg';
    function sc(){ try{localStorage.setItem(CK,JSON.stringify(cfg));}catch(e){} }
    function lc(){ try{var s=JSON.parse(localStorage.getItem(CK)||'{}');for(var k in s)if(k in cfg)cfg[k]=s[k];}catch(e){} }

    var gameFrame = document.getElementById('game');
    var lsTid=null, rsTid=null;
    var rsVx=0, rsVy=0, rsRAF=null;
    var swipeTid=null, swipeLx=0, swipeLy=0;
    var heldKeys={};
    var btnMap={};
    var optHandler=null;
    var dragEl=null, doff={x:0,y:0};

    // ── KEY CODES ────────────────────────────────────────
    function kc(k){
      var m={'w':87,'a':65,'s':83,'d':68,'ArrowUp':38,'ArrowDown':40,'ArrowLeft':37,'ArrowRight':39,
             ' ':32,'Escape':27,'Enter':13,'Shift':16,'Control':17,'Tab':9,
             'r':82,'e':69,'f':70,'q':81,'c':67,'v':86,'g':71,'h':72,'t':84,'z':90,'x':88,
             '1':49,'2':50,'3':51,'4':52,'5':53};
      return m[k]||(k.length===1?k.charCodeAt(0):0);
    }

    // ── DISPATCH — to loader.html window ────────────────
    function sendKey(type,k){
      var nk=k,code=k;
      if(k==='Space'){nk=' ';code='Space';}
      else if(k.length===1){nk=k.toLowerCase();code='Key'+k.toUpperCase();}
      var ev=new KeyboardEvent(type,{key:nk,code:code,keyCode:kc(nk),which:kc(nk),bubbles:true,cancelable:true,composed:true});
      try{
        var w=gameFrame.contentWindow,d=w&&w.document;
        if(w)w.dispatchEvent(ev);
        if(d){d.dispatchEvent(ev);if(d.body)d.body.dispatchEvent(ev);if(d.activeElement&&d.activeElement!==d.body)d.activeElement.dispatchEvent(ev);}
      }catch(e){}
    }
    function sendMouse(type,btn){
      var bc=btn==='right'?2:0,bt=btn==='right'?2:1;
      var ev=new MouseEvent(type,{button:bc,buttons:bt,bubbles:true,cancelable:true,composed:true});
      try{
        var w=gameFrame.contentWindow,d=w&&w.document;
        if(w)w.dispatchEvent(ev);
        if(d){var c=d.querySelector('canvas');if(c)c.dispatchEvent(ev);else d.dispatchEvent(ev);}
        if(type==='mouseup'&&bc===0){
          var ce=new MouseEvent('click',{button:0,bubbles:true,cancelable:true});
          try{var d2=gameFrame.contentWindow.document;var c2=d2.querySelector('canvas');if(c2)c2.dispatchEvent(ce);else d2.dispatchEvent(ce);}catch(e2){}
        }
      }catch(e){}
    }
    function sendMove(mx,my){
      var ev=new MouseEvent('mousemove',{movementX:mx,movementY:my,bubbles:true,cancelable:true,composed:true});
      try{
        var w=gameFrame.contentWindow,d=w&&w.document;
        if(w)w.dispatchEvent(ev);
        if(d){var c=d.querySelector('canvas');if(c)c.dispatchEvent(ev);else d.dispatchEvent(ev);}
      }catch(e){}
    }

    function press(k){if(!heldKeys[k]){heldKeys[k]=true;sendKey('keydown',k);}}
    function release(k){if(heldKeys[k]){heldKeys[k]=false;sendKey('keyup',k);}}
    var moveKeys=['w','a','s','d','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'];
    function releaseMove(){moveKeys.forEach(function(k){release(k);});}

    // ── LEFT STICK ───────────────────────────────────────
    function lsKeys(){
      if(cfg.lmode==='wasd') return{u:'w',d:'s',l:'a',r:'d'};
      if(cfg.lmode==='arrow')return{u:'ArrowUp',d:'ArrowDown',l:'ArrowLeft',r:'ArrowRight'};
      return{u:['w','ArrowUp'],d:['s','ArrowDown'],l:['a','ArrowLeft'],r:['d','ArrowRight']};
    }
    function applyDir(keys,on){
      if(!Array.isArray(keys))keys=[keys];
      keys.forEach(function(k){on?press(k):release(k);});
    }
    function processLS(touch){
      var el=document.getElementById('gm-ls'),knob=document.getElementById('gm-lk');
      var r=el.getBoundingClientRect(),cx=r.left+r.width/2,cy=r.top+r.height/2;
      var dx=touch.clientX-cx,dy=touch.clientY-cy,dist=Math.sqrt(dx*dx+dy*dy);
      var ksz=knob.offsetWidth||40,maxD=r.width/2-ksz/2;
      if(dist>maxD){dx=dx/dist*maxD;dy=dy/dist*maxD;}
      knob.style.transform='translate(calc(-50% + '+dx+'px),calc(-50% + '+dy+'px))';
      el.classList.add('active');
      var thr=16*(cfg.size/100),k=lsKeys();
      applyDir(k.u,dy<-thr);applyDir(k.d,dy>thr);
      applyDir(k.l,dx<-thr);applyDir(k.r,dx>thr);
    }
    function releaseLS(){
      var el=document.getElementById('gm-ls'),knob=document.getElementById('gm-lk');
      if(el)el.classList.remove('active');
      if(knob)knob.style.transform='translate(-50%,-50%)';
      releaseMove();lsTid=null;
    }

    // ── RIGHT STICK (mouse move) ─────────────────────────
    function rsLoop(){
      if(rsTid===null){rsRAF=null;rsVx=rsVy=0;return;}
      sendMove(rsVx,rsVy);
      rsRAF=requestAnimationFrame(rsLoop);
    }
    function processRS(touch){
      var el=document.getElementById('gm-rs'),knob=document.getElementById('gm-rk');
      var r=el.getBoundingClientRect(),cx=r.left+r.width/2,cy=r.top+r.height/2;
      var dx=touch.clientX-cx,dy=touch.clientY-cy,dist=Math.sqrt(dx*dx+dy*dy);
      var ksz=knob.offsetWidth||40,maxD=r.width/2-ksz/2;
      if(dist>maxD){dx=dx/dist*maxD;dy=dy/dist*maxD;}
      knob.style.transform='translate(calc(-50% + '+dx+'px),calc(-50% + '+dy+'px))';
      el.classList.add('active');
      rsVx=(dx/maxD)*cfg.sens;rsVy=(dy/maxD)*cfg.sens;
      if(!rsRAF)rsRAF=requestAnimationFrame(rsLoop);
    }
    function releaseRS(){
      var el=document.getElementById('gm-rs'),knob=document.getElementById('gm-rk');
      if(el)el.classList.remove('active');
      if(knob)knob.style.transform='translate(-50%,-50%)';
      rsVx=0;rsVy=0;rsTid=null;
    }

    // ── SWIPE CAMERA ─────────────────────────────────────
    function bindSwipe(){
      var sw=document.getElementById('gm-swipe');
      sw.addEventListener('touchstart',function(e){
        if(swipeTid!==null)return;
        var t=e.changedTouches[0];
        swipeTid=t.identifier;swipeLx=t.clientX;swipeLy=t.clientY;
      },{passive:true});
      sw.addEventListener('touchmove',function(e){
        for(var i=0;i<e.changedTouches.length;i++){
          var t=e.changedTouches[i];
          if(t.identifier!==swipeTid)continue;
          var dx=(t.clientX-swipeLx)*cfg.sens*0.5;
          var dy=(t.clientY-swipeLy)*cfg.sens*0.5;
          sendMove(dx,dy);
          swipeLx=t.clientX;swipeLy=t.clientY;
        }
      },{passive:true});
      sw.addEventListener('touchend',function(e){
        for(var i=0;i<e.changedTouches.length;i++)if(e.changedTouches[i].identifier===swipeTid)swipeTid=null;
      },{passive:true});
      sw.addEventListener('touchcancel',function(e){swipeTid=null;},{passive:true});
    }

    // ── BUTTON ATTACH ────────────────────────────────────
    function attachBtn(el,onDown,onUp){
      el.addEventListener('touchstart',function(e){
        if(cfg.drag)return;
        el.classList.add('pressed');
        for(var i=0;i<e.changedTouches.length;i++)btnMap[e.changedTouches[i].identifier]={el:el,onUp:onUp};
        onDown();
      },{passive:true});
      function up(e){
        el.classList.remove('pressed');
        for(var i=0;i<e.changedTouches.length;i++)delete btnMap[e.changedTouches[i].identifier];
        onUp();
      }
      el.addEventListener('touchend',up,{passive:true});
      el.addEventListener('touchcancel',up,{passive:true});
    }

    // ── OPTIMIZE CLICK ───────────────────────────────────
    function setupOptclick(){
      if(optHandler){document.removeEventListener('touchend',optHandler);optHandler=null;}
      if(!cfg.optclick)return;
      optHandler=function(e){
        for(var i=0;i<e.changedTouches.length;i++){
          var t=e.changedTouches[i];
          var el=document.elementFromPoint(t.clientX,t.clientY);
          if(el!==gameFrame)continue;
          sendMouse('mousedown','left');
          sendMouse('mouseup','left');
        }
      };
      document.addEventListener('touchend',optHandler,{passive:true});
    }

    // ── DRAG ─────────────────────────────────────────────
    function startDrag(e){
      if(!cfg.drag)return;
      var t=e.target&&(e.target.closest?e.target.closest('.gm-btn,.gm-stick'):null);
      if(!t)return;
      var r=t.getBoundingClientRect(),c=e.touches?e.touches[0]:e;
      dragEl=t;doff.x=c.clientX-r.left;doff.y=c.clientY-r.top;
      t.style.right='auto';t.style.bottom='auto';t.style.transform='none';
      t.style.left=r.left+'px';t.style.top=r.top+'px';
    }
    function moveDrag(e){
      if(!dragEl)return;
      var c=e.touches?e.touches[0]:e;
      dragEl.style.left=(c.clientX-doff.x)+'px';
      dragEl.style.top=(c.clientY-doff.y)+'px';
    }
    function endDrag(){if(dragEl){dragEl=null;savePos();}}

    document.addEventListener('mousedown',startDrag);
    document.addEventListener('touchstart',startDrag,{passive:true});
    document.addEventListener('mousemove',moveDrag);
    document.addEventListener('touchmove',moveDrag,{passive:true});
    document.addEventListener('mouseup',endDrag);
    document.addEventListener('touchend',endDrag,{passive:true});

    function savePos(){
      var ids=['gm-ls','gm-rs','gm-lmb','gm-rmb','gm-space','gm-esc','gm-gear'],pos={};
      ids.forEach(function(id){
        var el=document.getElementById(id);
        if(el)pos[id]={t:el.style.top,l:el.style.left,r:el.style.right,b:el.style.bottom,tr:el.style.transform};
      });
      try{localStorage.setItem(PK,JSON.stringify(pos));}catch(e){}
    }
    function loadPos(){
      try{
        var pos=JSON.parse(localStorage.getItem(PK)||'{}');
        Object.keys(pos).forEach(function(id){
          var el=document.getElementById(id),p=pos[id];if(!el||!p)return;
          if(p.t)el.style.top=p.t;if(p.l)el.style.left=p.l;
          if(p.r)el.style.right=p.r;if(p.b)el.style.bottom=p.b;
          if(p.tr)el.style.transform=p.tr;
        });
      }catch(e){}
    }

    // ── SCALE / OPACITY ──────────────────────────────────
    function applyScale(){
      var S=cfg.size/100;
      var st=Math.round(120*S),kn=Math.round(46*S);
      var ls=document.getElementById('gm-ls'),rs=document.getElementById('gm-rs');
      var lk=document.getElementById('gm-lk'),rk=document.getElementById('gm-rk');
      if(ls){ls.style.width=ls.style.height=st+'px';}
      if(rs){rs.style.width=rs.style.height=st+'px';}
      if(lk){lk.style.width=lk.style.height=kn+'px';}
      if(rk){rk.style.width=rk.style.height=kn+'px';}
      var fs=Math.round(11*S);
      ['gm-lmb','gm-rmb','gm-space','gm-esc'].forEach(function(id){
        var el=document.getElementById(id);if(el)el.style.fontSize=fs+'px';
      });
      document.documentElement.style.setProperty('--op',cfg.opacity/100);
    }

    function applyHide(){
      var v=cfg.hide?'hidden':'visible';
      ['gm-ls','gm-rs','gm-lmb','gm-rmb','gm-space','gm-esc'].forEach(function(id){
        var el=document.getElementById(id);if(el)el.style.visibility=v;
      });
      // also hide extra key buttons
      document.querySelectorAll('.gm-extra').forEach(function(el){el.style.visibility=v;});
    }

    function applyRmode(){
      var sw=document.getElementById('gm-swipe');
      var rs=document.getElementById('gm-rs');
      if(cfg.rmode==='swipe'){
        sw.classList.add('on');
        if(rs)rs.style.visibility='hidden';
      } else {
        sw.classList.remove('on');
        if(rs&&!cfg.hide)rs.style.visibility='visible';
      }
    }

    // ── EXTRA KEYS ───────────────────────────────────────
    function renderExtraKeys(){
      var list=document.getElementById('gm-keylist');
      list.innerHTML='';
      cfg.extraKeys.forEach(function(ek,i){
        var row=document.createElement('div');row.className='gp-key-item';
        row.innerHTML='<span>'+ek.label+' <span style="opacity:.4">('+ek.key+')</span></span>'
          +'<button class="gp-del" onclick="GM.removeKey('+i+')">×</button>';
        list.appendChild(row);
      });
      // rebuild extra btn elements
      document.querySelectorAll('.gm-extra').forEach(function(el){el.remove();});
      cfg.extraKeys.forEach(function(ek,i){
        var btn=document.createElement('div');
        btn.className='gm-btn gm-extra';
        btn.id='gm-extra-'+i;
        btn.textContent=ek.label;
        btn.style.cssText='background:rgba(var(--pri),0.5);width:54px;height:34px;border-radius:10px;font-size:11px;left:'+(80+i*64)+'px;top:16px;';
        document.getElementById('gm-controls').appendChild(btn);
        attachBtn(btn,function(){press(ek.key);},function(){release(ek.key);});
        if(cfg.drag)btn.classList.add('drag-mode');
        if(cfg.hide)btn.style.visibility='hidden';
      });
    }

    // ── PANEL SYNC ───────────────────────────────────────
    function syncPanel(){
      ['wasd','arrow','both'].forEach(function(m){var el=document.getElementById('ch-'+m);if(el)el.classList.toggle('on',cfg.lmode===m);});
      ['stick','swipe'].forEach(function(m){var el=document.getElementById('ch-'+m);if(el)el.classList.toggle('on',cfg.rmode===m);});
      var ss=document.getElementById('gm-ss'),sv=document.getElementById('gm-sv');if(ss)ss.value=cfg.sens;if(sv)sv.textContent=cfg.sens;
      var szs=document.getElementById('gm-szs'),szv=document.getElementById('gm-szv');if(szs)szs.value=cfg.size;if(szv)szv.textContent=cfg.size+'%';
      var ops=document.getElementById('gm-ops'),opv=document.getElementById('gm-opv');if(ops)ops.value=cfg.opacity;if(opv)opv.textContent=cfg.opacity+'%';
      var tog=function(id,val){var el=document.getElementById(id);if(el)el.classList.toggle('on',val);};
      tog('tog-optclick',cfg.optclick);tog('tog-hide',cfg.hide);
      var dc=document.getElementById('ch-drag');if(dc){dc.classList.toggle('on',cfg.drag);dc.textContent=cfg.drag?'Stop':'Move';}
      renderExtraKeys();
    }

    // ── PUBLIC ───────────────────────────────────────────
    return {
      init:function(){
        lc();

        // Bind left stick directly on element
        var lsEl=document.getElementById('gm-ls');
        lsEl.addEventListener('touchstart',function(e){
          if(cfg.drag)return;
          for(var i=0;i<e.changedTouches.length;i++){if(lsTid===null){lsTid=e.changedTouches[i].identifier;processLS(e.changedTouches[i]);break;}}
        },{passive:true});

        // Bind right stick directly on element
        var rsEl=document.getElementById('gm-rs');
        rsEl.addEventListener('touchstart',function(e){
          if(cfg.drag)return;
          for(var i=0;i<e.changedTouches.length;i++){if(rsTid===null){rsTid=e.changedTouches[i].identifier;processRS(e.changedTouches[i]);break;}}
        },{passive:true});

        // Global touchmove — passive, only processes stick touches
        document.addEventListener('touchmove',function(e){
          if(cfg.drag)return;
          for(var i=0;i<e.changedTouches.length;i++){
            var t=e.changedTouches[i];
            if(t.identifier===lsTid)processLS(t);
            if(t.identifier===rsTid)processRS(t);
          }
        },{passive:true});

        document.addEventListener('touchend',function(e){
          if(cfg.drag)return;
          for(var i=0;i<e.changedTouches.length;i++){
            var id=e.changedTouches[i].identifier;
            if(id===lsTid)releaseLS();
            if(id===rsTid)releaseRS();
          }
        },{passive:true});

        document.addEventListener('touchcancel',function(e){
          for(var i=0;i<e.changedTouches.length;i++){
            var id=e.changedTouches[i].identifier;
            if(id===lsTid)releaseLS();
            if(id===rsTid)releaseRS();
          }
        },{passive:true});

        // Action buttons
        attachBtn(document.getElementById('gm-lmb'),  function(){sendMouse('mousedown','left');}, function(){sendMouse('mouseup','left');});
        attachBtn(document.getElementById('gm-rmb'),  function(){sendMouse('mousedown','right');},function(){sendMouse('mouseup','right');});
        attachBtn(document.getElementById('gm-space'),function(){press(' ');},  function(){release(' ');});
        attachBtn(document.getElementById('gm-esc'),  function(){press('Escape');},function(){release('Escape');});

        // Gear
        var gear=document.getElementById('gm-gear');
        gear.addEventListener('touchstart',function(e){if(cfg.drag)return;this.openPanel();}.bind(this),{passive:true});
        gear.addEventListener('click',function(){this.openPanel();}.bind(this));

        // Panel
        document.getElementById('gm-done').onclick=function(){this.closePanel();}.bind(this);
        document.getElementById('gm-bd').onclick=function(){this.closePanel();}.bind(this);
        document.getElementById('gm-ss').oninput=function(e){cfg.sens=parseFloat(e.target.value);document.getElementById('gm-sv').textContent=cfg.sens;sc();};
        document.getElementById('gm-szs').oninput=function(e){cfg.size=parseInt(e.target.value);document.getElementById('gm-szv').textContent=cfg.size+'%';applyScale();sc();};
        document.getElementById('gm-ops').oninput=function(e){cfg.opacity=parseInt(e.target.value);document.getElementById('gm-opv').textContent=cfg.opacity+'%';applyScale();sc();};

        bindSwipe();
        applyScale();
        applyHide();
        applyRmode();
        setupOptclick();
        loadPos();
        syncPanel();

        document.getElementById('gm-controls').classList.add('on');
      },

      setLmode:function(m){cfg.lmode=m;sc();syncPanel();},
      setRmode:function(m){cfg.rmode=m;sc();applyRmode();syncPanel();},
      toggle:function(key){cfg[key]=!cfg[key];sc();applyHide();applyRmode();setupOptclick();syncPanel();},
      toggleDrag:function(){
        cfg.drag=!cfg.drag;
        ['gm-ls','gm-rs','gm-lmb','gm-rmb','gm-space','gm-esc','gm-gear'].forEach(function(id){
          var el=document.getElementById(id);if(el)el.classList.toggle('drag-mode',cfg.drag);
        });
        document.querySelectorAll('.gm-extra').forEach(function(el){el.classList.toggle('drag-mode',cfg.drag);});
        if(!cfg.drag)savePos();sc();syncPanel();
      },
      resetPos:function(){try{localStorage.removeItem(PK);}catch(e){}location.reload();},
      openPanel:function(){syncPanel();document.getElementById('gm-panel').classList.add('open');document.getElementById('gm-bd').classList.add('open');},
      closePanel:function(){document.getElementById('gm-panel').classList.remove('open');document.getElementById('gm-bd').classList.remove('open');},
      addKey:function(){
        var label=document.getElementById('gm-klabel').value.trim();
        var key=document.getElementById('gm-kkey').value;
        if(!label)return;
        cfg.extraKeys.push({label:label,key:key});
        document.getElementById('gm-klabel').value='';
        sc();renderExtraKeys();
      },
      removeKey:function(i){cfg.extraKeys.splice(i,1);sc();renderExtraKeys();}
    };
  })();

  // ── LOAD GAME & DETECT CROSS-ORIGIN ─────────────────────
  var gameUrl = new URLSearchParams(location.search).get('url');
  var gameFrame = document.getElementById('game');

  function showNotif(msg, color){
    var n=document.getElementById('gm-notif');
    n.textContent=msg;
    n.style.background=color||'rgba(239,68,68,0.92)';
    n.style.display='block';
    setTimeout(function(){n.style.display='none';},4000);
  }

  if(gameUrl){
    // Detect if URL is external (cross-origin) — if so, show warning and skip overlay
    var isCrossOrigin = false;
    try {
      var u = new URL(gameUrl, location.href);
      isCrossOrigin = (u.origin !== location.origin);
    } catch(e){ isCrossOrigin = true; }

    gameFrame.src = gameUrl;

    if(isCrossOrigin){
      // Show notification, no overlay
      gameFrame.addEventListener('load', function(){
        showNotif('⚠️ Mobile controls not supported for this game', 'rgba(245,158,11,0.95)');
      });
    } else {
      // Same-origin: init gamepad after iframe loads
      gameFrame.addEventListener('load', function(){
        GM.init();
      });
    }
  }
  </script>
</body>
</html>
