<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title id="tabTitle">GOONGAMES</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="GOONGAMES">
  <link id="tabIcon" rel="icon" type="image/png" href="droplet.png">
  <link rel="apple-touch-icon" href="droplet.png">
  <link rel="manifest" href="data:application/manifest+json,{'name':'GOONGAMES','short_name':'GOONGAMES','start_url':'index.html','display':'standalone','background_color':'#09090b','theme_color':'#3b82f6','icons':[{'src':'droplet.png','sizes':'192x192','type':'image/png'}]}">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    (function() {
      var t = localStorage.getItem('theme') || 'dark';
      if (t === 'dark') document.documentElement.classList.add('dark');
      var ct = localStorage.getItem('cloakTitle'), ci = localStorage.getItem('cloakIcon');
      if (ct) document.title = ct;
      if (ci) { var l = document.createElement('link'); l.rel = 'shortcut icon'; l.href = ci; document.head.appendChild(l); }
    })();
    tailwind.config = { darkMode: 'class' };
    if ('serviceWorker' in navigator) window.addEventListener('load', function(){ navigator.serviceWorker.register('sw.js').catch(function(){}); });
  </script>
  <script src="games.js"></script>
  <script src="shortcut.js"></script>
  <style>
    * { -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
    .preload * { transition: none !important; }
    html, body, nav, section, div, h1, h2, h3, span, button, input {
      transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
    }
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 10px; }
    #toggleCircle { transition: transform 0.3s cubic-bezier(0.4,0,0.2,1); transform: translateX(0px); }
    .dark #toggleCircle { transform: translateX(24px); }
    .sun-visible { display: block; } .moon-visible { display: none; }
    .dark .sun-visible { display: none; } .dark .moon-visible { display: block; }
    .star-icon { transition: transform 0.2s cubic-bezier(0.175,0.885,0.32,1.275); }
    .star-active { transform: scale(1.4) rotate(15deg); }
    @keyframes toastIn { from { transform: translateY(100px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .toast-notify { animation: toastIn 0.3s ease forwards; }
    .logo-img { filter: invert(1); transition: filter 0.3s ease; }
    .dark .logo-img { filter: invert(0); }
    /* Mobile mode toggle */
    #mobileModeToggle { transition: background-color 0.25s; }
    #mobileModeToggle .mobile-dot { transition: transform 0.25s cubic-bezier(0.4,0,0.2,1); }
  </style>
</head>
<body class="preload bg-zinc-50 dark:bg-zinc-900 text-zinc-900 dark:text-zinc-100 min-h-screen font-sans overflow-x-hidden">

  <div id="notification-container" class="fixed bottom-5 right-5 z-[100] flex flex-col gap-3 pointer-events-none"></div>

  <!-- ═══ NAV ═══════════════════════════════════════════════ -->
  <nav class="sticky top-0 z-40 w-full bg-white/80 dark:bg-zinc-800/80 backdrop-blur-md border-b border-zinc-200 dark:border-zinc-700 px-4 py-3 flex flex-wrap gap-4 justify-between items-center">
    <div class="flex items-center gap-2">
      <img src="droplet.png" class="w-8 h-8 object-contain logo-img" alt="Logo">
      <div class="flex items-baseline gap-1">
        <h1 class="text-xl font-black tracking-tighter uppercase">GOONGAMES</h1>
        <span class="text-[10px] font-bold text-blue-500 uppercase">Remake</span>
      </div>
    </div>
    <div class="flex-grow max-w-md relative order-3 sm:order-none">
      <input type="text" id="searchInput" placeholder="Search games..."
        class="w-full bg-zinc-100 dark:bg-zinc-800 border border-zinc-200 dark:border-zinc-700 rounded-full py-2 px-10 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
      <svg class="absolute left-3 top-2.5 text-zinc-400" xmlns="http://www.w3.org/2000/svg" width="16" height="16"
        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>
      </svg>
    </div>
    <button id="settingsBtn" class="p-2 hover:bg-zinc-200 dark:hover:bg-zinc-700 rounded-full transition-all active:scale-90">
      <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/>
        <circle cx="12" cy="12" r="3"/>
      </svg>
    </button>
  </nav>

  <!-- ═══ HOME ═══════════════════════════════════════════════ -->
  <main id="homeView" class="max-w-7xl mx-auto p-6 space-y-12">
    <section id="shortcutsSection" class="hidden">
      <h2 class="text-xs font-black uppercase tracking-[0.3em] opacity-40 mb-6">Quick Links</h2>
      <div id="shortcutGrid" class="flex flex-wrap gap-6 border-b border-zinc-200 dark:border-zinc-800 pb-12"></div>
    </section>
    <section id="favoritesSection" class="hidden">
      <h2 class="text-xs font-black uppercase tracking-[0.3em] text-yellow-500 mb-6 flex items-center gap-2">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/>
        </svg>
        Favourited
      </h2>
      <div id="favGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-6 border-b border-zinc-200 dark:border-zinc-800 pb-12"></div>
    </section>
    <section id="librarySection">
      <h2 class="text-xs font-black uppercase tracking-[0.3em] opacity-40 mb-6">Library</h2>
      <div id="gameGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-6"></div>
    </section>
  </main>

  <!-- ═══ PLAYER ═════════════════════════════════════════════ -->
  <section id="playerView" class="hidden fixed inset-0 z-50 bg-zinc-100 dark:bg-black flex flex-col">
    <div class="p-4 bg-white dark:bg-zinc-900 flex justify-between items-center border-b border-zinc-200 dark:border-zinc-800">
      <h2 id="activeGameTitle" class="font-bold text-zinc-900 dark:text-white uppercase tracking-widest text-sm">Game Title</h2>
      <button id="closePlayer" class="px-6 py-2 bg-red-600 hover:bg-red-700 text-white rounded-full font-bold transition-all active:scale-95 text-xs uppercase">Close</button>
    </div>
    <div class="flex-grow relative bg-zinc-200 dark:bg-zinc-950 overflow-hidden">
      <iframe id="gameIframe" src="" class="w-full h-full border-0 absolute inset-0"
        allow="autoplay; fullscreen; gamepad"
        sandbox="allow-forms allow-modals allow-orientation-lock allow-pointer-lock allow-popups allow-popups-to-escape-sandbox allow-scripts allow-same-origin"
        allowfullscreen></iframe>
    </div>
    <div class="p-3 bg-white dark:bg-zinc-900 flex gap-6 justify-center border-t border-zinc-200 dark:border-zinc-800">
      <button onclick="document.getElementById('gameIframe').requestFullscreen()"
        class="text-zinc-500 dark:text-zinc-400 hover:text-blue-500 dark:hover:text-white text-[10px] font-bold uppercase tracking-widest active:scale-95">Fullscreen</button>
      <button id="tabBtn"
        class="text-zinc-500 dark:text-zinc-400 hover:text-blue-500 dark:hover:text-white text-[10px] font-bold uppercase tracking-widest active:scale-95">New Tab</button>
    </div>
  </section>

  <!-- ═══ SETTINGS MODAL ═════════════════════════════════════ -->
  <div id="settingsModal" class="hidden fixed inset-0 z-[60] bg-black/60 backdrop-blur-sm flex items-center justify-center p-4">
    <div class="bg-white dark:bg-zinc-800 p-8 rounded-3xl w-full max-w-sm border border-zinc-200 dark:border-zinc-700 shadow-2xl">
      <h2 class="text-xl font-black mb-6 text-center uppercase tracking-tighter">Settings</h2>
      <!-- Theme -->
      <div class="flex justify-between items-center mb-4 bg-zinc-100 dark:bg-zinc-700/50 p-4 rounded-2xl">
        <span class="text-[10px] font-bold opacity-50 uppercase tracking-widest">Theme</span>
        <button id="themeToggle" class="relative w-14 h-8 bg-zinc-300 dark:bg-blue-600 rounded-full p-1 transition-colors duration-300 active:scale-95">
          <div id="toggleCircle" class="w-6 h-6 bg-white rounded-full shadow-md flex items-center justify-center">
            <svg class="sun-visible w-4 h-4 text-yellow-500" fill="currentColor" viewBox="0 0 20 20">
              <path d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0z"/>
            </svg>
            <svg class="moon-visible w-4 h-4 text-blue-500" fill="currentColor" viewBox="0 0 20 20">
              <path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"/>
            </svg>
          </div>
        </button>
      </div>
      <!-- Force Mobile Mode -->
      <div class="flex justify-between items-center mb-4 bg-zinc-100 dark:bg-zinc-700/50 p-4 rounded-2xl">
        <div>
          <span class="text-[10px] font-bold opacity-50 uppercase tracking-widest block">Force Mobile Mode</span>
          <span class="text-[10px] opacity-40">Gamepad overlay when playing</span>
        </div>
        <button id="mobileModeToggle" class="relative w-14 h-8 bg-zinc-300 rounded-full p-1 transition-colors duration-300 active:scale-95">
          <div class="mobile-dot w-6 h-6 bg-white rounded-full shadow-md"></div>
        </button>
      </div>
      <button id="openCloakBtn" class="w-full py-4 mb-4 bg-blue-600 text-white rounded-xl text-xs font-bold uppercase tracking-widest active:scale-95">Tab Cloak Settings</button>
      <button id="closeSettings" class="w-full py-3 bg-zinc-900 dark:bg-zinc-100 text-white dark:text-zinc-900 rounded-xl font-bold transition active:scale-95">DONE</button>
    </div>
  </div>

  <!-- ═══ CLOAK MODAL ═════════════════════════════════════════ -->
  <div id="cloakModal" class="hidden fixed inset-0 z-[70] bg-black/80 backdrop-blur-md flex items-center justify-center p-4">
    <div class="bg-white dark:bg-zinc-800 p-8 rounded-3xl w-full max-w-sm border border-zinc-200 dark:border-zinc-700">
      <h2 class="text-xl font-black mb-6 text-center uppercase tracking-tighter">Tab Cloak</h2>
      <div class="space-y-4">
        <input type="text" id="cloakTitleInput" placeholder="New Title"
          class="w-full bg-zinc-100 dark:bg-zinc-700 border border-zinc-600 rounded-xl py-3 px-4 text-sm outline-none">
        <input type="text" id="cloakIconInput" placeholder="Icon URL"
          class="w-full bg-zinc-100 dark:bg-zinc-700 border border-zinc-600 rounded-xl py-3 px-4 text-sm outline-none">
        <button onclick="saveCloak()" class="w-full py-3 bg-blue-600 text-white rounded-xl text-xs font-bold uppercase active:scale-95">Apply</button>
        <button onclick="resetCloak()" class="w-full py-2 bg-zinc-600 text-zinc-300 rounded-xl text-[10px] font-bold uppercase active:scale-95">Reset</button>
        <button id="closeCloak" class="w-full mt-4 text-xs font-bold opacity-50 active:scale-95">Back</button>
      </div>
    </div>
  </div>

  <script>
    // ── Mobile mode helpers ──────────────────────────────────
    function isMobileMode() {
      return localStorage.getItem('forceMobile') === 'true';
    }

    function getGameUrl(originalUrl) {
      if (!isMobileMode()) return originalUrl;
      return 'mobile.html?url=' + encodeURIComponent(originalUrl);
    }

    function syncMobileToggle() {
      var btn = document.getElementById('mobileModeToggle');
      var dot = btn && btn.querySelector('.mobile-dot');
      if (!btn) return;
      var on = isMobileMode();
      btn.style.background = on ? '#22c55e' : '';
      if (dot) dot.style.transform = on ? 'translateX(24px)' : 'translateX(0)';
    }

    document.getElementById('mobileModeToggle').addEventListener('click', function() {
      var newVal = !isMobileMode();
      localStorage.setItem('forceMobile', newVal ? 'true' : 'false');
      syncMobileToggle();
      showNotification(newVal ? '🎮 Mobile Mode ON' : '🎮 Mobile Mode OFF');
    });

    // ── Notifications ────────────────────────────────────────
    function showNotification(text) {
      var c = document.getElementById('notification-container');
      var t = document.createElement('div');
      t.className = "toast-notify bg-zinc-900 dark:bg-zinc-100 text-white dark:text-zinc-900 px-5 py-3 rounded-2xl shadow-xl text-xs font-bold uppercase tracking-widest border border-white/10";
      t.innerText = text;
      c.appendChild(t);
      setTimeout(function() {
        t.style.opacity = '0';
        t.style.transform = 'translateY(-20px)';
        t.style.transition = 'all 0.4s ease';
        setTimeout(function() { t.remove(); }, 400);
      }, 2500);
    }

    // ── Cloak ────────────────────────────────────────────────
    function saveCloak() {
      var title = document.getElementById('cloakTitleInput').value;
      var iconUrl = document.getElementById('cloakIconInput').value;
      var pi = iconUrl ? "https://images.weserv.nl/?url=" + encodeURIComponent(iconUrl) + "&w=32&h=32" : '';
      if (title) { document.title = title; localStorage.setItem('cloakTitle', title); }
      if (iconUrl) {
        var l = document.querySelector("link[rel*='icon']") || document.createElement('link');
        l.href = pi; document.head.appendChild(l);
        localStorage.setItem('cloakIcon', pi);
      }
      showNotification("Cloak Applied!");
    }
    function resetCloak() {
      localStorage.removeItem('cloakTitle');
      localStorage.removeItem('cloakIcon');
      location.reload();
    }

    // ── Game cards ───────────────────────────────────────────
    var grid       = document.getElementById('gameGrid');
    var favGrid    = document.getElementById('favGrid');
    var favSection = document.getElementById('favoritesSection');
    var searchInput= document.getElementById('searchInput');
    var home       = document.getElementById('homeView');
    var player     = document.getElementById('playerView');
    var iframe     = document.getElementById('gameIframe');
    var activeTitle= document.getElementById('activeGameTitle');
    var favorites  = JSON.parse(localStorage.getItem('favorites') || '[]');

    function renderCard(game) {
      var isFav = favorites.indexOf(game.id) !== -1;
      return '<div class="group relative active:scale-105 transition-transform duration-300">' +
        '<button onclick="toggleFav(\'' + game.id + '\',event)" class="absolute top-2 right-2 z-10 p-2 rounded-full bg-black/40 backdrop-blur-md active:scale-125 transition-transform">' +
        '<svg class="star-icon ' + (isFav ? 'text-yellow-500' : 'text-white') + '" width="16" height="16" fill="' + (isFav ? 'currentColor' : 'none') + '" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">' +
        '<path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg></button>' +
        '<div class="cursor-pointer" onclick="playGame(\'' + game.id + '\')">' +
        '<div class="aspect-video bg-zinc-800 rounded-2xl overflow-hidden mb-3 border-2 border-transparent group-hover:border-blue-500 group-hover:scale-105 transition-all duration-300">' +
        '<img src="' + game.image + '" class="w-full h-full object-cover" loading="lazy"></div>' +
        '<h3 class="font-bold text-[10px] uppercase tracking-widest opacity-60 group-hover:opacity-100">' + game.title + '</h3></div></div>';
    }

    function init(filter) {
      filter = filter || '';
      document.body.classList.remove('preload');
      if (typeof GAMES_DATA === 'undefined') return;
      var fl = filter.toLowerCase();
      grid.innerHTML = GAMES_DATA
        .filter(function(g) { return g.title.toLowerCase().indexOf(fl) !== -1; })
        .map(renderCard).join('');
      var favGames = GAMES_DATA.filter(function(g) { return favorites.indexOf(g.id) !== -1; });
      if (favGames.length && !filter) {
        favSection.classList.remove('hidden');
        favGrid.innerHTML = favGames.map(renderCard).join('');
      } else {
        favSection.classList.add('hidden');
      }
    }

    window.toggleFav = function(id, event) {
      event.stopPropagation();
      var game = GAMES_DATA.find(function(g) { return g.id === id; });
      var btn  = event.currentTarget.querySelector('.star-icon');
      var idx  = favorites.indexOf(id);
      if (idx !== -1) {
        favorites.splice(idx, 1);
        showNotification("Removed " + game.title);
      } else {
        favorites.push(id);
        btn.classList.add('star-active');
        setTimeout(function() { btn.classList.remove('star-active'); }, 400);
        showNotification("Added " + game.title + " to Favourites");
      }
      localStorage.setItem('favorites', JSON.stringify(favorites));
      init(searchInput.value);
    };

    window.playGame = function(id) {
      var game = GAMES_DATA.find(function(g) { return g.id === id; });
      if (!game) return;
      activeTitle.innerText = game.title;

      // KEY: route through mobile.html when mobile mode is on
      iframe.src = getGameUrl(game.url);

      document.getElementById('tabBtn').onclick = function() {
        var cT = localStorage.getItem('cloakTitle') || "My Drive";
        var cI = localStorage.getItem('cloakIcon')  || "droplet.png";
        var win = window.open('about:blank', '_blank');
        if (win) {
          // In new tab, also route through mobile.html if mobile mode on
          var gameUrl = getGameUrl(game.url);
          win.document.write(
            '<html><head><title>' + cT + '</title>' +
            '<link rel="icon" href="' + cI + '">' +
            '<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">' +
            '<style>body,html{margin:0;padding:0;height:100dvh;width:100%;overflow:hidden;background:#000;position:fixed}' +
            'iframe{border:none;width:100%;height:100%;display:block}</style>' +
            '</head><body>' +
            '<iframe src="' + gameUrl + '" allow="autoplay;fullscreen;keyboard-map;gamepad"></iframe>' +
            '</body></html>'
          );
          win.document.close();
          iframe.src = '';
          player.classList.add('hidden');
          home.classList.remove('hidden');
        } else {
          alert("Please allow pop-ups!");
        }
      };

      setTimeout(function() {
        home.classList.add('hidden');
        player.classList.remove('hidden');
      }, 150);
    };

    document.getElementById('closePlayer').onclick = function() {
      iframe.src = '';
      player.classList.add('hidden');
      home.classList.remove('hidden');
    };

    document.getElementById('themeToggle').onclick = function() {
      document.documentElement.classList.toggle('dark');
      localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
    };

    document.getElementById('settingsBtn').onclick   = function() { document.getElementById('settingsModal').classList.remove('hidden'); syncMobileToggle(); };
    document.getElementById('closeSettings').onclick = function() { document.getElementById('settingsModal').classList.add('hidden'); };
    document.getElementById('openCloakBtn').onclick  = function() { document.getElementById('cloakModal').classList.remove('hidden'); document.getElementById('settingsModal').classList.add('hidden'); };
    document.getElementById('closeCloak').onclick    = function() { document.getElementById('cloakModal').classList.add('hidden'); };
    searchInput.oninput = function(e) { init(e.target.value); };

    function renderShortcuts() {
      var sg = document.getElementById('shortcutGrid');
      var ss = document.getElementById('shortcutsSection');
      if (typeof SHORTCUTS_DATA === 'undefined' || !SHORTCUTS_DATA.length) return;
      ss.classList.remove('hidden');
      sg.innerHTML = SHORTCUTS_DATA.map(function(item) {
        return '<a href="' + item.url + '" target="_blank" class="group block active:scale-95 transition-transform">' +
          '<div class="inline-block bg-zinc-200 dark:bg-zinc-800 rounded-2xl overflow-hidden border-2 border-transparent group-hover:border-blue-500 transition-all">' +
          '<img src="' + item.image + '" class="max-h-32 w-auto object-contain block"></div>' +
          '<h3 class="mt-2 text-center font-bold text-[10px] uppercase tracking-widest opacity-60 group-hover:opacity-100">' + item.title + '</h3></a>';
      }).join('');
    }

    window.onload = function() {
      init();
      renderShortcuts();
      syncMobileToggle();
    };
  </script>
</body>
</html>
