  <link rel="manifest" href="data:application/manifest+json,{'name':'GOONGAMES','short_name':'GOONGAMES','start_url':'index.html','display':'standalone','background_color':'#09090b','theme_color':'#3b82f6','icons':[{'src':'droplet.png','sizes':'192x192','type':'image/png'}]}">

  <script>
    const proxy = (url) => `https://images.weserv.nl/?url=${encodeURIComponent(url.replace(/^https?:\/\//, ''))}&output=webp`;
    (function() {
      const savedTheme = localStorage.getItem('theme') || 'dark';
      if (savedTheme === 'dark') {
        document.documentElement.classList.add('dark');
      } else {
        document.documentElement.classList.remove('dark');
      }
      const cloakTitle = localStorage.getItem('cloakTitle');
      const cloakIcon = localStorage.getItem('cloakIcon');
      if (cloakTitle) document.title = cloakTitle;
      if (cloakIcon) {
        const link = document.querySelector("link[rel*='icon']") || document.createElement('link');
        link.type = 'image/x-icon';
        link.rel = 'shortcut icon';
        link.href = cloakIcon;
        document.getElementsByTagName('head')[0].appendChild(link);
      }
    })();
    tailwind.config = { darkMode: 'class' };
  </script>
  <style>
    * { -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
    .preload * { transition: none !important; }
    html, body, nav, section, div, h1, h2, h3, span, button, input {
      transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
    }
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 10px; }
    #toggleCircle { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); transform: translateX(0px); }
    .dark #toggleCircle { transform: translateX(24px); }
    .sun-visible { display: block; } .moon-visible { display: none; }
    .dark .sun-visible { display: none; } .dark .moon-visible { display: block; }
    .star-icon { transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    .star-active { transform: scale(1.4) rotate(15deg); }

      to { transform: translateY(0); opacity: 1; }
    }

    .logo-img { filter: invert(1); transition: filter 0.3s ease; }
    .dark .logo-img { filter: invert(0); }
    .cloak-preset {

      display: flex; align-items: center; justify-content: center;

    .cloak-preset img { width: 24px; height: 24px; object-fit: contain; }

    /* ── Mobile Gamepad Controls ─────────────────── */
    #gp-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      z-index: 9999; pointer-events: none; display: none;
    }
    #gp-overlay.gp-active { display: block; }

    .gp-stick {
      position: absolute; border-radius: 50%; pointer-events: auto; touch-action: none;
      background: rgba(255,255,255,0.12);
      border: 2px solid rgba(255,255,255,0.25);
      backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
    }
    .gp-stick-thumb {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
      border-radius: 50%; background: rgba(255,255,255,0.65);
      pointer-events: none;
    }
    .gp-btn {
      position: absolute; pointer-events: auto; touch-action: none;
      border-radius: 14px; display: flex; align-items: center; justify-content: center;
      font-weight: 700; color: white; user-select: none; text-align: center;
      border: 2px solid rgba(255,255,255,0.25);
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
      transition: transform 0.08s;
    }
    .gp-btn:active, .gp-btn.active { transform: scale(0.85) !important; background: rgba(255,255,255,0.3) !important; }
    .gp-btn-lmb { background: rgba(59,130,246,0.4); }
    .gp-btn-rmb { background: rgba(139,92,246,0.4); }
    .gp-btn-sb  { background: rgba(16,185,129,0.4); border-radius: 24px; }
    .gp-btn-esc { background: rgba(239,68,68,0.4); }
    .gp-btn-gear { background: rgba(20,20,40,0.6); }

    #gp-settings-backdrop {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      z-index: 10000; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
      display: none;
    }
    #gp-settings-backdrop.open { display: block; }
    #gp-settings-panel {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 10001;
      background: #0f0f1a; color: #e4e4f7;
      border-top: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px 24px 0 0; padding: 0 0 env(safe-area-inset-bottom, 0);
      transform: translateY(100%); transition: transform 0.35s cubic-bezier(0.32, 1.1, 0.56, 0.98);
      max-height: 80vh; overflow-y: auto;
    }
    #gp-settings-panel.open { transform: translateY(0); }
    .gp-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 14px 20px; border-bottom: 1px solid rgba(255,255,255,0.06);

    .gp-row-label { font-size: 13px; font-weight: 600; }

  <script>
  // ══════════════════════════════════════════════════════════
  //  GAMEPAD ENGINE - Using same dispatch approach as Truffled
  // ══════════════════════════════════════════════════════════
  const GP = (() => {
    let cfg = {
      enabled: false,
      lmode: 'both',
      rmode: 'mouse',
      optclick: true,
      size: 100,
      opacity: 65,
      hideui: false,
    };

    const loadCfg = () => {
      try { const s = JSON.parse(localStorage.getItem('gp_cfg')||'{}'); Object.assign(cfg, s); } catch(e) {}
    };
    const saveCfg = () => localStorage.setItem('gp_cfg', JSON.stringify(cfg));

    const activeKeys = new Set();
    const activeClicks = new Set();
    const buttonTouchMap = new Map();
    let lsTouchId = null, rsTouchId = null;
    let cameraVector = { x: 0, y: 0 };
    let cameraLoopRunning = false;
    let mx = 0, my = 0;

    function getIframe() { return document.getElementById('gameIframe'); }

    // KEY DISPATCH - Same approach as Truffled working script
    function getKeyCode(k) {
      const map = { w:87, s:83, a:65, d:68, ArrowUp:38, ArrowDown:40, ArrowLeft:37, ArrowRight:39, Escape:27, ' ':32, Space:32 };
      return map[k] || 0;
    }

    function sendKey(type, k) {
      const iframe = getIframe();
      if (!iframe) return;
      let normalizedKey = k;
      let code = k;
      if (k === ' ') { normalizedKey = ' '; code = 'Space'; }
      else if (k.length === 1) { normalizedKey = k.toLowerCase(); code = 'Key' + k.toUpperCase(); }

      const evt = new KeyboardEvent(type, {
        key: normalizedKey, code: code, keyCode: getKeyCode(k), which: getKeyCode(k),
        bubbles: true, cancelable: true, composed: true
      });

      try {
        const targetWin = iframe.contentWindow || window;
        const targetDoc = targetWin.document || document;
        targetDoc.dispatchEvent(evt);
        targetWin.dispatchEvent(evt);
        if (targetDoc.body) targetDoc.body.dispatchEvent(evt);
        if (targetDoc.activeElement && targetDoc.activeElement !== targetDoc.body) {
          targetDoc.activeElement.dispatchEvent(evt);
        }
      } catch(e) {}
    }

    function pressKey(k) {
      if (activeKeys.has(k)) return;
      activeKeys.add(k);
      sendKey('keydown', k);
    }

    function releaseKey(k) {
      if (!activeKeys.has(k)) return;
      activeKeys.delete(k);
      sendKey('keyup', k);
    }

    // MOUSE CLICK DISPATCH
    function sendClick(button, type) {
      const iframe = getIframe();
      if (!iframe) return;
      const buttonCode = button === 'left' ? 0 : 2;
      const buttons = button === 'left' ? 1 : 2;
      const evt = new MouseEvent(type, { button: buttonCode, buttons: buttons, bubbles: true, cancelable: true });
      try {
        const targetDoc = iframe.contentWindow ? iframe.contentWindow.document : document;
        const canvas = targetDoc.querySelector('canvas');
        if (canvas) canvas.dispatchEvent(evt);
        else targetDoc.dispatchEvent(evt);
        if (type === 'mouseup' && button === 'left') {
          const clickEvt = new MouseEvent('click', { button: 0, bubbles: true, cancelable: true });
          if (canvas) canvas.dispatchEvent(clickEvt);
          else targetDoc.dispatchEvent(clickEvt);
        }
      } catch(e) {}
    }

    function pressClick(type) {
      if (activeClicks.has(type)) return;
      activeClicks.add(type);
      sendClick(type, 'mousedown');
    }

    function releaseClick(type) {
      if (!activeClicks.has(type)) return;
      activeClicks.delete(type);
      sendClick(type, 'mouseup');
    }

    // CAMERA LOOP
    function runCameraLoop() {
      if (rsTouchId === null) { cameraLoopRunning = false; return; }
      if (Math.abs(cameraVector.x) > 0.01 || Math.abs(cameraVector.y) > 0.01) {
        const iframe = getIframe();
        if (iframe) {
          const evt = new MouseEvent('mousemove', {
            movementX: cameraVector.x, movementY: cameraVector.y,
            bubbles: true, cancelable: true
          });
          try {
            const targetDoc = iframe.contentWindow ? iframe.contentWindow.document : document;
            const canvas = targetDoc.querySelector('canvas');
            if (canvas) canvas.dispatchEvent(evt);
            else targetDoc.dispatchEvent(evt);
          } catch(e) {}
        }
      }
      requestAnimationFrame(runCameraLoop);
    }

    // LAYOUT
    function layout() {
      const S = cfg.size / 100;
      const OP = cfg.opacity / 100;
      const ls = document.getElementById('gp-ls');
      const rs = document.getElementById('gp-rs');
      const lmb = document.getElementById('gp-lmb');
      const rmb = document.getElementById('gp-rmb');
      const sb = document.getElementById('gp-sb');
      const esc = document.getElementById('gp-esc');
      const gear = document.getElementById('gp-gear');

      const stickW = Math.round(120 * S);
      const thumbW = Math.round(48 * S);
      const btnW = Math.round(60 * S);
      const btnH = Math.round(40 * S);

      if (ls) { ls.style.width = ls.style.height = stickW + 'px'; }
      if (rs) { rs.style.width = rs.style.height = stickW + 'px'; }
      ['gp-ls-knob','gp-rs-knob'].forEach(id => {
        const el = document.getElementById(id);
        if (el) { el.style.width = thumbW + 'px'; el.style.height = thumbW + 'px'; }
      });

      [lmb, rmb].forEach(b => { if(b) { b.style.width = btnW+'px'; b.style.height = btnH+'px'; b.style.fontSize = Math.round(11*S)+'px'; } });
      if (sb) { sb.style.width = Math.round(80*S)+'px'; sb.style.height = Math.round(36*S)+'px'; sb.style.fontSize = Math.round(11*S)+'px'; }
      if (esc) { esc.style.width = Math.round(48*S)+'px'; esc.style.height = Math.round(30*S)+'px'; esc.style.fontSize = Math.round(10*S)+'px'; }
      if (gear) { gear.style.width = Math.round(38*S)+'px'; gear.style.height = Math.round(38*S)+'px'; gear.style.fontSize = Math.round(16*S)+'px'; }

      const safeBot = 24;
      if (ls) { ls.style.bottom = safeBot+'px'; ls.style.left = '20px'; ls.style.top = 'auto'; ls.style.right = 'auto'; }
      if (rs) { rs.style.bottom = safeBot+'px'; rs.style.right = '20px'; rs.style.top = 'auto'; rs.style.left = 'auto'; }

      if (lmb) { lmb.style.bottom = (safeBot + stickW - btnH*2 - 8)+'px'; lmb.style.right = '20px'; lmb.style.left = 'auto'; lmb.style.top = 'auto'; }
      if (rmb) { rmb.style.bottom = (safeBot + stickW - btnH - 4)+'px'; rmb.style.right = '20px'; rmb.style.left = 'auto'; rmb.style.top = 'auto'; }

      if (sb) { sb.style.bottom = safeBot+'px'; sb.style.left = '50%'; sb.style.transform = 'translateX(-50%)'; sb.style.right = 'auto'; sb.style.top = 'auto'; }
      if (esc) { esc.style.top = '16px'; esc.style.left = '16px'; esc.style.bottom = 'auto'; esc.style.right = 'auto'; }
      if (gear) { gear.style.top = '16px'; gear.style.right = '16px'; gear.style.bottom = 'auto'; gear.style.left = 'auto'; }

      [ls, rs, lmb, rmb, sb, esc, gear].forEach(el => { if(el) el.style.opacity = OP; });

      const camMode = cfg.rmode === 'camera';
      if (rs) rs.style.display = (cfg.hideui || camMode) ? 'none' : '';
      if (cfg.hideui) {
        [ls, lmb, rmb, sb, esc].forEach(el => { if(el) el.style.display = 'none'; });
      } else {
        [ls, lmb, rmb, sb, esc].forEach(el => { if(el) el.style.display = ''; });
      }
      if (gear) gear.style.display = '';
    }

    // JOYSTICK BINDING
    function bindStick(baseId, knobId, onMove, onRelease) {
      const base = document.getElementById(baseId);
      const knob = document.getElementById(knobId);
      if (!base || !knob) return;
      let touchId = null;

      base.addEventListener('touchstart', e => {
        e.preventDefault(); e.stopPropagation();
        if (touchId !== null) return;
        touchId = e.changedTouches[0].identifier;
        processStick(e.changedTouches[0]);
      }, { passive: false });

      base.addEventListener('touchmove', e => {
        e.preventDefault(); e.stopPropagation();
        for (const t of e.changedTouches) {
          if (t.identifier === touchId) processStick(t);
        }
      }, { passive: false });

      const end = e => {
        for (const t of e.changedTouches) {
          if (t.identifier !== touchId) continue;
          touchId = null;
          knob.style.transform = 'translate(-50%, -50%)';
          onRelease();
        }
      };
      base.addEventListener('touchend', end, { passive: false });
      base.addEventListener('touchcancel', end, { passive: false });

      function processStick(touch) {
        const rect = base.getBoundingClientRect();
        const cx = rect.left + rect.width/2;
        const cy = rect.top + rect.height/2;
        let dx = touch.clientX - cx;
        let dy = touch.clientY - cy;
        const maxR = rect.width * 0.35;
        const dist = Math.sqrt(dx*dx + dy*dy);
        if (dist > maxR) { const s = maxR/dist; dx *= s; dy *= s; }
        knob.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
        onMove(dx/maxR, dy/maxR);
      }
    }

    // BUTTON BINDING
    function bindBtn(id, onDown, onUp) {
      const el = document.getElementById(id);
      if (!el) return;
      el.addEventListener('touchstart', e => {
        e.preventDefault(); e.stopPropagation();
        for (let i = 0; i < e.changedTouches.length; i++) {
          buttonTouchMap.set(e.changedTouches[i].identifier, { el, onDown, onUp });
          el.classList.add('active');
          onDown();
        }
      }, { passive: false });
      el.addEventListener('touchend', e => {
        e.preventDefault(); e.stopPropagation();
        for (const t of e.changedTouches) {
          if (buttonTouchMap.has(t.identifier)) {
            const info = buttonTouchMap.get(t.identifier);
            info.el.classList.remove('active');
            info.onUp();
            buttonTouchMap.delete(t.identifier);
          }
        }
      }, { passive: false });
      el.addEventListener('touchcancel', e => {
        for (const t of e.changedTouches) {
          if (buttonTouchMap.has(t.identifier)) {
            const info = buttonTouchMap.get(t.identifier);
            info.el.classList.remove('active');
            info.onUp();
            buttonTouchMap.delete(t.identifier);
          }
        }
      }, { passive: false });
    }

    // SETTINGS PANEL
    function openPanel() {
      document.getElementById('gps-lmode').value = cfg.lmode;
      document.getElementById('gps-rmode').value = cfg.rmode;
      document.getElementById('gps-size').value = cfg.size;
      document.getElementById('gps-opacity').value = cfg.opacity;
      document.getElementById('gps-size-val').textContent = cfg.size + '%';
      document.getElementById('gps-opacity-val').textContent = cfg.opacity + '%';
      document.getElementById('gps-optclick').classList.toggle('on', cfg.optclick);
      document.getElementById('gps-hideui').classList.toggle('on', cfg.hideui);
      document.getElementById('gp-settings-backdrop').classList.add('open');
      document.getElementById('gp-settings-panel').classList.add('open');
    }
    function closePanel() {
      document.getElementById('gp-settings-backdrop').classList.remove('open');
      document.getElementById('gp-settings-panel').classList.remove('open');
    }

    function initPanel() {
      document.getElementById('gp-panel-done').addEventListener('click', closePanel);
      document.getElementById('gp-settings-backdrop').addEventListener('click', closePanel);

      ['gps-lmode','gps-rmode'].forEach(id => {
        document.getElementById(id).addEventListener('change', e => {
          cfg[id==='gps-lmode'?'lmode':'rmode'] = e.target.value;
          saveCfg(); layout();
        });
      });
      ['gps-size','gps-opacity'].forEach(id => {
        const key = id==='gps-size'?'size':'opacity';
        document.getElementById(id).addEventListener('input', e => {
          cfg[key] = parseInt(e.target.value);
          document.getElementById(id+'-val').textContent = e.target.value + (key==='opacity'?'%':'%');
          saveCfg(); layout();
        });
      });
      document.getElementById('gps-optclick').addEventListener('click', () => {
        cfg.optclick = !cfg.optclick;
        document.getElementById('gps-optclick').classList.toggle('on', cfg.optclick);
        saveCfg(); setupOptClick();
      });
      document.getElementById('gps-hideui').addEventListener('click', () => {
        cfg.hideui = !cfg.hideui;
        document.getElementById('gps-hideui').classList.toggle('on', cfg.hideui);
        saveCfg(); layout();
      });
    }

    // OPTIMIZE CLICK
    let optHandler = null;
    function setupOptClick() {
      if (optHandler) { document.removeEventListener('touchend', optHandler); optHandler = null; }
      if (!cfg.optclick) return;
      optHandler = e => {
        const iframe = getIframe();
        if (!iframe || document.getElementById('playerView').classList.contains('hidden')) return;
        for (const t of e.changedTouches) {
          const el = document.elementFromPoint(t.clientX, t.clientY);
          if (el === iframe || iframe.contains(el)) {
            const targetDoc = iframe.contentWindow ? iframe.contentWindow.document : document;
            try {
              targetDoc.dispatchEvent(new MouseEvent('mousedown', { button:0, bubbles:true, cancelable:true }));
              targetDoc.dispatchEvent(new MouseEvent('mouseup', { button:0, bubbles:true, cancelable:true }));
              targetDoc.dispatchEvent(new MouseEvent('click', { button:0, bubbles:true, cancelable:true }));
            } catch(e) {}
          }
        }
      };
      document.addEventListener('touchend', optHandler, { passive: true });
    }

    function initControls() {
      // LEFT STICK
      bindStick('gp-ls', 'gp-ls-knob',
        (nx, ny) => {
          const th = 0.25;
          const wasd = cfg.lmode === 'wasd' || cfg.lmode === 'both';
          const arrow = cfg.lmode === 'arrows' || cfg.lmode === 'both';
          if (wasd) {
            ny < -th ? pressKey('w') : (activeKeys.has('w') && releaseKey('w'));
            ny > th ? pressKey('s') : (activeKeys.has('s') && releaseKey('s'));
            nx < -th ? pressKey('a') : (activeKeys.has('a') && releaseKey('a'));
            nx > th ? pressKey('d') : (activeKeys.has('d') && releaseKey('d'));
          }
          if (arrow) {
            ny < -th ? pressKey('ArrowUp') : (activeKeys.has('ArrowUp') && releaseKey('ArrowUp'));
            ny > th ? pressKey('ArrowDown') : (activeKeys.has('ArrowDown') && releaseKey('ArrowDown'));
            nx < -th ? pressKey('ArrowLeft') : (activeKeys.has('ArrowLeft') && releaseKey('ArrowLeft'));
            nx > th ? pressKey('ArrowRight') : (activeKeys.has('ArrowRight') && releaseKey('ArrowRight'));
          }
        },
        () => {
          ['w','a','s','d','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].forEach(k => {
            if (activeKeys.has(k)) releaseKey(k);
          });
        }
      );

      // RIGHT STICK
      bindStick('gp-rs', 'gp-rs-knob',
        (nx, ny) => {
          if (cfg.rmode === 'mouse') {
            cameraVector.x = nx * 6;
            cameraVector.y = ny * 6;
            if (!cameraLoopRunning) { cameraLoopRunning = true; runCameraLoop(); }
          }
        },
        () => {
          cameraVector.x = 0; cameraVector.y = 0;
        }
      );

      // BUTTONS
      bindBtn('gp-lmb', () => pressClick('left'), () => releaseClick('left'));
      bindBtn('gp-rmb', () => pressClick('right'), () => releaseClick('right'));
      bindBtn('gp-sb', () => pressKey(' '), () => releaseKey(' '));
      bindBtn('gp-esc', () => pressKey('Escape'), () => releaseKey('Escape'));
      document.getElementById('gp-gear').addEventListener('click', openPanel);
      document.getElementById('gp-gear').addEventListener('touchstart', e => { e.preventDefault(); e.stopPropagation(); openPanel(); }, { passive: false });
    }

    return {
      init() {
        loadCfg();
        initPanel();
        initControls();
        setupOptClick();
        syncToggleUI();
      },
      onGameOpen() {
        mx = window.innerWidth/2; my = window.innerHeight/2;
        if (cfg.enabled) {
          document.getElementById('gp-overlay').classList.add('gp-active');
          layout();
        }
      },
      onGameClose() {
        document.getElementById('gp-overlay').classList.remove('gp-active');
        activeKeys.forEach(k => releaseKey(k));
        activeClicks.forEach(c => releaseClick(c));
        cameraVector.x = 0; cameraVector.y = 0;
        rsTouchId = null; lsTouchId = null;
      },
      toggle() {
        cfg.enabled = !cfg.enabled;
        saveCfg();
        const hidden = document.getElementById('playerView').classList.contains('hidden');
        document.getElementById('gp-overlay').classList.toggle('gp-active', cfg.enabled && !hidden);
        if (cfg.enabled && !hidden) layout();
        syncToggleUI();
      },
      get enabled() { return cfg.enabled; }
    };

    function syncToggleUI() {
      const btn = document.getElementById('mobileModeToggle');
      const dot = btn?.querySelector('.mobile-dot');
      if (!btn) return;
      btn.style.background = cfg.enabled ? '#22c55e' : '';
      if (dot) dot.style.transform = cfg.enabled ? 'translateX(24px)' : 'translateX(0)';
    }
  })();

  // ══════════════════════════════════════════════════════════
  //  APP LOGIC
  // ══════════════════════════════════════════════════════════
  const grid = document.getElementById('gameGrid');
  const favGrid = document.getElementById('favGrid');
  const favSection = document.getElementById('favoritesSection');
  const searchInput = document.getElementById('searchInput');
  const home = document.getElementById('homeView');
  const player = document.getElementById('playerView');
  const iframe = document.getElementById('gameIframe');
  const activeTitle = document.getElementById('activeGameTitle');
  let favorites = JSON.parse(localStorage.getItem('favorites')) || [];

  function showNotification(text) {
    const c = document.getElementById('notification-container');
    const t = document.createElement('div');
    t.className = "toast-notify bg-zinc-900 dark:bg-zinc-100 text-white dark:text-zinc-900 px-5 py-3 rounded-2xl shadow-xl text-xs font-bold uppercase tracking-widest border border-white/10";
    t.innerText = text; c.appendChild(t);
    setTimeout(() => { t.style.opacity='0'; t.style.transform='translateY(-20px)'; t.style.transition='all .4s'; setTimeout(()=>t.remove(),400); }, 2500);
  }

  function setPresetCloak(title, rawUrl, isCircle) {
    const pi = `https://images.weserv.nl/?url=${encodeURIComponent(rawUrl)}&w=32&h=32${isCircle?'&bg=white&shape=circle':''}`;
    document.title = title;
    let l = document.querySelector("link[rel*='icon']");
    if (!l) { l = document.createElement('link'); l.type='image/x-icon'; l.rel='shortcut icon'; document.head.appendChild(l); }
    l.href = pi;
    localStorage.setItem('cloakTitle', title); localStorage.setItem('cloakIcon', pi);
    showNotification('Cloaked as ' + title);
  }

  function saveCloak() {
    const title = document.getElementById('cloakTitleInput').value;
    const iconUrl = document.getElementById('cloakIconInput').value;
    const pi = iconUrl ? 'https://images.weserv.nl/?url='+encodeURIComponent(iconUrl)+'&w=32&h=32' : '';
    if(title){document.title=title;localStorage.setItem('cloakTitle',title);}
    if(iconUrl){
      let l = document.querySelector("link[rel*='icon']");
      if (!l) { l = document.createElement('link'); l.type='image/x-icon'; l.rel='shortcut icon'; document.head.appendChild(l); }
      l.href = pi; localStorage.setItem('cloakIcon',pi);
    }
    showNotification('Cloak Applied!');
  }

  function resetCloak() { localStorage.removeItem('cloakTitle'); localStorage.removeItem('cloakIcon'); location.reload(); }

  function renderCard(game) {
    const isFav = favorites.includes(game.id);
    return `<div class="group relative active:scale-105 transition-transform duration-300">
      <button onclick="toggleFav('${game.id}',event)" class="absolute top-2 right-2 z-10 p-2 rounded-full bg-black/40 backdrop-blur-md active:scale-125 transition-transform">
        <svg class="star-icon ${isFav?'text-yellow-500':'text-white'}" width="16" height="16" fill="${isFav?'currentColor':'none'}" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
      </button>
      <div class="cursor-pointer" onclick="playGame('${game.id}')">
        <div class="aspect-video bg-zinc-800 rounded-2xl overflow-hidden mb-3 border-2 border-transparent group-hover:border-blue-500 group-hover:scale-105 transition-all duration-300">
          <img src="${game.image}" class="w-full h-full object-cover" loading="lazy">
        </div>
        <h3 class="font-bold text-[10px] uppercase tracking-widest opacity-60 group-hover:opacity-100">${game.title}</h3>
      </div>
    </div>`;
  }

  function init(filter = '') {
    document.body.classList.remove('preload');
    if (typeof GAMES_DATA === 'undefined') { setTimeout(() => init(filter), 100); return; }
    grid.innerHTML = GAMES_DATA.filter(g => g.title.toLowerCase().includes(filter.toLowerCase())).map(renderCard).join('');
    const favGames = GAMES_DATA.filter(g => favorites.includes(g.id));
    if (favGames.length && !filter) { favSection.classList.remove('hidden'); favGrid.innerHTML = favGames.map(renderCard).join(''); }
    else favSection.classList.add('hidden');
  }

  window.toggleFav = function(id, event) {
    event.stopPropagation();
    const game = GAMES_DATA.find(g => g.id === id);
    const btn = event.currentTarget.querySelector('.star-icon');
    if (favorites.includes(id)) { favorites = favorites.filter(f => f !== id); showNotification('Removed ' + game.title); }
    else { favorites.push(id); btn.classList.add('star-active'); setTimeout(() => btn.classList.remove('star-active'), 400); showNotification('Added ' + game.title + ' to Favourites'); }
    localStorage.setItem('favorites', JSON.stringify(favorites));
    init(searchInput.value);
  };

  window.playGame = function(id) {
    const game = GAMES_DATA.find(g => g.id === id);
    if (!game) return;
    activeTitle.innerText = game.title;
    iframe.src = game.url;

    document.getElementById('fullscreenBtn').onclick = () => {
      const el = document.getElementById('playerView');
      if (el.requestFullscreen) el.requestFullscreen().catch(()=>{});
    };

    document.getElementById('tabBtn').onclick = () => {
      const cT = localStorage.getItem('cloakTitle') || 'My Drive';
      const cI = localStorage.getItem('cloakIcon') || 'droplet.png';
      const win = window.open('about:blank', '_blank');
      if (win) {
        win.document.write(`<html><head><title>${cT}</title><link rel="icon" href="${cI}"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"><style>body,html{margin:0;padding:0;height:100dvh;width:100%;overflow:hidden;background:#000;position:fixed;}iframe{border:none;width:100%;height:100%;display:block;}</style></head><body><iframe src="${game.url}" allow="autoplay;fullscreen;keyboard-map"></iframe></body></html>`);
        win.document.close();
        iframe.src = ''; player.classList.add('hidden'); home.classList.remove('hidden');
        GP.onGameClose();
      } else alert('Please allow pop-ups!');
    };

    setTimeout(() => { home.classList.add('hidden'); player.classList.remove('hidden'); GP.onGameOpen(); }, 150);
  };

  document.getElementById('closePlayer').onclick = () => {
    iframe.src = ''; player.classList.add('hidden'); home.classList.remove('hidden'); GP.onGameClose();
  };

  // THEME TOGGLE - FIXED
  document.getElementById('themeToggle').onclick = () => {
    document.documentElement.classList.toggle('dark');
    const isDark = document.documentElement.classList.contains('dark');
    localStorage.setItem('theme', isDark ? 'dark' : 'light');
  };

  document.getElementById('mobileModeToggle').onclick = () => {
    GP.toggle();
    showNotification(GP.enabled ? '🎮 Mobile Mode ON' : '🎮 Mobile Mode OFF');
  };

  document.getElementById('settingsBtn').onclick = () => {
    document.getElementById('settingsModal').classList.remove('hidden');
    const btn = document.getElementById('mobileModeToggle');
    const dot = btn?.querySelector('.mobile-dot');
    if (btn) {
      btn.style.background = GP.enabled ? '#22c55e' : '';
      if (dot) dot.style.transform = GP.enabled ? 'translateX(24px)' : 'translateX(0)';
    }
  };
  document.getElementById('closeSettings').onclick = () => document.getElementById('settingsModal').classList.add('hidden');
  document.getElementById('openCloakBtn').onclick = () => {
    document.getElementById('cloakModal').classList.remove('hidden');
    document.getElementById('settingsModal').classList.add('hidden');
  };
  document.getElementById('closeCloak').onclick = () => document.getElementById('cloakModal').classList.add('hidden');
  searchInput.oninput = e => init(e.target.value);

  // Keep gamepad visible during fullscreen
  document.addEventListener('fullscreenchange', () => {
    if (GP.enabled && !document.getElementById('playerView').classList.contains('hidden')) {
      setTimeout(() => document.getElementById('gp-overlay').classList.add('gp-active'), 200);
    }
  });

  function renderShortcuts() {
    const sg = document.getElementById('shortcutGrid'), ss = document.getElementById('shortcutsSection');
    if (typeof SHORTCUTS_DATA === 'undefined' || !SHORTCUTS_DATA.length) return;
    ss.classList.remove('hidden');
    sg.innerHTML = SHORTCUTS_DATA.map(item => `
      <a href="${item.url}" target="_blank" class="group block active:scale-95 transition-transform">
        <div class="inline-block bg-zinc-200 dark:bg-zinc-800 rounded-2xl overflow-hidden border-2 border-transparent group-hover:border-blue-500 transition-all">
          <img src="${item.image}" class="max-h-32 w-auto object-contain block">
        </div>
        <h3 class="mt-2 text-center font-bold text-[10px] uppercase tracking-widest opacity-60 group-hover:opacity-100">${item.title}</h3>
      </a>`).join('');
  }

  window.addEventListener('resize', () => {
    if (GP.enabled && !document.getElementById('playerView').classList.contains('hidden')) GP.onGameOpen();
  });

  window.onload = () => { init(); renderShortcuts(); GP.init(); };
  </script>
</body>
