      <script>
         const proxy = (url) => `https://images.weserv.nl/?url=${encodeURIComponent(url.replace(/^https?:\/\//, ''))}&output=webp`;

         (function() {
             const savedTheme = localStorage.getItem('theme') || 'dark';
             if (savedTheme === 'dark') {
                 document.documentElement.classList.add('dark');
             } else {
                 document.documentElement.classList.remove('dark');
             }
             const cloakTitle = localStorage.getItem('cloakTitle');
             const cloakIcon = localStorage.getItem('cloakIcon');
             if (cloakTitle) document.title = cloakTitle;
             if (cloakIcon) {
                 const link = document.querySelector("link[rel*='icon']") || document.createElement('link');
                 link.type = 'image/x-icon';
                 link.rel = 'shortcut icon';
                 link.href = cloakIcon;
                 document.getElementsByTagName('head')[0].appendChild(link);
             }
         })();
         tailwind.config = { darkMode: 'class' }
      </script>

         * { -webkit-tap-highlight-color: transparent; touch-action: manipulation; }

            position: fixed; top: 0; left: 0; width: 100%; height: 100%;

         .gamepad-joystick {
            position: absolute; border-radius: 50%; background: rgba(255,255,255,0.15);
            border: 2px solid rgba(255,255,255,0.3); touch-action: none;
            pointer-events: auto;

         .gamepad-joystick .thumb {
            position: absolute; border-radius: 50%; background: rgba(255,255,255,0.5);

         }
         .gamepad-btn {
            position: absolute; pointer-events: auto; touch-action: none;
            background: rgba(255,255,255,0.2); border: 2px solid rgba(255,255,255,0.4);
            border-radius: 12px; display: flex; align-items: center; justify-content: center;

            position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);

            z-index: 200; display: none; max-width: 350px; width: 90%;

         #gamepad-settings label { display: block; margin: 8px 0; font-size: 12px; }
         #gamepad-settings select, #gamepad-settings input[type=range] { width: 100%; margin: 5px 0; }

      <script>
         const grid = document.getElementById('gameGrid');
         const favGrid = document.getElementById('favGrid');
         const favSection = document.getElementById('favoritesSection');
         const searchInput = document.getElementById('searchInput');
         const home = document.getElementById('homeView');
         const player = document.getElementById('playerView');
         const iframe = document.getElementById('gameIframe');
         const activeTitle = document.getElementById('activeGameTitle');
         
         let favorites = JSON.parse(localStorage.getItem('favorites')) || [];
         let mobileModeEnabled = localStorage.getItem('mobileMode') === 'true';
         
         // ── Mobile Gamepad Engine ──────────────────────────────────────────
         const GamepadEngine = {
            enabled: mobileModeEnabled,
            keys: { w: false, a: false, s: false, d: false, ArrowUp: false, ArrowLeft: false, ArrowDown: false, ArrowRight: false, ' ': false, Escape: false },
            mouse: { x: 0, y: 0, dx: 0, dy: 0, lmb: false, rmb: false },
            settings: {
               leftMode: localStorage.getItem('gp-left-mode') || 'both',
               rightMode: localStorage.getItem('gp-right-mode') || 'mouse',
               size: parseInt(localStorage.getItem('gp-size') || '100'),
               opacity: parseInt(localStorage.getItem('gp-opacity') || '60'),
               visible: localStorage.getItem('gp-visible') !== 'false',
               optimizeClick: localStorage.getItem('gp-optimize-click') !== 'false'
            },
            lstick: { active: false, id: null, baseX: 0, baseY: 0, curX: 0, curY: 0 },
            rstick: { active: false, id: null, baseX: 0, baseY: 0, curX: 0, curY: 0, prevX: 0, prevY: 0 },
            init() {
               const container = document.getElementById('gamepad-container');
               if (this.enabled && document.getElementById('playerView').classList.contains('hidden') === false) {
                  container.classList.add('active');
               }
               this.applySettings();
               this.bindEvents();
            },
            bindEvents() {
               const lstick = document.getElementById('gamepad-lstick');
               const rstick = document.getElementById('gamepad-rstick');
               lstick.addEventListener('touchstart', (e) => this.stickStart(e, 'lstick'));
               lstick.addEventListener('touchmove', (e) => this.stickMove(e, 'lstick'));
               lstick.addEventListener('touchend', (e) => this.stickEnd(e, 'lstick'));
               rstick.addEventListener('touchstart', (e) => this.stickStart(e, 'rstick'));
               rstick.addEventListener('touchmove', (e) => this.stickMove(e, 'rstick'));
               rstick.addEventListener('touchend', (e) => this.stickEnd(e, 'rstick'));
               ['gamepad-lmb','gamepad-rmb','gamepad-sb','gamepad-esc'].forEach(id => {
                  const btn = document.getElementById(id);
                  btn.addEventListener('touchstart', (e) => this.btnDown(e, id));
                  btn.addEventListener('touchend', (e) => this.btnUp(e, id));
               });
               document.getElementById('gamepad-settings-btn').addEventListener('touchstart', (e) => {
                  e.preventDefault();
                  document.getElementById('gamepad-settings').classList.add('open');
               });
               document.getElementById('gamepad-settings-close').addEventListener('click', () => {
                  document.getElementById('gamepad-settings').classList.remove('open');
               });
               document.getElementById('gp-left-mode').addEventListener('change', (e) => { this.settings.leftMode = e.target.value; localStorage.setItem('gp-left-mode', e.target.value); });
               document.getElementById('gp-right-mode').addEventListener('change', (e) => { this.settings.rightMode = e.target.value; localStorage.setItem('gp-right-mode', e.target.value); this.applySettings(); });
               document.getElementById('gp-size').addEventListener('input', (e) => { this.settings.size = parseInt(e.target.value); localStorage.setItem('gp-size', e.target.value); document.getElementById('gp-size-val').textContent = e.target.value+'%'; this.applySettings(); });
               document.getElementById('gp-opacity').addEventListener('input', (e) => { this.settings.opacity = parseInt(e.target.value); localStorage.setItem('gp-opacity', e.target.value); document.getElementById('gp-opacity-val').textContent = e.target.value+'%'; this.applySettings(); });
               document.getElementById('gp-optimize-click').addEventListener('change', (e) => { this.settings.optimizeClick = e.target.checked; localStorage.setItem('gp-optimize-click', e.target.checked); });
               document.getElementById('gp-toggle-vis').addEventListener('click', () => { this.settings.visible = !this.settings.visible; localStorage.setItem('gp-visible', this.settings.visible); this.applySettings(); });
            },
            stickStart(e, stick) {
               e.preventDefault();
               const t = e.changedTouches[0];
               const el = document.getElementById('gamepad-' + stick);
               const rect = el.getBoundingClientRect();
               this[stick].active = true;
               this[stick].id = t.identifier;
               this[stick].baseX = rect.left + rect.width/2;
               this[stick].baseY = rect.top + rect.height/2;
               this[stick].curX = t.clientX;
               this[stick].curY = t.clientY;
               if (stick === 'rstick') { this.rstick.prevX = t.clientX; this.rstick.prevY = t.clientY; }
               this.updateStick(stick, t.clientX, t.clientY);
            },
            stickMove(e, stick) {
               e.preventDefault();
               if (!this[stick].active) return;
               for (let t of e.changedTouches) {
                  if (t.identifier === this[stick].id) {
                     this[stick].curX = t.clientX;
                     this[stick].curY = t.clientY;
                     this.updateStick(stick, t.clientX, t.clientY);
                  }
               }
            },
            stickEnd(e, stick) {
               e.preventDefault();
               for (let t of e.changedTouches) {
                  if (t.identifier === this[stick].id) {
                     this[stick].active = false;
                     this[stick].id = null;
                     this.resetStick(stick);
                  }
               }
            },
            updateStick(stick, x, y) {
               const el = document.getElementById('gamepad-' + stick);
               const thumb = el.querySelector('.thumb');
               const dx = x - this[stick].baseX;
               const dy = y - this[stick].baseY;
               const dist = Math.sqrt(dx*dx + dy*dy);
               const maxDist = el.offsetWidth / 2 - 15;
               const clamped = Math.min(dist, maxDist);
               const angle = Math.atan2(dy, dx);
               const clampX = Math.cos(angle) * clamped;
               const clampY = Math.sin(angle) * clamped;
               thumb.style.transform = `translate(calc(-50% + ${clampX}px), calc(-50% + ${clampY}px))`;
               const normX = clampX / maxDist;
               const normY = clampY / maxDist;
               if (stick === 'lstick') {
                  const mode = this.settings.leftMode;
                  if (mode === 'wasd' || mode === 'both') {
                     this.setKey('w', normY < -0.3); this.setKey('s', normY > 0.3);
                     this.setKey('a', normX < -0.3); this.setKey('d', normX > 0.3);
                  }
                  if (mode === 'arrows' || mode === 'both') {
                     this.setKey('ArrowUp', normY < -0.3); this.setKey('ArrowDown', normY > 0.3);
                     this.setKey('ArrowLeft', normX < -0.3); this.setKey('ArrowRight', normX > 0.3);
                  }
               } else if (stick === 'rstick') {
                  if (this.settings.rightMode === 'mouse') {
                     const cr = el.getBoundingClientRect();
                     const sx = cr.width/2, sy = cr.height/2;
                     this.mouse.dx = normX * 8; this.mouse.dy = normY * 8;
                     this.mouse.x += this.mouse.dx; this.mouse.y += this.mouse.dy;
                     const iframeEl = document.getElementById('gameIframe');
                     if (iframeEl && iframeEl.contentWindow) {
                        const iframeRect = iframeEl.getBoundingClientRect();
                        const mx = iframeRect.left + iframeRect.width/2 + this.mouse.x;
                        const my = iframeRect.top + iframeRect.height/2 + this.mouse.y;
                        iframeEl.contentWindow.postMessage({ type: 'mousemove', x: mx, y: my }, '*');
                     }
                  } else if (this.settings.rightMode === 'camera') {
                     const dx2 = x - this.rstick.prevX;
                     const dy2 = y - this.rstick.prevY;
                     this.rstick.prevX = x; this.rstick.prevY = y;
                     const iframeEl = document.getElementById('gameIframe');
                     if (iframeEl && iframeEl.contentWindow) {
                        iframeEl.contentWindow.postMessage({ type: 'mousemove', dx: dx2, dy: dy2, camera: true }, '*');
                     }
                  }
               }
            },
            resetStick(stick) {
               const el = document.getElementById('gamepad-' + stick);
               const thumb = el.querySelector('.thumb');
               thumb.style.transform = 'translate(-50%, -50%)';
               if (stick === 'lstick') {
                  this.setKey('w', false); this.setKey('a', false); this.setKey('s', false); this.setKey('d', false);
                  this.setKey('ArrowUp', false); this.setKey('ArrowLeft', false); this.setKey('ArrowDown', false); this.setKey('ArrowRight', false);
               } else {
                  this.mouse.dx = 0; this.mouse.dy = 0;
               }
            },
            setKey(key, pressed) {
               if (this.keys[key] !== pressed) {
                  this.keys[key] = pressed;
                  const iframeEl = document.getElementById('gameIframe');
                  if (iframeEl && iframeEl.contentWindow) {
                     iframeEl.contentWindow.postMessage({ type: 'key', key, pressed }, '*');
                  }
               }
            },
            btnDown(e, id) {
               e.preventDefault();
               const map = { 'gamepad-lmb': 'lmb', 'gamepad-rmb': 'rmb', 'gamepad-sb': 'space', 'gamepad-esc': 'esc' };
               const act = map[id];
               if (act === 'lmb') this.mouse.lmb = true;
               if (act === 'rmb') this.mouse.rmb = true;
               if (act === 'space') this.setKey(' ', true);
               if (act === 'esc') this.setKey('Escape', true);
               const iframeEl = document.getElementById('gameIframe');
               if (iframeEl && iframeEl.contentWindow) {
                  iframeEl.contentWindow.postMessage({ type: 'mousebtn', btn: act === 'lmb' ? 0 : 2, pressed: true }, '*');
               }
            },
            btnUp(e, id) {
               e.preventDefault();
               const map = { 'gamepad-lmb': 'lmb', 'gamepad-rmb': 'rmb', 'gamepad-sb': 'space', 'gamepad-esc': 'esc' };
               const act = map[id];
               if (act === 'lmb') this.mouse.lmb = false;
               if (act === 'rmb') this.mouse.rmb = false;
               if (act === 'space') this.setKey(' ', false);
               if (act === 'esc') this.setKey('Escape', false);
               const iframeEl = document.getElementById('gameIframe');
               if (iframeEl && iframeEl.contentWindow) {
                  iframeEl.contentWindow.postMessage({ type: 'mousebtn', btn: act === 'lmb' ? 0 : 2, pressed: false }, '*');
               }
            },
            applySettings() {
               const s = this.settings;
               ['gamepad-lstick','gamepad-rstick'].forEach(id => {
                  const el = document.getElementById(id);
                  if (el) { el.style.width = s.size+'px'; el.style.height = s.size+'px'; }
               });
               const btns = document.querySelectorAll('.gamepad-btn');
               btns.forEach(b => { b.style.opacity = s.opacity/100; b.style.fontSize = Math.max(10, s.size*0.12)+'px'; });
               const gpSettings = document.getElementById('gamepad-settings');
               gpSettings.style.opacity = s.opacity/100;
               document.getElementById('gp-toggle-vis').textContent = s.visible ? 'Hide UI' : 'Show UI';
               if (!s.visible) {
                  document.getElementById('gamepad-lstick').style.display = 'none';
                  document.getElementById('gamepad-rstick').style.display = 'none';
                  btns.forEach(b => { if (b.id !== 'gamepad-settings-btn') b.style.display = 'none'; });
               } else {
                  document.getElementById('gamepad-lstick').style.display = '';
                  document.getElementById('gamepad-rstick').style.display = '';
                  btns.forEach(b => b.style.display = '');
               }
               if (s.rightMode === 'camera') {
                  document.getElementById('gamepad-rstick').style.display = 'none';
               }
               this.layoutUI();
            },
            layoutUI() {
               const s = this.settings;
               const lstick = document.getElementById('gamepad-lstick');
               const rstick = document.getElementById('gamepad-rstick');
               const lmb = document.getElementById('gamepad-lmb');
               const rmb = document.getElementById('gamepad-rmb');
               const sb = document.getElementById('gamepad-sb');
               const esc = document.getElementById('gamepad-esc');
               const settingsBtn = document.getElementById('gamepad-settings-btn');
               const W = window.innerWidth, H = window.innerHeight;
               const sz = s.size;
               lstick.style.left = '20px'; lstick.style.bottom = '40px';
               if (s.rightMode === 'mouse') { rstick.style.right = '20px'; rstick.style.bottom = '40px'; rstick.style.left = 'auto'; rstick.style.top = 'auto'; }
               lmb.style.right = (20 + sz + 10)+'px'; lmb.style.bottom = (40 + sz/2 - 20)+'px'; lmb.style.width = '60px'; lmb.style.height = '40px';
               rmb.style.right = (20 + sz + 10)+'px'; rmb.style.bottom = (40 + sz/2 + 30)+'px'; rmb.style.width = '60px'; rmb.style.height = '40px';
               sb.style.left = '50%'; sb.style.bottom = '30px'; sb.style.transform = 'translateX(-50%)'; sb.style.width = '80px'; sb.style.height = '35px';
               esc.style.left = '20px'; esc.style.top = '20px'; esc.style.width = '50px'; esc.style.height = '35px';
               settingsBtn.style.right = '20px'; settingsBtn.style.top = '20px'; settingsBtn.style.width = '45px'; settingsBtn.style.height = '35px';
            },
            toggle() {
               this.enabled = !this.enabled;
               localStorage.setItem('mobileMode', this.enabled);
               const container = document.getElementById('gamepad-container');
               if (this.enabled && !document.getElementById('playerView').classList.contains('hidden')) {
                  container.classList.add('active'); this.applySettings();
               } else { container.classList.remove('active'); }
            },
            onGameOpen() { if (this.enabled) { document.getElementById('gamepad-container').classList.add('active'); this.applySettings(); } },
            onGameClose() { document.getElementById('gamepad-container').classList.remove('active'); }
         };
         
         function updateMobileModeUI() {
            const btn = document.getElementById('mobileModeToggle');
            const dot = btn.querySelector('.mobile-dot');
            if (GamepadEngine.enabled) { btn.classList.add('active'); btn.style.background = '#22c55e'; dot.style.transform = 'translateX(24px)'; }
            else { btn.style.background = ''; btn.classList.remove('active'); dot.style.transform = 'translateX(0)'; }
         }
         
         function toggleMobileMode() {
            GamepadEngine.toggle();
            updateMobileModeUI();
            showNotification(GamepadEngine.enabled ? '🎮 Mobile Mode ON' : '🎮 Mobile Mode OFF');
         }
         
         function showNotification(text) {
             const container = document.getElementById('notification-container');
             const toast = document.createElement('div');
             toast.className = "toast-notify bg-zinc-900 dark:bg-zinc-100 text-white dark:text-zinc-900 px-5 py-3 rounded-2xl shadow-xl text-xs font-bold uppercase tracking-widest border border-white/10";
             toast.innerText = text;
             container.appendChild(toast);
             setTimeout(() => { toast.style.opacity = '0'; toast.style.transform = 'translateY(-20px)'; toast.style.transition = 'all 0.4s ease'; setTimeout(() => toast.remove(), 400); }, 2500);
         }
         
         function setPresetCloak(title, rawUrl, isCircle) {
            const proxiedIcon = `https://images.weserv.nl/?url=${encodeURIComponent(rawUrl)}&w=32&h=32${isCircle ? '&bg=white&shape=circle' : ''}`;
            document.title = title;
            const link = document.querySelector("link[rel*='icon']") || document.createElement('link');
            link.href = proxiedIcon;
            document.getElementsByTagName('head')[0].appendChild(link);
            localStorage.setItem('cloakTitle', title);
            localStorage.setItem('cloakIcon', proxiedIcon);
            showNotification(`Cloaked as ${title}`);
         }
         
         function saveCloak() {
             const title = document.getElementById('cloakTitleInput').value;
             const iconUrl = document.getElementById('cloakIconInput').value;
             const proxiedIcon = iconUrl ? proxy(iconUrl) + "&w=32&h=32" : '';
             if(title) { document.title = title; localStorage.setItem('cloakTitle', title); }
             if(iconUrl) {
                 const link = document.querySelector("link[rel*='icon']") || document.createElement('link');
                 link.href = proxiedIcon;
                 document.getElementsByTagName('head')[0].appendChild(link);
                 localStorage.setItem('cloakIcon', proxiedIcon);
             }
             showNotification("Custom Cloak Applied!");
         }
         
         function resetCloak() { localStorage.removeItem('cloakTitle'); localStorage.removeItem('cloakIcon'); location.reload(); }
         
         function renderCard(game) {
             const isFav = favorites.includes(game.id);
             return '<div class="group relative active:scale-105 transition-transform duration-300">' +
                    '<button onclick="toggleFav(\'' + game.id + '\', event)" class="absolute top-2 right-2 z-10 p-2 rounded-full bg-black/40 backdrop-blur-md active:scale-125 transition-transform">' +
                    '<svg class="star-icon ' + (isFav ? 'text-yellow-500' : 'text-white') + '" width="16" height="16" fill="' + (isFav ? 'currentColor' : 'none') + '" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">' +
                    '<path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg></button>' +
                    '<div class="cursor-pointer" onclick="playGame(\'' + game.id + '\')">' +
                    '<div class="aspect-video bg-zinc-800 rounded-2xl overflow-hidden mb-3 border-2 border-transparent group-hover:border-blue-500 group-hover:scale-105 transition-all duration-300">' +
                    '<img src="' + game.image + '" class="w-full h-full object-cover" loading="lazy"></div>' +
                    '<h3 class="font-bold text-[10px] uppercase tracking-widest opacity-60 group-hover:opacity-100">' + game.title + '</h3></div></div>';
         }
         
         function init(filter = "") {
             document.body.classList.remove('preload');
             if (typeof GAMES_DATA === 'undefined') return;
             const filteredGames = GAMES_DATA.filter(g => g.title.toLowerCase().includes(filter.toLowerCase()));
             grid.innerHTML = filteredGames.map(game => renderCard(game)).join('');
             const favGames = GAMES_DATA.filter(g => favorites.includes(g.id));
             if (favGames.length > 0 && filter === "") { favSection.classList.remove('hidden'); favGrid.innerHTML = favGames.map(game => renderCard(game)).join(''); }
             else { favSection.classList.add('hidden'); }
         }
         
         window.toggleFav = function(id, event) {
             event.stopPropagation();
             const game = GAMES_DATA.find(g => g.id === id);
             const btn = event.currentTarget.querySelector('.star-icon');
             if (favorites.includes(id)) { favorites = favorites.filter(f => f !== id); showNotification("Removed " + game.title); }
             else { favorites.push(id); btn.classList.add('star-active'); setTimeout(() => btn.classList.remove('star-active'), 400); showNotification("Added " + game.title + " to Favourites"); }
             localStorage.setItem('favorites', JSON.stringify(favorites));
             init(searchInput.value);
         };
         
         window.playGame = function(id) {
         const game = GAMES_DATA.find(g => g.id === id);
         if (!game) return;
         activeTitle.innerText = game.title;
         iframe.src = game.url;
         document.getElementById('tabBtn').onclick = function() {
         const cloakT = localStorage.getItem('cloakTitle') || "My Drive";
         const cloakI = localStorage.getItem('cloakIcon') || "droplet.png";
         const win = window.open('about:blank', '_blank');
         if (win) {
             const doc = win.document;
             doc.write(`<html><head><title>${cloakT}</title><link rel="icon" href="${cloakI}"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"><style>body,html{margin:0;padding:0;height:100dvh;height:100%;width:100%;overflow:hidden;background:#000;position:fixed;}iframe{border:none;width:100%;height:100%;display:block;}</style></head><body><iframe src="${game.url}" allow="autoplay; fullscreen; keyboard-map"></iframe></body></html>`);
             doc.close();
             iframe.src = ""; player.classList.add('hidden'); home.classList.remove('hidden');
         } else { alert("Please allow pop-ups!"); }
         };
         setTimeout(() => { home.classList.add('hidden'); player.classList.remove('hidden'); GamepadEngine.onGameOpen(); }, 150);
         };
         
         document.getElementById('closePlayer').onclick = () => { iframe.src = ""; player.classList.add('hidden'); home.classList.remove('hidden'); GamepadEngine.onGameClose(); };
         document.getElementById('themeToggle').onclick = () => { document.documentElement.classList.toggle('dark'); localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light'); };
         document.getElementById('settingsBtn').onclick = () => { document.getElementById('settingsModal').classList.remove('hidden'); updateMobileModeUI(); };
         document.getElementById('closeSettings').onclick = () => document.getElementById('settingsModal').classList.add('hidden');
         document.getElementById('openCloakBtn').onclick = () => { document.getElementById('cloakModal').classList.remove('hidden'); document.getElementById('settingsModal').classList.add('hidden'); };
         document.getElementById('closeCloak').onclick = () => document.getElementById('cloakModal').classList.add('hidden');
         searchInput.oninput = (e) => init(e.target.value);

         function renderShortcuts() {
             const grid = document.getElementById('shortcutGrid');
             const section = document.getElementById('shortcutsSection');
             if (typeof SHORTCUTS_DATA === 'undefined' || SHORTCUTS_DATA.length === 0) return;
             section.classList.remove('hidden');
             grid.innerHTML = SHORTCUTS_DATA.map(item => `
                 <a href="${item.url}" target="_blank" class="group block active:scale-95 transition-transform">
                    <div class="inline-block bg-zinc-200 dark:bg-zinc-800 rounded-2xl overflow-hidden border-2 border-transparent group-hover:border-blue-500 transition-all">
                        <img src="${item.image}" class="max-h-32 w-auto object-contain block">
                    </div>
                    <h3 class="mt-2 text-center font-bold text-[10px] uppercase tracking-widest opacity-60 group-hover:opacity-100">${item.title}</h3>
                 </a>
             `).join('');
         }

         window.onload = () => {
             init();
             renderShortcuts();
             GamepadEngine.init();
             updateMobileModeUI();
         };
         
         window.addEventListener('resize', () => { if (GamepadEngine.enabled) GamepadEngine.layoutUI(); });
      </script>
   </body>
</html>
