<!DOCTYPE html>
<html lang="en">
   <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
      <title id="tabTitle">GOONGAMES</title>
      <meta name="apple-mobile-web-app-capable" content="yes">
      <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
      <meta name="apple-mobile-web-app-title" content="GOONGAMES">
      <link id="tabIcon" rel="icon" type="image/png" href="droplet.png">
      <link rel="apple-touch-icon" href="droplet.png">
      <link rel="manifest" href="data:application/manifest+json,{'name':'GOONGAMES','short_name':'GOONGAMES','start_url':'index.html','display':'standalone','background_color':'#09090b','theme_color':'#3b82f6','icons':[{'src':'droplet.png','sizes':'192x192','type':'image/png'}]}">
      <script src="https://cdn.tailwindcss.com"></script>
      <script>
         // 1. CLEAN PROXY HELPER
         const proxy = (url) => {
            if (!url) return '';
            // Remove the protocol if it exists to keep the URL clean for weserv
            const cleanUrl = url.replace(/^https?:\/\//, '');
            return `https://images.weserv.nl/?url=${encodeURIComponent(cleanUrl)}&w=400&fit=inside&output=webp`;
         };

         (function() {
             const savedTheme = localStorage.getItem('theme') || 'dark';
             if (savedTheme === 'dark') {
                 document.documentElement.classList.add('dark');
             } else {
                 document.documentElement.classList.remove('dark');
             }
         
             const cloakTitle = localStorage.getItem('cloakTitle');
             const cloakIcon = localStorage.getItem('cloakIcon');
             
             if (cloakTitle) document.title = cloakTitle;
             if (cloakIcon) {
                 const link = document.querySelector("link[rel*='icon']") || document.createElement('link');
                 link.type = 'image/x-icon';
                 link.rel = 'shortcut icon';
                 link.href = cloakIcon;
                 document.getElementsByTagName('head')[0].appendChild(link);
             }
         })();
         
         tailwind.config = { darkMode: 'class' }
      </script>
      <script src="games.js"></script>
      <script src="shortcut.js"></script>
      <style>
         * { -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
         .preload * { transition: none !important; }
         html, body, nav, section, div, h1, h2, h3, span, button, input {
            transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
         }
         ::-webkit-scrollbar { width: 8px; }
         ::-webkit-scrollbar-track { background: transparent; }
         ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 10px; }
         #toggleCircle { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); transform: translateX(0px); }
         .dark #toggleCircle { transform: translateX(24px); }
         .sun-visible { display: block; } .moon-visible { display: none; }
         .dark .sun-visible { display: none; } .dark .moon-visible { display: block; }
         .star-icon { transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
         .star-active { transform: scale(1.4) rotate(15deg); }
         @keyframes toastIn {
            from { transform: translateY(100px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
         }
         .toast-notify { animation: toastIn 0.3s ease forwards; }
         .logo-img { filter: invert(1); transition: filter 0.3s ease; }
         .dark .logo-img { filter: invert(0); }
         .cloak-preset { width: 44px; height: 44px; border-radius: 99px; display: flex; align-items: center; justify-content: center; transition: all 0.2s; background: #f4f4f5; cursor: pointer; }
         .dark .cloak-preset { background: #27272a; }
         .cloak-preset:active { transform: scale(0.9); }
         .cloak-preset img { width: 24px; height: 24px; object-fit: contain; }
         .game-iframe-container { background: #000; border-radius: 28px; overflow: hidden; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
      </style>
   </head>
   <body class="preload bg-zinc-50 dark:bg-zinc-900 text-zinc-900 dark:text-zinc-100 min-h-screen font-sans overflow-x-hidden">
      <div id="notification-container" class="fixed bottom-5 right-5 z-[100] flex flex-col gap-3 pointer-events-none"></div>
      
      <nav class="sticky top-0 z-40 w-full bg-white/80 dark:bg-zinc-800/80 backdrop-blur-md border-b border-zinc-200 dark:border-zinc-700 px-4 py-3 flex flex-wrap gap-4 justify-between items-center">
         <div class="flex items-center gap-2">
            <img src="droplet.png" class="w-8 h-8 object-contain logo-img" alt="Logo">
            <div class="flex items-baseline gap-1">
               <h1 class="text-xl font-black tracking-tighter uppercase">GOONGAMES</h1>
               <span class="text-[10px] font-bold text-blue-500 uppercase">Remake</span>
            </div>
         </div>
         <div class="flex-grow max-w-md relative order-3 sm:order-none">
            <input type="text" id="searchInput" placeholder="Search games..." class="w-full bg-zinc-100 dark:bg-zinc-800 border border-zinc-200 dark:border-zinc-700 rounded-full py-2 px-10 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
            <svg class="absolute left-3 top-2.5 text-zinc-400" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
               <circle cx="11" cy="11" r="8"/>
               <path d="m21 21-4.3-4.3"/>
            </svg>
         </div>
         <button id="settingsBtn" class="p-2 hover:bg-zinc-200 dark:hover:bg-zinc-700 rounded-full transition-all active:scale-90">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
               <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/>
               <circle cx="12" cy="12" r="3"/>
            </svg>
         </button>
      </nav>

      <main id="homeView" class="max-w-7xl mx-auto p-6 space-y-12">
         <section id="shortcutsSection" class="hidden">
            <h2 class="text-xs font-black uppercase tracking-[0.3em] opacity-40 mb-6">Quick Links</h2>
            <div id="shortcutGrid" class="flex flex-wrap gap-6 border-b border-zinc-200 dark:border-zinc-800 pb-12"></div>
         </section>

         <section id="favoritesSection" class="hidden">
            <h2 class="text-xs font-black uppercase tracking-[0.3em] text-yellow-500 mb-6 flex items-center gap-2">
               <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
                  <path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/>
               </svg>
               Favourited
            </h2>
            <div id="favGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-6 border-b border-zinc-200 dark:border-zinc-800 pb-12"></div>
         </section>

         <section id="librarySection">
            <h2 class="text-xs font-black uppercase tracking-[0.3em] opacity-40 mb-6">Library</h2>
            <div id="gameGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-6"></div>
         </section>
      </main>

      <!-- Game Player View -->
      <div id="playerView" class="hidden fixed inset-0 z-50 bg-black flex flex-col">
         <div class="flex justify-between items-center p-4 bg-zinc-900/90 backdrop-blur-md border-b border-zinc-800 sticky top-0 z-10">
            <div class="flex items-center gap-3">
               <button id="backToHomeBtn" class="p-2 hover:bg-zinc-800 rounded-full transition">
                  <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
               </button>
               <h2 id="activeGameTitle" class="font-bold text-white text-lg">Playing Game</h2>
            </div>
            <button id="fullscreenBtn" class="p-2 hover:bg-zinc-800 rounded-full transition">
               <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
            </button>
         </div>
         <div class="flex-1 flex items-center justify-center p-4">
            <div class="w-full max-w-6xl aspect-video game-iframe-container bg-black shadow-2xl">
               <iframe id="gameIframe" class="w-full h-full border-0" allowfullscreen sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-modals allow-top-navigation"></iframe>
            </div>
         </div>
      </div>

      <!-- Settings Modal -->
      <div id="settingsModal" class="hidden fixed inset-0 z-50 bg-black/70 backdrop-blur-sm flex items-center justify-center p-4" onclick="if(event.target===this) closeSettingsModal()">
         <div class="bg-white dark:bg-zinc-800 rounded-2xl max-w-md w-full p-6 shadow-2xl border border-zinc-200 dark:border-zinc-700">
            <div class="flex justify-between items-center mb-5">
               <h3 class="text-xl font-bold">Customize</h3>
               <button onclick="closeSettingsModal()" class="p-1 rounded-full hover:bg-zinc-200 dark:hover:bg-zinc-700">✕</button>
            </div>
            <div class="space-y-6">
               <div class="flex justify-between items-center p-3 bg-zinc-100 dark:bg-zinc-900 rounded-xl">
                  <span class="font-medium">Dark Mode</span>
                  <button id="themeToggleBtn" class="relative w-14 h-7 bg-zinc-300 dark:bg-blue-600 rounded-full transition-colors">
                     <span id="toggleCircle" class="absolute top-1 left-1 w-5 h-5 bg-white rounded-full shadow-md transition-transform"></span>
                  </button>
               </div>
               <div class="border-t border-zinc-200 dark:border-zinc-700 pt-4">
                  <p class="text-xs font-bold uppercase tracking-wider mb-3 opacity-70">Cloaking (Tab Title & Icon)</p>
                  <div class="flex gap-2 mb-4 flex-wrap">
                     <div class="cloak-preset" onclick="setPresetCloak('Google Classroom', 'https://ssl.gstatic.com/classroom/favicon.png', false)"><img src="https://www.google.com/s2/favicons?domain=classroom.google.com&sz=64" alt="classroom"></div>
                     <div class="cloak-preset" onclick="setPresetCloak('Google Drive', 'https://ssl.gstatic.com/drive/icon/favicon.ico', false)"><img src="https://www.google.com/s2/favicons?domain=drive.google.com&sz=64" alt="drive"></div>
                     <div class="cloak-preset" onclick="setPresetCloak('Canvas', 'https://du11hjcvx0uqb.cloudfront.net/dist/images/favicon-e82d87d6b6.ico', false)"><img src="https://www.google.com/s2/favicons?domain=canvas.instructure.com&sz=64" alt="canvas"></div>
                     <div class="cloak-preset" onclick="resetCloak()"><span class="text-xs font-bold">⟳ Reset</span></div>
                  </div>
                  <input type="text" id="cloakTitleInput" placeholder="Custom Title" class="w-full mb-2 bg-zinc-100 dark:bg-zinc-900 rounded-xl px-4 py-2 text-sm border border-zinc-300 dark:border-zinc-700">
                  <input type="text" id="cloakIconInput" placeholder="Icon URL (png/jpg)" class="w-full mb-3 bg-zinc-100 dark:bg-zinc-900 rounded-xl px-4 py-2 text-sm border border-zinc-300 dark:border-zinc-700">
                  <div class="flex gap-3">
                     <button onclick="saveCloak()" class="flex-1 bg-blue-500 text-white py-2 rounded-xl font-semibold text-sm">Apply Custom</button>
                  </div>
               </div>
            </div>
         </div>
      </div>

      <script>
         // DOM Elements
         const grid = document.getElementById('gameGrid');
         const favGrid = document.getElementById('favGrid');
         const favSection = document.getElementById('favoritesSection');
         const searchInput = document.getElementById('searchInput');
         const homeView = document.getElementById('homeView');
         const playerView = document.getElementById('playerView');
         const iframe = document.getElementById('gameIframe');
         const activeTitle = document.getElementById('activeGameTitle');
         const settingsBtn = document.getElementById('settingsBtn');
         const settingsModal = document.getElementById('settingsModal');
         const themeToggleBtn = document.getElementById('themeToggleBtn');
         const backToHomeBtn = document.getElementById('backToHomeBtn');
         const fullscreenBtn = document.getElementById('fullscreenBtn');
         
         let favorites = JSON.parse(localStorage.getItem('favorites')) || [];
         
         function showNotification(text) {
             const container = document.getElementById('notification-container');
             const toast = document.createElement('div');
             toast.className = "toast-notify bg-zinc-900 dark:bg-zinc-100 text-white dark:text-zinc-900 px-5 py-3 rounded-2xl shadow-xl text-xs font-bold uppercase tracking-widest border border-white/10";
             toast.innerText = text;
             container.appendChild(toast);
             setTimeout(() => {
                 toast.style.opacity = '0';
                 toast.style.transform = 'translateY(-20px)';
                 toast.style.transition = 'all 0.4s ease';
                 setTimeout(() => toast.remove(), 400);
             }, 2500);
         }

         // PRESET CLOAK LOGIC
         window.setPresetCloak = function(title, rawUrl, isCircle) {
            let finalIcon = proxy(rawUrl);
            if (isCircle) finalIcon += '&bg=white&shape=circle';
            
            document.title = title;
            const link = document.querySelector("link[rel*='icon']") || document.createElement('link');
            link.rel = 'icon';
            link.href = finalIcon;
            document.getElementsByTagName('head')[0].appendChild(link);
            localStorage.setItem('cloakTitle', title);
            localStorage.setItem('cloakIcon', finalIcon);
            showNotification(`Cloaked as ${title}`);
         }
         
         window.saveCloak = function() {
             const title = document.getElementById('cloakTitleInput').value;
             const iconUrl = document.getElementById('cloakIconInput').value;
             if(title) { document.title = title; localStorage.setItem('cloakTitle', title); }
             if(iconUrl) {
                 const proxiedIcon = proxy(iconUrl);
                 const link = document.querySelector("link[rel*='icon']") || document.createElement('link');
                 link.rel = 'icon';
                 link.href = proxiedIcon;
                 document.getElementsByTagName('head')[0].appendChild(link);
                 localStorage.setItem('cloakIcon', proxiedIcon);
             }
             showNotification("Custom Cloak Applied!");
             closeSettingsModal();
         }
         
         window.resetCloak = function() {
             localStorage.removeItem('cloakTitle');
             localStorage.removeItem('cloakIcon');
             location.reload();
         }
         
         function closeSettingsModal() {
             settingsModal.classList.add('hidden');
         }
         
         // Theme toggle
         function initThemeToggle() {
             const toggleCircle = document.getElementById('toggleCircle');
             const isDark = document.documentElement.classList.contains('dark');
             if (toggleCircle) {
                 toggleCircle.style.transform = isDark ? 'translateX(24px)' : 'translateX(0px)';
             }
         }
         
         themeToggleBtn.addEventListener('click', () => {
             const isDark = document.documentElement.classList.contains('dark');
             if (isDark) {
                 document.documentElement.classList.remove('dark');
                 localStorage.setItem('theme', 'light');
             } else {
                 document.documentElement.classList.add('dark');
                 localStorage.setItem('theme', 'dark');
             }
             initThemeToggle();
         });
         
         // RENDERING
         function renderCard(game) {
             const isFav = favorites.includes(game.id);
             return `<div class="group relative active:scale-105 transition-transform duration-300">
                    <button onclick="toggleFav('${game.id}', event)" class="absolute top-2 right-2 z-10 p-2 rounded-full bg-black/40 backdrop-blur-md active:scale-125 transition-transform">
                    <svg class="star-icon ${isFav ? 'text-yellow-500' : 'text-white'}" width="16" height="16" fill="${isFav ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg></button>
                    <div class="cursor-pointer" onclick="playGame('${game.id}')">
                    <div class="aspect-video bg-zinc-800 rounded-2xl overflow-hidden mb-3 border-2 border-transparent group-hover:border-blue-500 group-hover:scale-105 transition-all duration-300">
                    <img src="${game.image}" class="w-full h-full object-cover" loading="lazy"></div>
                    <h3 class="font-bold text-[10px] uppercase tracking-widest opacity-60 group-hover:opacity-100">${game.title}</h3></div></div>`;
         }
         
         window.toggleFav = function(gameId, event) {
             if(event) event.stopPropagation();
             if (favorites.includes(gameId)) {
                 favorites = favorites.filter(id => id !== gameId);
                 showNotification("Removed from favorites");
             } else {
                 favorites.push(gameId);
                 showNotification("Added to favorites");
             }
             localStorage.setItem('favorites', JSON.stringify(favorites));
             init(searchInput.value.trim());
         }
         
         window.playGame = function(gameId) {
             if (typeof GAMES_DATA === 'undefined') {
                 showNotification("Game data not loaded yet");
                 return;
             }
             const game = GAMES_DATA.find(g => g.id === gameId);
             if (game) {
                 activeTitle.textContent = game.title;
                 iframe.src = game.url;
                 homeView.classList.add('hidden');
                 playerView.classList.remove('hidden');
                 document.body.style.overflow = 'hidden';
             } else {
                 showNotification("Game not found");
             }
         }
         
         function closePlayer() {
             iframe.src = '';
             homeView.classList.remove('hidden');
             playerView.classList.add('hidden');
             document.body.style.overflow = '';
         }
         
         backToHomeBtn.addEventListener('click', closePlayer);
         
         fullscreenBtn.addEventListener('click', () => {
             const container = document.querySelector('.game-iframe-container');
             if (container.requestFullscreen) {
                 container.requestFullscreen();
             } else if (container.webkitRequestFullscreen) {
                 container.webkitRequestFullscreen();
             } else if (container.msRequestFullscreen) {
                 container.msRequestFullscreen();
             }
         });
         
         function init(filter = "") {
             document.body.classList.remove('preload');
             if (typeof GAMES_DATA === 'undefined') {
                 console.error("GAMES_DATA not loaded! Check games.js");
                 grid.innerHTML = '<div class="text-center col-span-full">Loading games...</div>';
                 return;
             }
             const filteredGames = GAMES_DATA.filter(g => g.title.toLowerCase().includes(filter.toLowerCase()));
             grid.innerHTML = filteredGames.map(game => renderCard(game)).join('');
             
             const favGames = GAMES_DATA.filter(g => favorites.includes(g.id));
             if (favGames.length > 0 && filter === "") {
                 favSection.classList.remove('hidden');
                 favGrid.innerHTML = favGames.map(game => renderCard(game)).join('');
             } else {
                 favSection.classList.add('hidden');
             }
             
             // Load shortcuts if available from shortcut.js
             if (typeof loadShortcuts === 'function') {
                 loadShortcuts();
             }
         }
         
         searchInput.addEventListener('input', (e) => init(e.target.value));
         settingsBtn.addEventListener('click', () => settingsModal.classList.remove('hidden'));
         
         // Close modal with escape key
         document.addEventListener('keydown', (e) => {
             if (e.key === 'Escape' && !settingsModal.classList.contains('hidden')) {
                 closeSettingsModal();
             }
             if (e.key === 'Escape' && !playerView.classList.contains('hidden')) {
                 closePlayer();
             }
         });
         
         // Initialize on page load
         window.addEventListener('DOMContentLoaded', () => {
             init();
             initThemeToggle();
         });
      </script>
   </body>
</html>
