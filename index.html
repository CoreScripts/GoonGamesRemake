<!DOCTYPE html>
<html lang="en">
   <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
      <title id="tabTitle">GOONGAMES</title>
      <meta name="apple-mobile-web-app-capable" content="yes">
      <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
      <meta name="apple-mobile-web-app-title" content="GOONGAMES">
      <link id="tabIcon" rel="icon" type="image/png" href="droplet.png">
      <link rel="apple-touch-icon" href="droplet.png">
      <link rel="manifest" href="data:application/manifest+json,{'name':'GOONGAMES','short_name':'GOONGAMES','start_url':'index.html','display':'standalone','background_color':'#09090b','theme_color':'#3b82f6','icons':[{'src':'droplet.png','sizes':'192x192','type':'image/png'}]}">
      <script src="https://cdn.tailwindcss.com"></script>
      <script>
         (function() {
             const savedTheme = localStorage.getItem('theme') || 'dark';
             if (savedTheme === 'dark') {
                 document.documentElement.classList.add('dark');
             } else {
                 document.documentElement.classList.remove('dark');
             }
         
             const cloakTitle = localStorage.getItem('cloakTitle');
             const cloakIcon = localStorage.getItem('cloakIcon');
             
             if (cloakTitle) document.title = cloakTitle;
             if (cloakIcon) {
                 const link = document.querySelector("link[rel*='icon']") || document.createElement('link');
                 link.type = 'image/x-icon';
                 link.rel = 'shortcut icon';
                 link.href = cloakIcon;
                 document.getElementsByTagName('head')[0].appendChild(link);
             }
         })();
         
         tailwind.config = { darkMode: 'class' }
      </script>
      <script src="games.js"></script>
      <script src="shortcut.js"></script>
      <style>
         * { -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
         .preload * { transition: none !important; }
         html, body, nav, section, div, h1, h2, h3, span, button, input {
            transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
         }
         ::-webkit-scrollbar { width: 8px; }
         ::-webkit-scrollbar-track { background: transparent; }
         ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 10px; }
         #toggleCircle { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); transform: translateX(0px); }
         .dark #toggleCircle { transform: translateX(24px); }
         .star-icon { transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
         .star-active { transform: scale(1.4) rotate(15deg); }
         .logo-img { filter: invert(1); transition: filter 0.3s ease; }
         .dark .logo-img { filter: invert(0); }
         
         /* MOBILE GAMEPAD STYLES */
         #mobileGamepadOverlay {
            position: absolute; inset: 0; pointer-events: none; z-index: 100;
            display: none;
         }
         .gp-stick {
            position: absolute; width: 120px; height: 120px;
            background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.2);
            border-radius: 50%; pointer-events: auto; touch-action: none;
            backdrop-blur: 4px;
         }
         .gp-thumb {
            position: absolute; width: 50px; height: 50px;
            background: rgba(255,255,255,0.4); border-radius: 50%;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
         }
         .gp-btn {
            position: absolute; width: 60px; height: 60px;
            background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.3);
            border-radius: 50%; color: white; font-weight: bold; font-size: 14px;
            pointer-events: auto; display: flex; align-items:center; justify-content:center;
            backdrop-blur: 4px;
         }
         .gp-btn:active { background: rgba(255,255,255,0.5); transform: scale(0.9); }

         #mobileModeToggle.active { background: #22c55e !important; }
         #mobileModeToggle.active .mobile-dot { transform: translateX(24px); }
         .mobile-dot { transition: transform 0.3s; }
      </style>
   </head>
   <body class="preload bg-zinc-50 dark:bg-zinc-900 text-zinc-900 dark:text-zinc-100 min-h-screen font-sans overflow-x-hidden">
      <div id="notification-container" class="fixed bottom-5 right-5 z-[100] flex flex-col gap-3 pointer-events-none"></div>
      
      <nav class="sticky top-0 z-40 w-full bg-white/80 dark:bg-zinc-800/80 backdrop-blur-md border-b border-zinc-200 dark:border-zinc-700 px-4 py-3 flex flex-wrap gap-4 justify-between items-center">
         <div class="flex items-center gap-2">
            <img src="droplet.png" class="w-8 h-8 object-contain logo-img" alt="Logo">
            <h1 class="text-xl font-black tracking-tighter uppercase">GOONGAMES</h1>
         </div>
         <div class="flex-grow max-w-md relative">
            <input type="text" id="searchInput" placeholder="Search games..." class="w-full bg-zinc-100 dark:bg-zinc-800 border border-zinc-200 dark:border-zinc-700 rounded-full py-2 px-10 focus:outline-none text-sm">
         </div>
         <button id="settingsBtn" class="p-2 hover:bg-zinc-200 dark:hover:bg-zinc-700 rounded-full transition-all">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
         </button>
      </nav>

      <main id="homeView" class="max-w-7xl mx-auto p-6 space-y-12">
         <section id="shortcutsSection" class="hidden">
            <h2 class="text-xs font-black uppercase tracking-[0.3em] opacity-40 mb-6">Quick Links</h2>
            <div id="shortcutGrid" class="flex flex-wrap gap-6 border-b border-zinc-200 dark:border-zinc-800 pb-12"></div>
         </section>
         <section id="favoritesSection" class="hidden">
            <h2 class="text-xs font-black uppercase tracking-[0.3em] text-yellow-500 mb-6">Favourited</h2>
            <div id="favGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-6 border-b border-zinc-200 dark:border-zinc-800 pb-12"></div>
         </section>
         <section id="librarySection">
            <h2 class="text-xs font-black uppercase tracking-[0.3em] opacity-40 mb-6">Library</h2>
            <div id="gameGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-6"></div>
         </section>
      </main>

      <section id="playerView" class="hidden fixed inset-0 z-50 bg-black flex flex-col">
         <div class="p-4 bg-white dark:bg-zinc-900 flex justify-between items-center border-b border-zinc-200 dark:border-zinc-800">
            <h2 id="activeGameTitle" class="font-bold uppercase tracking-widest text-sm">Game</h2>
            <button id="closePlayer" class="px-6 py-2 bg-red-600 text-white rounded-full font-bold text-xs uppercase">Close</button>
         </div>
         <div class="flex-grow relative bg-black overflow-hidden">
            <iframe id="gameIframe" src="" class="w-full h-full border-0 absolute inset-0" allow="autoplay; fullscreen" sandbox="allow-forms allow-modals allow-orientation-lock allow-pointer-lock allow-popups allow-popups-to-escape-sandbox allow-scripts allow-same-origin" allowfullscreen></iframe>
            
            <div id="mobileGamepadOverlay">
               <div id="l-stick" class="gp-stick" style="left: 40px; bottom: 60px;"><div class="gp-thumb"></div></div>
               <div id="btn-a" class="gp-btn" style="right: 40px; bottom: 140px;">A</div>
               <div id="btn-b" class="gp-btn" style="right: 120px; bottom: 60px;">B</div>
               <div id="btn-space" class="gp-btn" style="right: 40px; bottom: 60px;">X</div>
            </div>
         </div>
      </section>

      <div id="settingsModal" class="hidden fixed inset-0 z-[60] bg-black/60 backdrop-blur-sm flex items-center justify-center p-4">
         <div class="bg-white dark:bg-zinc-800 p-8 rounded-3xl w-full max-w-sm shadow-2xl">
            <h2 class="text-xl font-black mb-6 text-center uppercase">Settings</h2>
            <div class="flex justify-between items-center mb-4 bg-zinc-100 dark:bg-zinc-700/50 p-4 rounded-2xl">
               <span class="text-[10px] font-bold opacity-50 uppercase">Theme</span>
               <button id="themeToggle" class="relative w-14 h-8 bg-zinc-300 dark:bg-blue-600 rounded-full p-1 transition-all">
                  <div id="toggleCircle" class="w-6 h-6 bg-white rounded-full shadow-md"></div>
               </button>
            </div>
            <div class="flex justify-between items-center mb-4 bg-zinc-100 dark:bg-zinc-700/50 p-4 rounded-2xl">
               <span class="text-[10px] font-bold opacity-50 uppercase">Force Mobile Mode</span>
               <button id="mobileModeToggle" onclick="toggleMobileMode()" class="relative w-14 h-8 bg-zinc-300 rounded-full p-1 transition-all">
                  <div class="mobile-dot w-6 h-6 bg-white rounded-full shadow-md"></div>
               </button>
            </div>
            <button id="closeSettings" class="w-full py-3 bg-zinc-900 dark:bg-zinc-100 text-white dark:text-zinc-900 rounded-xl font-bold">DONE</button>
         </div>
      </div>

      <script>
         const grid = document.getElementById('gameGrid');
         const player = document.getElementById('playerView');
         const home = document.getElementById('homeView');
         const iframe = document.getElementById('gameIframe');
         const gamepad = document.getElementById('mobileGamepadOverlay');
         let favorites = JSON.parse(localStorage.getItem('favorites')) || [];

         // --- FIX: MOBILE GAMEPAD ENGINE ---
         function toggleMobileMode() {
            const isEnabled = localStorage.getItem('mobileMode') === 'true';
            localStorage.setItem('mobileMode', !isEnabled);
            updateMobileModeUI();
         }

         function updateMobileModeUI() {
            const btn = document.getElementById('mobileModeToggle');
            const isEnabled = localStorage.getItem('mobileMode') === 'true';
            btn.classList.toggle('active', isEnabled);
            gamepad.style.display = isEnabled ? 'block' : 'none';
         }

         function setupStick(id) {
            const el = document.getElementById(id);
            const thumb = el.querySelector('.gp-thumb');
            let active = false, startX, startY;

            el.addEventListener('touchstart', e => {
               active = true;
               const rect = el.getBoundingClientRect();
               startX = rect.left + rect.width/2;
               startY = rect.top + rect.height/2;
            });

            el.addEventListener('touchmove', e => {
               if(!active) return;
               const t = e.touches[0];
               const dx = t.clientX - startX;
               const dy = t.clientY - startY;
               const dist = Math.min(Math.sqrt(dx*dx + dy*dy), 40);
               const angle = Math.atan2(dy, dx);
               thumb.style.transform = `translate(calc(-50% + ${Math.cos(angle)*dist}px), calc(-50% + ${Math.sin(angle)*dist}px))`;
            });

            el.addEventListener('touchend', () => {
               active = false;
               thumb.style.transform = 'translate(-50%, -50%)';
            });
         }

         // --- PRESERVED ORIGINAL LOGIC ---
         function renderCard(game) {
            return `<div class="group relative active:scale-105 transition-all cursor-pointer" onclick="playGame('${game.id}')">
               <div class="aspect-video bg-zinc-800 rounded-2xl overflow-hidden mb-3 border-2 border-transparent group-hover:border-blue-500">
                  <img src="${game.image}" class="w-full h-full object-cover">
               </div>
               <h3 class="font-bold text-[10px] uppercase tracking-widest opacity-60">${game.title}</h3>
            </div>`;
         }

         window.playGame = function(id) {
            const game = GAMES_DATA.find(g => g.id === id);
            if (!game) return;
            document.getElementById('activeGameTitle').innerText = game.title;
            iframe.src = game.url;
            home.classList.add('hidden');
            player.classList.remove('hidden');
            updateMobileModeUI();
         };

         document.getElementById('closePlayer').onclick = () => {
            iframe.src = "";
            player.classList.add('hidden');
            home.classList.remove('hidden');
         };

         document.getElementById('settingsBtn').onclick = () => document.getElementById('settingsModal').classList.remove('hidden');
         document.getElementById('closeSettings').onclick = () => document.getElementById('settingsModal').classList.add('hidden');
         
         document.getElementById('themeToggle').onclick = () => {
            document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
         };

         function renderShortcuts() {
            const grid = document.getElementById('shortcutGrid');
            const section = document.getElementById('shortcutsSection');
            if (typeof SHORTCUTS_DATA === 'undefined' || SHORTCUTS_DATA.length === 0) return;
            section.classList.remove('hidden');
            grid.innerHTML = SHORTCUTS_DATA.map(item => `
               <a href="${item.url}" target="_blank" class="group block active:scale-95">
                  <div class="inline-block bg-zinc-200 dark:bg-zinc-800 rounded-2xl overflow-hidden border-2 border-transparent group-hover:border-blue-500">
                     <img src="${item.image}" class="max-h-32 w-auto object-contain">
                  </div>
                  <h3 class="mt-2 text-center font-bold text-[10px] uppercase tracking-widest opacity-60">${item.title}</h3>
               </a>`).join('');
         }

         window.onload = () => {
            document.body.classList.remove('preload');
            if (typeof GAMES_DATA !== 'undefined') {
               grid.innerHTML = GAMES_DATA.map(g => renderCard(g)).join('');
            }
            renderShortcuts();
            updateMobileModeUI();
            setupStick('l-stick');
         };
      </script>
   </body>
</html>
