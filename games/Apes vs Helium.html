<!DOCTYPE html>
<html lang="en-us">
<!-- We keep the base href so merge.js knows where to look -->
<base href="https://cdn.jsdelivr.net/gh/bubbls/UGS-Assets@main/apesvshelium/">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <title>Unity WebGL Player | Apes vs Helium</title>
  
  <link rel="shortcut icon" href="TemplateData/favicon.ico">
  <link rel="stylesheet" href="TemplateData/style.css">
  
  <script>
    window.fileMergerConfig = {
      files: [
        { name: 'AVHPort.data.unityweb', parts: 3 },
        { name: 'AVHPort.wasm.code.unityweb', parts: 2 },
      ],
      basePath: 'Build/',
      debug: true
    };

    // FORCE CORS ACCESSIBILITY: This overrides the default fetch in merge.js 
    // to force the browser to securely accept the cross-domain map pieces.
    const originalFetch = window.fetch;
    window.fetch = function(url, options) {
      if (typeof url === 'string' && url.includes('jsdelivr')) {
        options = options || {};
        options.mode = 'cors'; 
        options.credentials = 'same-origin';
      }
      return originalFetch(url, options);
    };
  </script>

  <!-- Cleaned script tags so they run directly on GitHub Pages -->
  <script src="merge.js"></script>
  <script src="TemplateData/UnityProgress.js"></script>
  <script src="Build/UnityLoader.js"></script>
  
  <script>
    var unityInstance = UnityLoader.instantiate("unityContainer", "Build/AVHPort.json", {
      onProgress: UnityProgress
    });
  </script>
  
  <style>
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #000;
    }
    #unityContainer {
      width: 100vw !important;
      height: 100vh !important;
    }
  </style>
</head>

<body>
  <div id="unityContainer"></div>
</body>
</html>
