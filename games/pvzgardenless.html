<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <base href="https://cdn.jsdelivr.net/gh/bubbls/UGS-Assets@main/gardenless/">
  <title>PvZ2 Gardendless Online | 0.6.0</title>

  <!-- Fix cross-origin image loading -->
  <script>
    (function () {
      var _Img = window.Image;
      window.Image = function () {
        var img = new _Img();
        img.crossOrigin = 'anonymous';
        return img;
      };
    })();
  </script>

  <meta name="viewport" content="width=device-width,user-scalable=no,initial-scale=1,minimum-scale=1,maximum-scale=1,minimal-ui=true" />
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="format-detection" content="telephone=no">
  <meta name="renderer" content="webkit" />
  <meta name="force-rendering" content="webkit" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="msapplication-tap-highlight" content="no">
  <meta name="full-screen" content="yes" />
  <meta name="x5-fullscreen" content="true" />
  <meta name="360-fullscreen" content="true" />
  <meta name="x5-page-mode" content="app">

  <link rel="stylesheet" type="text/css" href="style.f76d1.css" />

  <!--
    SERVICE WORKER — pre-caches game assets after first load so that
    entering a level doesn't freeze the browser fetching from CDN.
    The SW intercepts every fetch and serves from cache on repeat visits.
  -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(function () {});
    }
  </script>
</head>

<body>
  <div id="GameDiv" cc_exact_fit_screen="true">
    <div id="Cocos3dGameContainer">
      <canvas id="GameCanvas" oncontextmenu="event.preventDefault()" tabindex="99"></canvas>
    </div>
  </div>

  <script src="src/polyfills.bundle.5adbf.js" charset="utf-8"></script>
  <script src="src/system.bundle.543e6.js" charset="utf-8"></script>
  <script src="src/import-map.4399c.json" type="systemjs-importmap" charset="utf-8"></script>
  <script>
    System.import('./index.bed7f.js').catch(function (err) { console.error(err); });
  </script>

  <script>
  /* ================================================================
     MOBILE TOUCH PATCH
     Intent detection:
       Tap   (finger stays within 8px)  → mousedown + mouseup + click
       Vertical drag (> 10px)           → WheelEvent (scroll menus)
       Horizontal / diagonal drag       → mouse drag (plant seeds etc.)
  ================================================================ */
  (function () {
    'use strict';

    var SCROLL_THRESHOLD = 10;
    var SCROLL_SPEED     = 2.2;

    function init() {
      var canvas = document.getElementById('GameCanvas');
      if (!canvas) { requestAnimationFrame(init); return; }
      installTouch(canvas);
      installViewportLock();
      console.log('[touch patch] ready ✓');
    }
    requestAnimationFrame(init);

    function installTouch(canvas) {
      var state = { id: null, startX: 0, startY: 0, lastX: 0, lastY: 0, intent: null, mouseDown: false };

      function mouse(type, cx, cy) {
        canvas.dispatchEvent(new MouseEvent(type, {
          bubbles: true, cancelable: true, view: window, button: 0,
          buttons: (type === 'mouseup' || type === 'click') ? 0 : 1,
          clientX: cx, clientY: cy, screenX: cx, screenY: cy,
        }));
      }

      function wheel(cx, cy, dy) {
        canvas.dispatchEvent(new WheelEvent('wheel', {
          bubbles: true, cancelable: true,
          deltaX: 0, deltaY: dy * SCROLL_SPEED, deltaMode: 0,
          clientX: cx, clientY: cy,
        }));
      }

      function cancelAll() {
        if (state.mouseDown) { mouse('mouseup', state.lastX, state.lastY); state.mouseDown = false; }
        state.id = null; state.intent = null;
      }

      canvas.addEventListener('touchstart', function (e) {
        e.preventDefault();
        if (state.id !== null) return;
        var t = e.changedTouches[0];
        state.id = t.identifier;
        state.startX = state.lastX = t.clientX;
        state.startY = state.lastY = t.clientY;
        state.intent = null; state.mouseDown = false;
      }, { passive: false });

      canvas.addEventListener('touchmove', function (e) {
        e.preventDefault();
        var t = null;
        for (var i = 0; i < e.changedTouches.length; i++) {
          if (e.changedTouches[i].identifier === state.id) { t = e.changedTouches[i]; break; }
        }
        if (!t) return;
        var absDx = Math.abs(t.clientX - state.startX);
        var absDy = Math.abs(t.clientY - state.startY);
        var incDy = t.clientY - state.lastY;

        if (state.intent === null) {
          if (absDy > SCROLL_THRESHOLD && absDy > absDx)             { state.intent = 'scroll'; }
          else if (absDx > SCROLL_THRESHOLD || absDy > SCROLL_THRESHOLD) {
            state.intent = 'drag'; mouse('mousedown', t.clientX, t.clientY); state.mouseDown = true;
          }
        }
        if      (state.intent === 'scroll') wheel(t.clientX, t.clientY, incDy);
        else if (state.intent === 'drag')   mouse('mousemove', t.clientX, t.clientY);
        state.lastX = t.clientX; state.lastY = t.clientY;
      }, { passive: false });

      canvas.addEventListener('touchend', function (e) {
        e.preventDefault();
        var t = null;
        for (var i = 0; i < e.changedTouches.length; i++) {
          if (e.changedTouches[i].identifier === state.id) { t = e.changedTouches[i]; break; }
        }
        if (!t) return;
        if (state.intent === null) {
          mouse('mousedown', t.clientX, t.clientY);
          mouse('mousemove', t.clientX, t.clientY);
          mouse('mouseup',   t.clientX, t.clientY);
          mouse('click',     t.clientX, t.clientY);
        } else if (state.intent === 'drag') {
          mouse('mousemove', t.clientX, t.clientY);
          mouse('mouseup',   t.clientX, t.clientY);
          state.mouseDown = false;
        }
        state.id = null; state.intent = null;
      }, { passive: false });

      canvas.addEventListener('touchcancel', function (e) { e.preventDefault(); cancelAll(); }, { passive: false });
    }

    function installViewportLock() {
      var s = document.createElement('style');
      s.textContent =
        '#GameCanvas,canvas{touch-action:none!important;user-select:none;-webkit-user-select:none}' +
        '*{-webkit-tap-highlight-color:transparent}' +
        'html,body{overscroll-behavior:none}';
      document.head.appendChild(s);
      document.body.style.overscrollBehavior = 'none';
      window.addEventListener('contextmenu',     function (e) { e.preventDefault(); });
      document.addEventListener('gesturestart',  function (e) { e.preventDefault(); }, { passive: false });
      document.addEventListener('gesturechange', function (e) { e.preventDefault(); }, { passive: false });
    }

  }());
  </script>
</body>
</html>
