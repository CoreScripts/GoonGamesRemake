<!DOCTYPE html>
<html lang="en-us" style="height:100%; overflow:hidden">
<head>
  <base href="https://cdn.jsdelivr.net/gh/bubbls/UGS-Assets@79091a3feb921044b3597bd32cea7357b43e2d9c/indian-truck-simulator-3d-gh-pages/">

  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <title>Unity WebGL Player | BlightBorne</title>

  <style>
    * { margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      touch-action: none;
    }

    #gameContainer canvas {
      display: block;
      outline: none;
    }

    div#webgl-content {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 100%;
      height: 100%;
      transform: translate(-50%, -50%);
    }

    /* FORCE REMOVE UI INTERFERENCE */
    #loadingBox, #icon, #loadingInfo, #box {
      position: absolute;
      z-index: -999;
      opacity: 0;
      pointer-events: none;
    }

    div#icon {
      width: 300px;
      height: 310px;
      position: absolute;
      top: 50%;
      left: 50%;
      margin-top: -185px;
      margin-left: -150px;
      background-image: url("Template/Blight-Borne.jpg");
      background-repeat: no-repeat;
      box-shadow: 1px 1px 5px #141414;
      z-index: 10;
    }

    div#spinner {
      position: absolute;
      height: 18px;
      left: 50%;
      margin-left: -150px;
      width: 300px;
      overflow: hidden;
      background-color: #882121;
      box-shadow: 1px 1px 5px #111;
    }

    div#spinner:before {
      display: block;
      position: absolute;
      content: "";
      width: 150%;
      margin-left: -10px;
      height: 10px;
      background-color: #e85352;
      transform: rotate(-5deg);
      animation: loading 1s linear infinite;
    }

    @keyframes loading {
      from { top: -185%; }
      to { top: 225%; }
    }
  </style>

  <script>
    // Block unwanted mobile WebGL alert
    (function () {
      const originalAlert = window.alert;

      window.alert = function (msg) {
        if (typeof msg === "string" &&
            msg.includes("Unity WebGL is not currently supported on mobiles")) {
          return;
        }
        return originalAlert.apply(this, arguments);
      };
    })();
  </script>

  <script src="Build/UnityLoader.js"></script>

  <script>
    function resizeUnityContainer() {
      var container = document.getElementById("gameContainer");
      if (container) {
        container.style.width = window.innerWidth + "px";
        container.style.height = window.innerHeight + "px";
      }
    }

    window.addEventListener("resize", resizeUnityContainer);

    function UnityProgress(gameInstance, progress) {
      if (!gameInstance.Module) return;

      // ALWAYS ALLOW INPUT (prevents blocking UI issue)
      const blockerIds = ["loadingBox", "icon", "loadingInfo", "box"];
      blockerIds.forEach(id => {
        const el = document.getElementById(id);
        if (el) {
          el.style.display = "none";
          el.style.pointerEvents = "none";
        }
      });
    }

    window.addEventListener("load", function () {

      fetch("Build/indian_truck_gd_2_0_1.json")
        .then(r => r.json())
        .then(config => {

          window.gameInstance = UnityLoader.instantiate(
            "gameContainer",
            "Build/indian_truck_gd_2_0_1.json",
            {
              onProgress: UnityProgress,

              Module: {
                onRuntimeInitialized: function () {
                  resizeUnityContainer();

                  const canvas =
                    document.querySelector("#gameContainer canvas");

                  if (canvas) canvas.focus();

                  // FINAL CLEANUP (THIS FIXES YOUR ISSUE)
                  setTimeout(() => {
                    document.getElementById("loadingBox")?.remove();
                    document.getElementById("icon")?.remove();
                    document.getElementById("loadingInfo")?.remove();
                    document.getElementById("box")?.remove();
                  }, 1000);
                },

                preInit: [
                  function () {
                    UnityProgress(window.gameInstance, "preinit");
                  }
                ]
              }
            }
          );
        })
        .catch(err => {
          console.error("Unity load failed:", err);
        });
    });
  </script>
</head>

<body>
  <div id="webgl-content">
    <div id="gameContainer"></div>
  </div>

  <!-- Hidden blockers (now safely neutralized) -->
  <div id="box"></div>
  <div id="loadingBox"><div id="spinner"></div></div>
  <div id="icon"></div>
  <p id="loadingInfo"></p>
</body>
</html>
