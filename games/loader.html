<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoonGames Loader</title>
    <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100vh; 
            width: 100vw;
            overflow: hidden; 
            background: #000;
        }
        iframe { 
            width: 100%; 
            height: 100%; 
            border: none; 
        }
        #ruffle-container { 
            width: 100%; 
            height: 100%; 
        }
        ruffle-player { 
            width: 100%; 
            height: 100%; 
        }
    </style>
</head>
<body>
    <iframe id="game-frame" style="display:none;"></iframe>
    <div id="ruffle-container" style="display:none;"></div>

    <script>
        var params = new URLSearchParams(window.location.search);
        var gameUrl = params.get('url');
        var iframe = document.getElementById('game-frame');
        var container = document.getElementById('ruffle-container');

        if (gameUrl) {
            var decodedUrl = decodeURIComponent(gameUrl);
            
            // Check if it's a SWF file
            if (decodedUrl.toLowerCase().endsWith('.swf')) {
                // Use Ruffle for Flash games
                container.style.display = "block";
                var ruffle = window.RufflePlayer.newest();
                var player = ruffle.createPlayer();
                container.appendChild(player);
                player.load({
                    url: decodedUrl,
                    allowScriptAccess: true,
                    backgroundColor: "#000000",
                    letterbox: "on"
                });
            } else {
                // Regular HTML game - load directly
                iframe.style.display = "block";
                iframe.src = decodedUrl;
            }
        }
    </script>
</body>
</html>
