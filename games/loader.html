<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoonGames Loader</title>
    <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100vh; 
            width: 100vw; 
            overflow: hidden; 
            background: #000; 
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #ruffle-container, ruffle-player {
            width: 100%;
            height: 100%;
        }

        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>
    <iframe id="game-frame" 
        style="display:none;" 
        allow="autoplay; fullscreen; storage-access" 
        sandbox="allow-forms allow-modals allow-orientation-lock allow-pointer-lock allow-popups allow-popups-to-escape-sandbox allow-presentation allow-scripts allow-same-origin"
        allowfullscreen>
    </iframe>

    <div id="ruffle-container" style="display:none;"></div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const gameUrl = params.get('url');
        const iframe = document.getElementById('game-frame');
        const container = document.getElementById('ruffle-container');

        if (gameUrl) {
            const decodedUrl = decodeURIComponent(gameUrl);
            
            if (decodedUrl.toLowerCase().endsWith('.swf')) {
                container.style.display = "block";
                const ruffle = window.RufflePlayer.newest();
                const player = ruffle.createPlayer();
                
                container.appendChild(player);

                player.load({
                    url: decodedUrl,
                    allowScriptAccess: true,
                    backgroundColor: "#000000",
                    letterbox: "on" 
                });
            } else {
                iframe.style.display = "block";
                // We keep the URL exactly as is so the game can identify its own save data
                iframe.src = decodedUrl;
            }
        }
    </script>

    <!-- ═══ FORWARD GAMEPAD EVENTS TO INNER IFRAME ═══ -->
    <script>
    window.addEventListener('message', function(e) {
        var innerFrame = document.getElementById('game-frame');
        if (!innerFrame || !innerFrame.contentWindow) return;
        
        var data = e.data;
        if (!data || data.type !== 'gp-event') return;
        
        try {
            var d = innerFrame.contentWindow.document;
            var canvas = d.querySelector('canvas');
            
            if (data.eventType === 'keyboard') {
                var evt = new KeyboardEvent(data.subType, {
                    key: data.key,
                    code: data.code,
                    keyCode: data.keyCode,
                    which: data.which,
                    bubbles: true,
                    cancelable: true,
                    composed: true
                });
                d.dispatchEvent(evt);
                innerFrame.contentWindow.dispatchEvent(evt);
                if (d.body) d.body.dispatchEvent(evt);
                if (d.activeElement && d.activeElement !== d.body) {
                    d.activeElement.dispatchEvent(evt);
                }
            }
            else if (data.eventType === 'mouse') {
                var mevt = new MouseEvent(data.subType, {
                    button: data.button || 0,
                    buttons: data.buttons || 0,
                    movementX: data.movementX || 0,
                    movementY: data.movementY || 0,
                    bubbles: true,
                    cancelable: true
                });
                if (canvas) {
                    canvas.dispatchEvent(mevt);
                } else {
                    d.dispatchEvent(mevt);
                }
                // Auto-click on mouseup
                if (data.subType === 'mouseup' && (data.button === 0 || data.button === undefined)) {
                    var cevt = new MouseEvent('click', {
                        button: 0,
                        bubbles: true,
                        cancelable: true
                    });
                    if (canvas) canvas.dispatchEvent(cevt);
                    else d.dispatchEvent(cevt);
                }
                // Context menu on right-click mouseup
                if (data.subType === 'mouseup' && data.button === 2) {
                    var ctxevt = new MouseEvent('contextmenu', {
                        button: 2,
                        bubbles: true,
                        cancelable: true
                    });
                    if (canvas) canvas.dispatchEvent(ctxevt);
                    else d.dispatchEvent(ctxevt);
                }
            }
        } catch(err) {}
    });
    </script>
</body>
</html>
