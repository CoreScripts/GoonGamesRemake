<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoonGames Loader</title>
    <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100vh; 
            width: 100vw; 
            overflow: hidden; 
            background: #000; 
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #ruffle-container, ruffle-player {
            width: 100%;
            height: 100%;
        }

        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>
    <!-- ⚠️ sandbox REMOVED from inner iframe -->
    <iframe id="game-frame" 
        style="display:none;" 
        allow="autoplay; fullscreen; storage-access" 
        allowfullscreen>
    </iframe>

    <div id="ruffle-container" style="display:none;"></div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const gameUrl = params.get('url');
        const iframe = document.getElementById('game-frame');
        const container = document.getElementById('ruffle-container');

        if (gameUrl) {
            const decodedUrl = decodeURIComponent(gameUrl);
            
            if (decodedUrl.toLowerCase().endsWith('.swf')) {
                container.style.display = "block";
                const ruffle = window.RufflePlayer.newest();
                const player = ruffle.createPlayer();
                
                container.appendChild(player);

                player.load({
                    url: decodedUrl,
                    allowScriptAccess: true,
                    backgroundColor: "#000000",
                    letterbox: "on" 
                });
            } else {
                iframe.style.display = "block";
                iframe.src = decodedUrl;
            }
        }
    </script>

    <!-- ═══ FORWARD KEYBOARD/MOUSE EVENTS INTO INNER IFRAME ═══ -->
    <script>
    (function() {
        var innerFrame = document.getElementById('game-frame');
        if (!innerFrame) return;
        
        function forwardKey(e) {
            if (!innerFrame.contentWindow) return;
            try {
                var evt = new KeyboardEvent(e.type, {
                    key: e.key,
                    code: e.code,
                    keyCode: e.keyCode,
                    which: e.which,
                    bubbles: true,
                    cancelable: true,
                    composed: true
                });
                var d = innerFrame.contentWindow.document;
                d.dispatchEvent(evt);
                innerFrame.contentWindow.dispatchEvent(evt);
                if (d.body) d.body.dispatchEvent(evt);
                if (d.activeElement && d.activeElement !== d.body) {
                    d.activeElement.dispatchEvent(evt);
                }
            } catch(err) {}
        }
        
        function forwardMouse(e) {
            if (!innerFrame.contentWindow) return;
            try {
                var d = innerFrame.contentWindow.document;
                var canvas = d.querySelector('canvas');
                var evt = new MouseEvent(e.type, {
                    button: e.button,
                    buttons: e.buttons,
                    movementX: e.movementX || 0,
                    movementY: e.movementY || 0,
                    bubbles: true,
                    cancelable: true
                });
                if (canvas) {
                    canvas.dispatchEvent(evt);
                } else {
                    d.dispatchEvent(evt);
                }
                // Also fire click on mouseup for left button
                if (e.type === 'mouseup' && e.button === 0) {
                    var clickEvt = new MouseEvent('click', {
                        button: 0,
                        bubbles: true,
                        cancelable: true
                    });
                    if (canvas) canvas.dispatchEvent(clickEvt);
                    else d.dispatchEvent(clickEvt);
                }
            } catch(err) {}
        }
        
        window.addEventListener('keydown', forwardKey);
        window.addEventListener('keyup', forwardKey);
        window.addEventListener('mousedown', forwardMouse);
        window.addEventListener('mouseup', forwardMouse);
        window.addEventListener('mousemove', forwardMouse);
        window.addEventListener('click', forwardMouse);
        window.addEventListener('contextmenu', forwardMouse);
    })();
    </script>
</body>
</html>
