<!-- Ultimate Game Stash file-->
<!-- For the regularly updating doc go to https://docs.google.com/document/d/1_FmH3BlSBQI7FGgAQL59-ZPe8eCxs35wel6JUyVaG8Q/ -->

<!DOCTYPE html>
<html lang="en-us">
<base href="https://cdn.jsdelivr.net/gh/Stinkalistic/UGS@main/UNITY/treeshateyou/">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <!-- Viewport declared statically — avoids a JS reflow on mobile startup -->
  <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes, minimal-ui">
  <title>game :D</title>
  <style>
    html, body {
      background: #000;
      width: 100%;
      height: 100%;
      overflow: hidden;
      padding: 0;
      margin: 0;
      touch-action: none;
    }

    #gameContainer {
      background: transparent !important;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      will-change: width, height;
    }

    #gameContainer canvas {
      width: 100%;
      height: 100%;
      display: block;
      /* Pixel-art rendering without the extra class lookup */
      image-rendering: optimizeSpeed;
      image-rendering: -webkit-crisp-edges;
      image-rendering: -moz-crisp-edges;
      image-rendering: crisp-edges;
      image-rendering: pixelated;
      -ms-interpolation-mode: nearest-neighbor;
    }

    #loading-text {
      color: white;
      font-family: sans-serif;
      text-align: center;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }
  </style>
</head>

<body>
  <div id="gameContainer">
    <canvas id="unity-canvas"></canvas>
    <div id="loading-text">LOADING...</div>
  </div>

  <script src="Build/loader.js"></script>
  <script>
  (async () => {
    // ── Constants ────────────────────────────────────────────────────────────
    const BASE   = "https://cdn.jsdelivr.net/gh/Stinkalistic/UGS@main/UNITY/treeshateyou/";
    const ASPECT = 540 / 960; // height / width
    const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

    const loadingText = document.querySelector("#loading-text");
    const canvas      = document.querySelector("#unity-canvas");
    const container   = document.querySelector("#gameContainer");

    // ── Resize (rAF-guarded to avoid layout thrashing) ───────────────────────
    let rafPending = false;
    function onResize() {
      if (rafPending) return;
      rafPending = true;
      requestAnimationFrame(() => {
        rafPending = false;
        const wWin = window.innerWidth;
        const hWin = window.innerHeight;
        let w = wWin;
        if (w * ASPECT > hWin) w = Math.ceil(hWin / ASPECT);
        const h = Math.floor(w * ASPECT);
        // Set canvas buffer size once — avoids double-write triggering reflow
        if (canvas.width !== w || canvas.height !== h) {
          canvas.width  = w;
          canvas.height = h;
        }
        container.style.width  = w + "px";
        container.style.height = h + "px";
      });
    }
    window.addEventListener("resize", onResize, { passive: true });
    onResize();

    // ── Fetch helpers ────────────────────────────────────────────────────────
    // Single-pass streaming fetch that accumulates chunks without double-copying.
    // Returns a Uint8Array; updates loadingText as bytes arrive.
    let totalBytes  = 0;
    let loadedBytes = 0;

    function fmt(b) {
      if (b > 1 << 30) return (b / (1 << 30)).toFixed(2) + " GB";
      if (b > 1 << 20) return (b / (1 << 20)).toFixed(2) + " MB";
      if (b > 1 << 10) return (b / (1 << 10)).toFixed(2) + " KB";
      return b + " B";
    }

    // Fetch all HEAD sizes in one parallel batch before any body downloads start
    async function prefetchSizes(urls) {
      const results = await Promise.allSettled(
        urls.map(u => fetch(BASE + u, { method: "HEAD" })
          .then(r => parseInt(r.headers.get("Content-Length") || "0", 10))
          .catch(() => 0))
      );
      return results.map(r => r.status === "fulfilled" ? r.value : 0);
    }

    async function streamFetch(relUrl) {
      const res = await fetch(BASE + relUrl);
      if (!res.ok) throw new Error(`HTTP ${res.status} for ${relUrl}`);

      // Fast path: no streaming API (uncommon but safe fallback)
      if (!res.body) {
        const ab = await res.arrayBuffer();
        loadedBytes += ab.byteLength;
        return new Uint8Array(ab);
      }

      const reader = res.body.getReader();
      const chunks = [];
      let received = 0;

      // eslint-disable-next-line no-constant-condition
      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        chunks.push(value);
        received   += value.length;
        loadedBytes += value.length;
        const pct = totalBytes > 0 ? " (" + ((loadedBytes / totalBytes) * 100).toFixed(1) + "%)" : "";
        loadingText.textContent = "LOADING... " + fmt(loadedBytes) + " / " + fmt(totalBytes) + pct;
      }

      // Allocate once for the final buffer — no intermediate copy
      const out = new Uint8Array(received);
      let off = 0;
      for (const chunk of chunks) { out.set(chunk, off); off += chunk.length; }
      return out;
    }

    // Fetch multiple part files and concatenate into one Blob URL
    async function fetchAndMerge(parts, mimeType) {
      const buffers  = await Promise.all(parts.map(streamFetch));
      const total    = buffers.reduce((s, b) => s + b.length, 0);
      const combined = new Uint8Array(total);
      let off = 0;
      for (const b of buffers) { combined.set(b, off); off += b.length; }
      return URL.createObjectURL(new Blob([combined], { type: mimeType }));
    }

    function parts(base, count) {
      return Array.from({ length: count }, (_, i) => base + ".part" + (i + 1));
    }

    // ── Main load sequence ───────────────────────────────────────────────────
    try {
      const dataParts = parts("Build/data.br", 5);
      const wasmParts = parts("Build/wasm.br", 4);
      const allParts  = [...dataParts, ...wasmParts, "Build/framework.js"];

      // One parallel batch for all HEAD requests
      const sizes = await prefetchSizes(allParts);
      totalBytes  = sizes.reduce((a, b) => a + b, 0);

      // Kick off all downloads in parallel; framework is plain JS (no merge needed)
      const [dataUrl, wasmUrl, frameworkBuf] = await Promise.all([
        fetchAndMerge(dataParts, "application/octet-stream"),
        fetchAndMerge(wasmParts, "application/wasm"),
        streamFetch("Build/framework.js")
      ]);

      // Inject framework as a blob URL so the browser can parse it off-main-thread
      const frameworkUrl = URL.createObjectURL(
        new Blob([frameworkBuf], { type: "application/javascript" })
      );

      // Wait for loader.js to expose createUnityInstance
      await new Promise(resolve => {
        if (typeof createUnityInstance === "function") { resolve(); return; }
        const t = setInterval(() => {
          if (typeof createUnityInstance === "function") { clearInterval(t); resolve(); }
        }, 50);
      });

      const config = {
        dataUrl,
        frameworkUrl,
        codeUrl: wasmUrl,
        // Fixed: was pointing to /saul/ — corrected to match <base> href
        streamingAssetsUrl: BASE + "StreamingAssets",
        companyName:    "",
        productName:    "",
        productVersion: "",
        // Cap DPR at 1 on mobile; cap at 2 on desktop to avoid 3x retina overdraw
        devicePixelRatio: isMobile ? 1 : Math.min(window.devicePixelRatio || 1, 2),
        // Hint the GPU driver to use the discrete / high-perf GPU where available
        webglContextAttributes: {
          powerPreference: "high-performance",
          // Disable alpha compositing — saves the GPU a blending pass each frame
          alpha: false,
          // Disable stencil/depth buffers if the game doesn't need them
          // (Unity will re-enable if it needs them, this is just a hint)
          preserveDrawingBuffer: false,
          antialias: false   // Unity handles its own AA; browser AA = double cost
        }
      };

      const unityInstance = await createUnityInstance(canvas, config, progress => {
        loadingText.textContent = "LOADING... " + Math.round(progress * 100) + "%";
      });

      loadingText.remove();

    } catch (err) {
      loadingText.textContent = "ERROR: " + (err.message || err);
      console.error(err);
    }
  })();
  </script>
</body>
</html>
