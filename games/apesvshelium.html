<!DOCTYPE html>

<html lang="en-us">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <title>Unity WebGL Player | Apes vs Helium</title>
  
  <script data-cfasync="false">
    // FORCED OVERRIDE: Tells the browser directly to intercept URL strings matching the game build path
    (function() {
      const cdnUrl = "https://cdn.jsdelivr.net/gh/bubbls/UGS-Assets@main/apesvshelium/";
      
      const originalFetch = window.fetch;
      window.fetch = function(input, init) {
        if (typeof input === 'string') {
          if (input.includes('Build/') || input.includes('TemplateData/')) {
            let pathSegment = input.substring(input.indexOf('apesvshelium/') + 13 || input.indexOf('Build/'));
            input = cdnUrl + pathSegment;
          }
        }
        return originalFetch.call(this, input, init);
      };

      const originalOpen = XMLHttpRequest.prototype.open;
      XMLHttpRequest.prototype.open = function(method, url, ...args) {
        if (typeof url === 'string') {
          if (url.includes('Build/') || url.includes('TemplateData/')) {
            let pathSegment = url.substring(url.indexOf('apesvshelium/') + 13 || url.indexOf('Build/'));
            url = cdnUrl + pathSegment;
          }
        }
        return originalOpen.call(this, method, url, ...args);
      };
    })();
  </script>

  <base href="https://cdn.jsdelivr.net/gh/bubbls/UGS-Assets@main/apesvshelium/">
  <link rel="shortcut icon" href="TemplateData/favicon.ico">
  <link rel="stylesheet" href="TemplateData/style.css">
  
  <script data-cfasync="false">
    window.fileMergerConfig = {
      files: [
        { name: 'AVHPort.data.unityweb', parts: 3 },
        { name: 'AVHPort.wasm.code.unityweb', parts: 2 },
      ],
      basePath: 'Build/',
      debug: true
    };
  </script>

  <script src="merge.js" data-cfasync="false"></script>
  <script src="TemplateData/UnityProgress.js" data-cfasync="false"></script>
  <script src="Build/UnityLoader.js" data-cfasync="false"></script>
  <script data-cfasync="false">
    // Intercept config initialization to force rewrite asset endpoints inside the core loop
    var unityInstance = UnityLoader.instantiate("unityContainer", "Build/AVHPort.json", {
      onProgress: UnityProgress,
      Module: {
        locateFile: function(path) {
          return "https://cdn.jsdelivr.net/gh/bubbls/UGS-Assets@main/apesvshelium/Build/" + path;
        }
      }
    });
  </script>
  <style>
    body,
    html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #000;
    }

    #unityContainer {
      width: 100vw !important;
      height: 100vh !important;
    }
  </style>
</head>

<body>
  <div id="unityContainer"></div>
</body>
</html>
