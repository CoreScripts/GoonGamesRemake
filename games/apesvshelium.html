  <script data-cfasync="false">
    // Global Interceptor: Forces map resource fetches onto the correct absolute CDN path
    (function() {
      const cdnUrl = "https://cdn.jsdelivr.net/gh/bubbls/UGS-Assets@main/apesvshelium/";
      const originalFetch = window.fetch;
      
      window.fetch = function(input, init) {
        if (typeof input === 'string') {
          // If Unity tries to load a path from your site root, rewrite it to use the base CDN
          if (input.startsWith('Build/') || input.startsWith('TemplateData/')) {
            input = cdnUrl + input;
          } else if (!input.startsWith('http') && !input.startsWith('blob:')) {
            // Catches loosely declared map chunk parameters
            input = cdnUrl + 'Build/' + input;
          }
        }
        return originalFetch.call(this, input, init);
      };

      // Also intercept standard XMLHttpRequests just in case maps are fetched via old methods
      const originalOpen = XMLHttpRequest.prototype.open;
      XMLHttpRequest.prototype.open = function(method, url, ...args) {
        if (typeof url === 'string') {
          if (url.startsWith('Build/') || url.startsWith('TemplateData/')) {
            url = cdnUrl + url;
          } else if (!url.startsWith('http') && !url.startsWith('blob:')) {
            url = cdnUrl + 'Build/' + url;
          }
        }
        return originalOpen.call(this, method, url, ...args);
      };
    })();
  </script>

  <script data-cfasync="false">
    window.fileMergerConfig = {
