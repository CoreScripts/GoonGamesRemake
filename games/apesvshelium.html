<!DOCTYPE html>

<html lang="en-us">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <title>Unity WebGL Player | Apes vs Helium</title>
  
  <script data-cfasync="false">
    // NETWORK INTERCEPTOR: Forces all internal Unity map asset streams to fetch from the GitHub CDN
    (function() {
      const targetCDN = "https://cdn.jsdelivr.net/gh/bubbls/UGS-Assets@main/apesvshelium/";
      
      // 1. Intercept modern Fetch API requests (used for streaming asset bundles/maps)
      const nativeFetch = window.fetch;
      window.fetch = function(input, init) {
        if (typeof input === 'string') {
          let cleanPath = input.replace(window.location.origin, "").replace(/^\//, "");
          if (cleanPath.startsWith('Build/') || cleanPath.startsWith('TemplateData/')) {
            input = targetCDN + cleanPath;
          } else if (!input.startsWith('http') && !input.startsWith('blob:')) {
            input = targetCDN + 'Build/' + cleanPath;
          }
        }
        return nativeFetch.call(this, input, init);
      };

      // 2. Intercept legacy XMLHttpRequest calls (used by older Unity loaders for map slices)
      const nativeOpen = XMLHttpRequest.prototype.open;
      XMLHttpRequest.prototype.open = function(method, url, ...args) {
        if (typeof url === 'string') {
          let cleanPath = url.replace(window.location.origin, "").replace(/^\//, "");
          if (cleanPath.startsWith('Build/') || cleanPath.startsWith('TemplateData/')) {
            url = targetCDN + cleanPath;
          } else if (!url.startsWith('http') && !url.startsWith('blob:')) {
            url = targetCDN + 'Build/' + cleanPath;
          }
        }
        return nativeOpen.call(this, method, url, ...args);
      };
    })();
  </script>

  <base href="https://cdn.jsdelivr.net/gh/bubbls/UGS-Assets@main/apesvshelium/">
  <link rel="shortcut icon" href="TemplateData/favicon.ico">
  <link rel="stylesheet" href="TemplateData/style.css">
  
  <script data-cfasync="false">
    window.fileMergerConfig = {
      files: [
        { name: 'AVHPort.data.unityweb', parts: 3 },
        { name: 'AVHPort.wasm.code.unityweb', parts: 2 },
      ],
      basePath: 'Build/',
      debug: true
    };
  </script>

  <script src="merge.js" data-cfasync="false"></script>
  <script src="TemplateData/UnityProgress.js" data-cfasync="false"></script>
  <script src="Build/UnityLoader.js" data-cfasync="false"></script>
  <script data-cfasync="false">
    var unityInstance = UnityLoader.instantiate("unityContainer", "Build/AVHPort.json", {
      onProgress: UnityProgress
    });
  </script>
  <style>
    body,
    html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #000;
    }

    #unityContainer {
      width: 100vw !important;
      height: 100vh !important;
    }
  </style>
</head>

<body>
  <div id="unityContainer"></div>
</body>
</html>
